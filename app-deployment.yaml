    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 이벤트 - Y2KS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--accent:#c8a96e;--accent-d:#a8803e;--g200:#e8e8e8}
    body{font-family:'Nanum Gothic',sans-serif;background:var(--black);color:#fff;min-height:100vh}
    a{text-decoration:none;color:inherit}
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid rgba(255,255,255,.08)}
    .logo{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:8px}
    .back{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.5);transition:color .2s;padding:8px 0}
    .back:hover{color:var(--accent)}
    .hero{text-align:center;padding:80px 40px 60px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(200,169,110,.12) 0%,transparent 65%);pointer-events:none}
    .hero-label{font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:5px;color:var(--accent);font-weight:600;margin-bottom:20px}
    .hero-title{font-family:'Outfit',sans-serif;font-size:58px;font-weight:800;line-height:1.1;letter-spacing:-2px;margin-bottom:16px}
    .hero-title span{color:var(--accent)}
    .hero-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:40px;line-height:1.7}
    .ticket-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);border-radius:50px;padding:12px 28px;margin-bottom:56px}
    .tb-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}
    .tb-count{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--accent)}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:48px;max-width:520px;margin:0 auto;backdrop-filter:blur(10px)}
    /* States */
    .state{display:none}
    .state.active{display:block}
    /* Idle state */
    .idle-icon{font-size:56px;margin-bottom:20px}
    .idle-title{font-size:22px;font-weight:700;margin-bottom:10px}
    .idle-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:36px;line-height:1.7}
    .claim-btn{width:100%;padding:20px;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:1px;transition:all .3s;font-family:inherit}
    .claim-btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(200,169,110,.35)}
    .claim-btn:active{transform:translateY(0)}
    .claim-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    /* Loading state */
    .spinner{width:52px;height:52px;border:3px solid rgba(200,169,110,.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 24px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-title{font-size:18px;font-weight:700;margin-bottom:10px}
    .loading-sub{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7}
    /* Winner state */
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
    .confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear forwards}
    @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    .winner-icon{font-size:64px;margin-bottom:16px;animation:bounce .6s ease}
    @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .winner-title{font-size:26px;font-weight:800;color:var(--accent);margin-bottom:10px}
    .winner-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:32px;line-height:1.7}
    .email-form{display:flex;flex-direction:column;gap:12px}
    .email-input{padding:15px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .email-input:focus{border-color:var(--accent)}
    .email-input::placeholder{color:rgba(255,255,255,.3)}
    .submit-btn{padding:15px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit}
    .submit-btn:hover{background:var(--accent-d);transform:translateY(-2px)}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    /* Loser state */
    .loser-icon{font-size:56px;margin-bottom:20px}
    .loser-title{font-size:22px;font-weight:700;margin-bottom:10px}
    .loser-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:28px;line-height:1.7}
    .retry-btn{display:inline-block;padding:12px 32px;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:14px;color:rgba(255,255,255,.7);transition:all .2s;cursor:pointer;font-family:inherit;background:none}
    .retry-btn:hover{border-color:var(--accent);color:var(--accent)}
    /* Done state */
    .done-icon{font-size:56px;margin-bottom:20px}
    .done-title{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:10px}
    .done-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:16px;line-height:1.7}
    .coupon-code{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;letter-spacing:6px;color:#fff;background:rgba(200,169,110,.1);border:1px dashed rgba(200,169,110,.4);padding:18px 24px;border-radius:8px;margin:20px 0}
    /* Error */
    .error-msg{font-size:12px;color:#ef5350;margin-top:6px;text-align:center}
    </style>
    </head>
    <body>
    <header class="header">
      <div class="logo">Y2KS</div>
      <a href="/" class="back">← 쇼핑몰로 돌아가기</a>
    </header>

    <div class="confetti-wrap" id="confetti-wrap"></div>

    <section class="hero">
      <div class="hero-label">LIMITED COUPON EVENT</div>
      <h1 class="hero-title">봄맞이 특별 쿠폰<br><span>100장</span> 무료 증정</h1>
      <p class="hero-sub">선착순으로 80% 할인 쿠폰을 드립니다.<br>버튼을 눌러 지금 바로 참여하세요!</p>
      <div class="ticket-badge">
        <span class="tb-label">남은 쿠폰</span>
        <span class="tb-count" id="ticket-count">- / 100</span>
      </div>

      <div class="card">
        <!-- IDLE -->
        <div class="state active" id="state-idle">
          <div class="idle-icon">🎁</div>
          <div class="idle-title">쿠폰 받기</div>
          <div class="idle-sub">버튼을 클릭하면 대기열에 등록됩니다.<br>처리 후 당첨 여부를 알려드립니다.</div>
          <button class="claim-btn" id="claim-btn" onclick="claimCoupon()">지금 쿠폰 받기</button>
        </div>

        <!-- LOADING -->
        <div class="state" id="state-loading">
          <div class="spinner"></div>
          <div class="loading-title">대기열에서 처리 중입니다...</div>
          <div class="loading-sub">잠시만 기다려주세요.<br>자동으로 결과를 확인하고 있습니다.</div>
        </div>

        <!-- WINNER -->
        <div class="state" id="state-winner">
          <div class="winner-icon">🎉</div>
          <div class="winner-title">축하합니다! 당첨되셨습니다!</div>
          <div class="winner-sub">80% 할인 쿠폰이 발급되었습니다.<br>이메일을 입력하시면 쿠폰 코드를 보내드립니다.</div>
          <div class="email-form">
            <input class="email-input" type="email" id="email-input" placeholder="이메일 주소를 입력하세요">
            <button class="submit-btn" id="submit-btn" onclick="submitEmail()">쿠폰 이메일로 받기</button>
            <div class="error-msg" id="email-error"></div>
          </div>
        </div>

        <!-- LOSER -->
        <div class="state" id="state-loser">
          <div class="loser-icon">😢</div>
          <div class="loser-title">아쉽게도 이번엔 놓쳤어요</div>
          <div class="loser-sub">쿠폰이 모두 소진되었습니다.<br>다음 이벤트에서 꼭 성공하시길 바랍니다!</div>
          <a href="/" class="retry-btn">← 쇼핑 계속하기</a>
        </div>

        <!-- DONE -->
        <div class="state" id="state-done">
          <div class="done-icon">✅</div>
          <div class="done-title">이메일 발송 완료!</div>
          <div class="done-sub">쿠폰 코드를 이메일로 보내드렸습니다.<br>받은 편지함을 확인해 주세요.</div>
          <div class="coupon-code" id="coupon-display"></div>
          <div style="font-size:12px;color:rgba(255,255,255,.35);margin-top:8px;">유효기간: 2026년 6월 30일까지</div>
          <br><a href="/" class="retry-btn" style="margin-top:16px">← 쇼핑 계속하기</a>
        </div>
      </div>
    </section>

    <script>
    let currentRequestId = null;
    let pollInterval = null;

    function setState(name) {
      document.querySelectorAll('.state').forEach(function(el) { el.classList.remove('active'); });
      var el = document.getElementById('state-' + name);
      if (el) el.classList.add('active');
    }

    function updateTicketCount() {
      fetch('/api/tickets').then(function(r){ return r.json(); }).then(function(d){
        document.getElementById('ticket-count').textContent = d.remaining + ' / 100';
      }).catch(function(){});
    }

    async function claimCoupon() {
      var btn = document.getElementById('claim-btn');
      btn.disabled = true;
      setState('loading');
      try {
        var res = await fetch('/api/claim', {method:'POST'});
        var data = await res.json();
        currentRequestId = data.request_id;
        pollInterval = setInterval(pollResult, 2000);
      } catch(e) {
        setState('idle');
        btn.disabled = false;
        alert('오류가 발생했습니다. 다시 시도해주세요.');
      }
    }

    async function pollResult() {
      try {
        var res = await fetch('/api/check/' + currentRequestId);
        var data = await res.json();
        if (data.status === 'winner') {
          clearInterval(pollInterval);
          setState('winner');
          launchConfetti();
          updateTicketCount();
        } else if (data.status === 'loser') {
          clearInterval(pollInterval);
          setState('loser');
          updateTicketCount();
        }
      } catch(e) { console.error('poll error', e); }
    }

    async function submitEmail() {
      var email = document.getElementById('email-input').value;
      var errEl = document.getElementById('email-error');
      var btn = document.getElementById('submit-btn');
      errEl.textContent = '';
      if (!email || !email.includes('@')) {
        errEl.textContent = '올바른 이메일 주소를 입력해주세요.';
        return;
      }
      btn.disabled = true;
      btn.textContent = '발송 중...';
      try {
        var res = await fetch('/api/submit-email', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({request_id: currentRequestId, email: email})
        });
        var data = await res.json();
        if (data.success) {
          document.getElementById('coupon-display').textContent = data.coupon;
          setState('done');
        } else {
          errEl.textContent = data.message || '오류가 발생했습니다.';
          btn.disabled = false;
          btn.textContent = '쿠폰 이메일로 받기';
        }
      } catch(e) {
        errEl.textContent = '네트워크 오류가 발생했습니다.';
        btn.disabled = false;
        btn.textContent = '쿠폰 이메일로 받기';
      }
    }

    function launchConfetti() {
      var wrap = document.getElementById('confetti-wrap');
      var colors = ['#c8a96e','#fff','#f9d423','#ff6b9d','#a8edea','#fed6e3'];
      for (var i = 0; i < 80; i++) {
        (function(i) {
          setTimeout(function() {
            var el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.width = (Math.random() * 8 + 6) + 'px';
            el.style.height = (Math.random() * 8 + 6) + 'px';
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (Math.random() * 2 + 2) + 's';
            el.style.animationDelay = '0s';
            wrap.appendChild(el);
            setTimeout(function() { el.remove(); }, 4000);
          }, i * 30);
        })(i);
      }
    }

    updateTicketCount();
    setInterval(updateTicketCount, 10000);
    </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: y2ks-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: worker-sa
      priorityClassName: y2ks-high
      containers:
      - name: web
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install flask boto3 redis gunicorn prometheus-flask-exporter requests && gunicorn --bind 0.0.0.0:5000 --workers 2 --chdir /app app:app"]
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-server.monitoring.svc.cluster.local:80"
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: SQS_QUEUE_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        - name: DDB_TABLE
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: DDB_TABLE
        volumeMounts:
        - name: code-volume
          mountPath: /app
      volumes:
      - name: code-volume
        configMap:
          name: y2ks-app-code
---
apiVersion: v1
kind: Service
metadata:
  name: y2ks-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: y2ks-worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: worker-sa
      priorityClassName: y2ks-normal
      containers:
      - name: worker
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install boto3 redis && python -u /app/worker.py"]
        livenessProbe:
          exec:
            command: ["python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/tmp/worker_alive') else 1)"]
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: SQS_QUEUE_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        - name: DDB_TABLE
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: DDB_TABLE
        volumeMounts:
        - name: code-volume
          mountPath: /app
      volumes:
      - name: code-volume
        configMap:
          name: y2ks-app-code
