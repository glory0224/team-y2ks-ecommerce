apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: y2ks-critical
value: 100000
globalDefault: false
description: "Redis 등 전체 시스템의 기반이 되는 핵심 서비스 - 절대 선점 불가"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: y2ks-high
value: 10000
globalDefault: false
description: "사용자 접속 프론트엔드 - 트래픽 스파이크 시에도 항상 보장"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: y2ks-normal
value: 1000
globalDefault: true
description: "KEDA Worker - 이벤트 처리용, 리소스 부족 시 선점 허용"
---
# Kubernetes RBAC: worker-sa가 K8s API로 파드/노드/디플로이먼트를 읽을 수 있게 허용
# /api/admin/k8s 엔드포인트가 서비스 어카운트 토큰으로 K8s API를 직접 호출합니다.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: y2ks-k8s-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: y2ks-k8s-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: y2ks-k8s-reader
subjects:
- kind: ServiceAccount
  name: worker-sa
  namespace: default
---
# AWS 인프라 설정 ConfigMap
# SQS URL, Region 등 AWS 관련 설정을 한 곳에서 관리합니다.
# 계정 ID가 코드에 하드코딩되지 않도록 여기서 중앙 관리합니다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-config
data:
  SQS_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/314240764197/y2ks-queue"
  AWS_REGION: "ap-northeast-2"
  DDB_TABLE: "y2ks-coupon-claims"
---
# AWS 인프라 초기화 Job
# 앱 배포 전 SQS 큐와 DynamoDB 테이블이 없으면 자동으로 생성합니다.
# kubectl apply 시 한 번 실행되며 5분 후 자동 삭제됩니다.
apiVersion: batch/v1
kind: Job
metadata:
  name: aws-infra-setup
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: worker-sa
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install boto3 -q && python /app/setup.py"]
        env:
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        - name: DDB_TABLE
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: DDB_TABLE
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: SQS_QUEUE_URL
        volumeMounts:
        - name: code-volume
          mountPath: /app
      volumes:
      - name: code-volume
        configMap:
          name: concert-app-code
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: concert-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: worker-sa
      priorityClassName: y2ks-high
      containers:
      - name: web
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install flask boto3 redis gunicorn prometheus-flask-exporter requests && gunicorn --bind 0.0.0.0:5000 --workers 2 --chdir /app app:app"]
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-server.monitoring.svc.cluster.local:80"
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: SQS_QUEUE_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        - name: DDB_TABLE
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: DDB_TABLE
        volumeMounts:
        - name: code-volume
          mountPath: /app
      volumes:
      - name: code-volume
        projected:
          sources:
          - configMap:
              name: concert-app-code
          - configMap:
              name: concert-app-html
---
apiVersion: v1
kind: Service
metadata:
  name: concert-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: concert-worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: worker-sa
      priorityClassName: y2ks-normal
      containers:
      - name: worker
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install boto3 redis && python -u /app/worker.py"]
        livenessProbe:
          exec:
            command: ["python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/tmp/worker_alive') else 1)"]
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
        - name: SQS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: SQS_QUEUE_URL
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        - name: DDB_TABLE
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: DDB_TABLE
        volumeMounts:
        - name: code-volume
          mountPath: /app
      volumes:
      - name: code-volume
        configMap:
          name: concert-app-code
