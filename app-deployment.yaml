    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2KS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#555;--accent:#c8a96e;--accent-d:#a8803e;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa}
    body{font-family:'Outfit',sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh}
    .header{background:#0a0a0a;border-bottom:1px solid #1f1f1f;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo{font-size:22px;font-weight:800;letter-spacing:8px;color:#fff}
    .logo span{color:var(--accent);font-size:12px;font-weight:400;letter-spacing:3px;margin-left:12px;vertical-align:middle}
    .header-right{display:flex;align-items:center;gap:16px}
    .refresh-btn{background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);color:var(--accent);padding:8px 18px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
    .refresh-btn:hover{background:rgba(200,169,110,.2)}
    .reset-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:8px 18px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
    .reset-btn:hover{background:rgba(239,68,68,.2)}
    .last-updated{font-size:12px;color:#555}
    .tab-nav{background:#0a0a0a;border-bottom:1px solid #1f1f1f;padding:0 40px;display:flex;gap:0}
    .tab-btn{padding:14px 24px;font-size:13px;font-weight:600;color:#555;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .2s;border-bottom:2px solid transparent;letter-spacing:.5px}
    .tab-btn:hover{color:#e8e8e8}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .main{max-width:1400px;margin:0 auto;padding:32px 40px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
    @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
    .stat-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px}
    .stat-label{font-size:11px;letter-spacing:2px;color:#555;margin-bottom:10px;text-transform:uppercase}
    .stat-value{font-size:36px;font-weight:700;line-height:1}
    .stat-sub{font-size:12px;color:#444;margin-top:8px}
    .v-green{color:var(--green)}
    .v-red{color:var(--red)}
    .v-accent{color:var(--accent)}
    .v-blue{color:var(--blue)}
    .v-purple{color:var(--purple)}
    .section-title{font-size:13px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1f1f1f}
    .queue-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
    .queue-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px}
    .progress-bar{height:6px;background:#1f1f1f;border-radius:3px;margin-top:16px;overflow:hidden}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent-d));transition:width .5s ease}
    table{width:100%;border-collapse:collapse}
    .table-wrap{background:#111;border:1px solid #1f1f1f;border-radius:10px;overflow:hidden}
    th{background:#0a0a0a;padding:12px 16px;text-align:left;font-size:11px;letter-spacing:1.5px;color:#555;text-transform:uppercase;font-weight:600;border-bottom:1px solid #1f1f1f}
    td{padding:12px 16px;font-size:13px;border-bottom:1px solid #161616;color:#ccc}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px}
    .b-winner{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
    .b-loser{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
    .b-sent{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
    .b-pending{background:rgba(255,255,255,.05);color:#555;border:1px solid #222}
    .empty{text-align:center;padding:48px;color:#333;font-size:14px}
    .toast{position:fixed;bottom:32px;right:32px;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;padding:14px 22px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateY(0)}
    .mon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
    @media(max-width:900px){.mon-grid{grid-template-columns:1fr}}
    .chart-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px;margin-bottom:16px}
    .chart-title{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1f1f1f}
    .chart-wrap{position:relative;height:220px}
    .chart-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px;background:#111;border-radius:4px}
    .lt-config{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:28px;margin-bottom:16px}
    .lt-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:end}
    @media(max-width:900px){.lt-grid{grid-template-columns:1fr 1fr}}
    .lt-label{font-size:11px;letter-spacing:1.5px;color:#555;text-transform:uppercase;margin-bottom:8px}
    .lt-input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:10px 14px;color:#e8e8e8;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .lt-input:focus{border-color:var(--accent)}
    .lt-start-btn{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);padding:10px 28px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;width:100%}
    .lt-start-btn:hover:not(:disabled){background:rgba(34,197,94,.25)}
    .lt-start-btn:disabled{opacity:.4;cursor:not-allowed}
    .lt-stop-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 28px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;width:100%;margin-top:8px}
    .lt-stop-btn:hover{background:rgba(239,68,68,.2)}
    .lt-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
    @media(max-width:900px){.lt-stats-grid{grid-template-columns:repeat(2,1fr)}}
    .lt-prog-bar{height:8px;background:#1f1f1f;border-radius:4px;margin-top:12px;overflow:hidden}
    .lt-prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#16a34a);transition:width .3s ease}
    .lt-log{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:10px;padding:20px;height:200px;overflow-y:auto;font-family:monospace;font-size:12px}
    .lt-log-line{padding:2px 0;border-bottom:1px solid #111}
    .lt-log-line.success{color:#22c55e}
    .lt-log-line.fail{color:#ef4444}
    .lt-log-line.info{color:#555}
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;background:#111;border-top:1px solid #1f1f1f;border-radius:0 0 10px 10px}
    .pg-btn{background:#0d0d0d;border:1px solid #2a2a2a;color:#9e9e9e;padding:6px 14px;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
    .pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .pg-btn:disabled{opacity:.3;cursor:default}
    .pg-info{font-size:12px;color:#555;padding:0 12px}
    .scale-panel{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:20px;margin-bottom:16px}
    .scale-panel-title{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:14px}
    .scale-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media(max-width:900px){.scale-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
    </head>
    <body>
    <header class="header">
      <div class="logo">Y2KS <span>ADMIN</span></div>
      <div class="header-right">
        <span class="last-updated" id="last-updated">-</span>
        <button class="reset-btn" onclick="resetTickets()">티켓 초기화</button>
        <button class="refresh-btn" onclick="refreshCurrentTab()">새로고침</button>
