    <div class="toast" id="toast"></div>
    <script>
    // ── 탭 전환 ──────────────────────────────────────────
    var currentTab = 'events';
    var tabTimers = {};
    
    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(function(el){ el.classList.remove('active'); });
      document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
      document.getElementById('panel-' + name).classList.add('active');
      document.getElementById('tab-btn-' + name).classList.add('active');
      currentTab = name;
      clearInterval(tabTimers['pods']);
      clearInterval(tabTimers['nodes']);
      // 부하 테스트 탭 타이머도 정리
      if (ltScaleTimer) { clearInterval(ltScaleTimer); ltScaleTimer = null; }
      if (ltEventTimer) { clearInterval(ltEventTimer); ltEventTimer = null; }
      if (name === 'pods') {
        loadPodsTab();
        tabTimers['pods'] = setInterval(loadPodsTab, 5000);
      } else if (name === 'nodes') {
        loadNodesTab();
        tabTimers['nodes'] = setInterval(loadNodesTab, 5000);
      }
    }
    
    function refreshCurrentTab() {
      if (currentTab === 'events') loadAll();
      else if (currentTab === 'pods') loadPodsTab();
      else if (currentTab === 'nodes') loadNodesTab();
    }
    
    // ── 토스트 ──────────────────────────────────────────
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    
    // ── 이벤트 로그 탭 ──────────────────────────────────
    async function loadStats() {
      try {
        var res = await fetch('/api/admin/stats');
        var d = await res.json();
        document.getElementById('s-left').textContent = d.tickets_left;
        document.getElementById('s-winner').textContent = d.winner_count;
        document.getElementById('s-loser').textContent = d.loser_count;
        document.getElementById('s-email').textContent = d.email_sent_count;
        document.getElementById('s-queue').textContent = d.queue_depth;
        document.getElementById('s-inflight').textContent = d.in_flight;
        document.getElementById('queue-bar').style.width = Math.min(d.queue_depth / 50 * 100, 100) + '%';
        document.getElementById('inflight-bar').style.width = Math.min(d.in_flight / 50 * 100, 100) + '%';
        document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
        return d;
      } catch(e) { console.error(e); return null; }
    }
    
    var currentPage = 1;
    var totalPages = 1;
    var pageSize = 20;
    
    function gotoPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadClaims();
    }
    
    async function loadClaims() {
      try {
        var res = await fetch('/api/admin/claims?page=' + currentPage + '&limit=' + pageSize);
        var d = await res.json();
        totalPages = d.pages || 1;
        var total = d.total || 0;
        document.getElementById('pg-prev').disabled = currentPage <= 1;
        document.getElementById('pg-first').disabled = currentPage <= 1;
        document.getElementById('pg-next').disabled = currentPage >= totalPages;
        document.getElementById('pg-last').disabled = currentPage >= totalPages;
        document.getElementById('pg-info').textContent = currentPage + ' / ' + totalPages + ' 페이지  (총 ' + total + '건)';
        document.getElementById('claims-title').textContent = '클레임 내역 (총 ' + total + '건)';
        var tbody = document.getElementById('claims-body');
        if (!d.items || d.items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">데이터가 없습니다</td></tr>';
          return;
        }
        tbody.innerHTML = d.items.map(function(item) {
          var statusBadge = item.status === 'winner'
            ? '<span class="badge b-winner">당첨</span>'
            : '<span class="badge b-loser">낙첨</span>';
          var emailSent = item.email_sent
            ? '<span class="badge b-sent">발송완료</span>'
            : '<span class="badge b-pending">미발송</span>';
          var coupon = item.coupon_code || '-';
          var email = item.email || '-';
          var time = item.claimed_at ? item.claimed_at.replace('T', ' ').substring(0, 19) : '-';
          var shortId = item.request_id ? item.request_id.substring(0, 8) + '...' : '-';
          return '<tr><td style="font-family:monospace;font-size:12px;color:#666" title="' + item.request_id + '">' + shortId + '</td><td>' + statusBadge + '</td><td style="font-family:monospace;letter-spacing:2px;color:var(--accent)">' + coupon + '</td><td style="color:#888">' + email + '</td><td>' + emailSent + '</td><td style="color:#555;font-size:12px">' + time + '</td></tr>';
        }).join('');
      } catch(e) { console.error(e); }
    }
    
    async function loadAll() {
      await Promise.all([loadStats(), loadClaims()]);
    }
    
    async function resetTickets() {
      if (!confirm('티켓을 100장으로 초기화하시겠습니까?')) return;
      try {
        var res = await fetch('/api/admin/reset', {method: 'POST'});
        var d = await res.json();
        showToast(d.message);
        loadStats();
      } catch(e) { showToast('초기화 실패'); }
    }
    
    loadAll();
    setInterval(loadAll, 15000);
    
    // ── Prometheus 헬퍼 ──────────────────────────────────
    var CHART_DEFAULTS = {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { labels: { color: '#9e9e9e', font: { family: 'Outfit', size: 11 } } } },
      scales: {
        x: { ticks: { color: '#555', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1f1f1f' } },
        y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1f1f1f' } }
      }
    };
    
    function tsToLabel(ts) {
      return new Date(ts * 1000).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }
    
    async function fetchRange(query, start, end, step) {
      try {
        var res = await fetch('/api/admin/metrics?query=' + encodeURIComponent(query) +
          '&start=' + start + '&end=' + end + '&step=' + step);
        if (!res.ok) return null;
        var d = await res.json();
        return (d.status === 'success' && d.data.result.length > 0) ? d.data.result : null;
      } catch(e) { return null; }
    }
    
    async function fetchInstant(query) {
      try {
        var res = await fetch('/api/admin/metrics/instant?query=' + encodeURIComponent(query));
        if (!res.ok) return null;
        var d = await res.json();
        if (d.status === 'success' && d.data.result.length > 0) return d.data.result[0].value[1];
        return null;
      } catch(e) { return null; }
    }
    
    function showEmpty(id, show) {
      var el = document.getElementById(id);
      if (el) el.style.display = show ? 'flex' : 'none';
    }
    
    // ── 파드 탭 ──────────────────────────────────────────
    var chartWorker = null, chartWorkerSqs = null;
    var sqsHistory = [];   // {ts, label, val}
    var podsHistory = [];  // {ts, label, val} - K8s API 폴링으로 누적
    var HISTORY_MAX = 120; // 최대 120개 (30초 간격 × 120 = 1시간)

    // 30초마다 K8s API 폴링 → podsHistory / nodesHistory 누적
    var podsCollectTimer = setInterval(async function() {
      try {
        var r = await fetch('/api/admin/k8s');
        var d = await r.json();
        var now = Math.floor(Date.now() / 1000);
        var label = tsToLabel(now);
        podsHistory.push({ ts: now, label: label, val: d.worker_pods || 0 });
        if (podsHistory.length > HISTORY_MAX) podsHistory.shift();
        nodesHistory.push({ ts: now, label: label, all: d.nodes_ready || 0, spot: d.nodes_spot || 0 });
        if (nodesHistory.length > HISTORY_MAX) nodesHistory.shift();
      } catch(e) {}
    }, 30000);

    async function loadPodsTab() {
      var now = Math.floor(Date.now() / 1000);
      var start = now - 3600;

      try {
        var k8sRes = await fetch('/api/admin/k8s');
        var k8sData = await k8sRes.json();
        document.getElementById('s-worker-pods').textContent = k8sData.worker_pods + ' / ' + k8sData.worker_desired;
        // 현재 값을 히스토리에 즉시 추가
        var label = tsToLabel(now);
        podsHistory.push({ ts: now, label: label, val: k8sData.worker_pods || 0 });
        if (podsHistory.length > HISTORY_MAX) podsHistory.shift();
      } catch(e) {
        var pods = await fetchInstant('kube_deployment_status_replicas{deployment="y2ks-worker"}');
        if (pods !== null) document.getElementById('s-worker-pods').textContent = Math.round(pods);
      }

      var statsData = await loadStats();
      if (statsData) document.getElementById('s-queue-pods').textContent = statsData.queue_depth;

      // Prometheus 먼저 시도, 실패 시 podsHistory로 차트 구성
      var workerData = await fetchRange('kube_deployment_status_replicas{deployment="y2ks-worker"}', start, now, '30s');
      if (!workerData && podsHistory.length > 1) {
        // K8s API 폴링 데이터로 가짜 workerData 구성
        workerData = [{ values: podsHistory.map(function(h){ return [h.ts, String(h.val)]; }) }];
      }
      if (workerData && workerData[0]) {
        showEmpty('chart-worker-empty', false);
        var wLabels = workerData[0].values.map(function(v){ return tsToLabel(v[0]); });
        var wData = workerData[0].values.map(function(v){ return parseFloat(v[1]); });
        if (!chartWorker) {
          chartWorker = new Chart(document.getElementById('chart-worker'), {
            type: 'line',
            data: { labels: wLabels, datasets: [
              { label: 'Worker Pod 수', data: wData, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)', tension: 0.3, pointRadius: 0, fill: true }
            ]},
            options: CHART_DEFAULTS
          });
        } else {
          chartWorker.data.labels = wLabels;
          chartWorker.data.datasets[0].data = wData;
          chartWorker.update();
        }
    
        // SQS 히스토리 누적 (30초마다 현재값 저장, 최대 120개 = 1시간)
        if (statsData) {
          sqsHistory.push({ ts: now, val: statsData.queue_depth });
          if (sqsHistory.length > 120) sqsHistory.shift();
        }
        // Worker Pod 타임스탬프에 가장 가까운 SQS 값 매핑
        var sqsData = workerData[0].values.map(function(v) {
          if (sqsHistory.length === 0) return null;
          var closest = sqsHistory.reduce(function(a, b) {
            return Math.abs(b.ts - v[0]) < Math.abs(a.ts - v[0]) ? b : a;
          });
          return Math.abs(closest.ts - v[0]) < 90 ? closest.val : null;
        });
        showEmpty('chart-worker-sqs-empty', false);
        if (!chartWorkerSqs) {
          chartWorkerSqs = new Chart(document.getElementById('chart-worker-sqs'), {
            type: 'line',
            data: { labels: wLabels, datasets: [
              { label: 'Worker Pod 수', data: wData, borderColor: '#22c55e', tension: 0.3, pointRadius: 0, yAxisID: 'y' },
              { label: 'SQS 큐 깊이', data: sqsData, borderColor: '#ef4444', tension: 0.3, pointRadius: 4, yAxisID: 'y1', spanGaps: false }
            ]},
            options: {
              responsive: true, maintainAspectRatio: false, animation: false,
              plugins: { legend: { labels: { color: '#9e9e9e', font: { family: 'Outfit', size: 11 } } } },
              scales: {
                x: { ticks: { color: '#555', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1f1f1f' } },
                y: { position: 'left', ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1f1f1f' }, title: { display: true, text: 'Pod 수', color: '#555', font: { size: 10 } } },
                y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#555', font: { size: 10 } }, title: { display: true, text: 'SQS 메시지', color: '#555', font: { size: 10 } } }
              }
            }
          });
        } else {
          chartWorkerSqs.data.labels = wLabels;
          chartWorkerSqs.data.datasets[0].data = wData;
          chartWorkerSqs.data.datasets[1].data = sqsData;
          chartWorkerSqs.update();
        }
      } else {
        showEmpty('chart-worker-empty', true);
        showEmpty('chart-worker-sqs-empty', true);
      }
    }
    
    // ── 노드 탭 ──────────────────────────────────────────
    var chartNodes = null, chartRps = null;
    var nodesHistory = []; // {ts, label, all, spot} - K8s API 폴링으로 누적

    async function loadNodesTab() {
      var now = Math.floor(Date.now() / 1000);
      var start = now - 3600;

      try {
        var k8sRes = await fetch('/api/admin/k8s');
        var k8sData = await k8sRes.json();
        document.getElementById('s-node-count').textContent = k8sData.nodes_ready;
        document.getElementById('s-spot-count').textContent = k8sData.nodes_spot;
        // 현재 값을 히스토리에 즉시 추가
        var label = tsToLabel(now);
        nodesHistory.push({ ts: now, label: label, all: k8sData.nodes_ready || 0, spot: k8sData.nodes_spot || 0 });
        if (nodesHistory.length > HISTORY_MAX) nodesHistory.shift();
      } catch(e) {
        var nodes = await fetchInstant('sum(kube_node_status_condition{condition="Ready",status="true"})');
        if (nodes !== null) document.getElementById('s-node-count').textContent = Math.round(nodes);
        var spot = await fetchInstant('count(kube_node_info{provider_id=~"aws:.*"} * on(node) kube_node_status_condition{condition="Ready",status="true"})');
        document.getElementById('s-spot-count').textContent = spot !== null ? Math.round(spot) : '-';
      }

      // Prometheus 먼저 시도, 실패 시 nodesHistory로 차트 구성
      var nodeAll = await fetchRange('sum(kube_node_status_condition{condition="Ready",status="true"})', start, now, '30s');
      var nodeSpot = await fetchRange('count(kube_node_info{provider_id=~"aws:.*"} * on(node) kube_node_status_condition{condition="Ready",status="true"})', start, now, '30s');
      if (!nodeAll && nodesHistory.length > 1) {
        nodeAll = [{ values: nodesHistory.map(function(h){ return [h.ts, String(h.all)]; }) }];
        nodeSpot = [{ values: nodesHistory.map(function(h){ return [h.ts, String(h.spot)]; }) }];
      }
      if (nodeAll && nodeAll[0]) {
        showEmpty('chart-nodes-empty', false);
        var nLabels = nodeAll[0].values.map(function(v){ return tsToLabel(v[0]); });
        var nAll = nodeAll[0].values.map(function(v){ return parseFloat(v[1]); });
        var nSpot = (nodeSpot && nodeSpot[0]) ? nodeSpot[0].values.map(function(v){ return parseFloat(v[1]); }) : [];
        if (!chartNodes) {
          chartNodes = new Chart(document.getElementById('chart-nodes'), {
            type: 'line',
            data: { labels: nLabels, datasets: [
              { label: '전체 Ready 노드', data: nAll, borderColor: '#c8a96e', backgroundColor: 'rgba(200,169,110,0.08)', tension: 0.3, pointRadius: 0, fill: true },
              { label: 'Spot 노드', data: nSpot, borderColor: '#a78bfa', tension: 0.3, pointRadius: 0, borderDash: [4, 4] }
            ]},
            options: CHART_DEFAULTS
          });
        } else {
          chartNodes.data.labels = nLabels;
          chartNodes.data.datasets[0].data = nAll;
          chartNodes.data.datasets[1].data = nSpot;
          chartNodes.update();
        }
      } else { showEmpty('chart-nodes-empty', true); }
    
      // RPS 차트: endpoint 라벨 먼저 시도, 실패하면 path 라벨 fallback
      var rpsEvent = await fetchRange('rate(flask_http_request_duration_seconds_count{url_rule="/event"}[1m])', start, now, '15s');
      var rpsClaim = await fetchRange('rate(flask_http_request_duration_seconds_count{url_rule="/api/claim"}[1m])', start, now, '15s');
      if (!rpsEvent) rpsEvent = await fetchRange('rate(flask_http_request_duration_seconds_count{url_rule="/event"}[1m])', start, now, '15s');
      if (!rpsClaim) rpsClaim = await fetchRange('rate(flask_http_request_duration_seconds_count{url_rule="/api/claim"}[1m])', start, now, '15s');
      if (rpsEvent || rpsClaim) {
        showEmpty('chart-rps-empty', false);
        var labels = (rpsEvent && rpsEvent[0]) ? rpsEvent[0].values.map(function(v){ return tsToLabel(v[0]); }) :
                     (rpsClaim && rpsClaim[0]) ? rpsClaim[0].values.map(function(v){ return tsToLabel(v[0]); }) : [];
        var ds1 = (rpsEvent && rpsEvent[0]) ? rpsEvent[0].values.map(function(v){ return parseFloat(v[1]); }) : [];
        var ds2 = (rpsClaim && rpsClaim[0]) ? rpsClaim[0].values.map(function(v){ return parseFloat(v[1]); }) : [];
        if (!chartRps) {
          chartRps = new Chart(document.getElementById('chart-rps'), {
            type: 'line',
            data: { labels: labels, datasets: [
              { label: '/event RPS', data: ds1, borderColor: '#c8a96e', backgroundColor: 'rgba(200,169,110,0.06)', tension: 0.3, pointRadius: 0, fill: true },
              { label: '/api/claim RPS', data: ds2, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.06)', tension: 0.3, pointRadius: 0, fill: true }
            ]},
            options: CHART_DEFAULTS
          });
        } else {
          chartRps.data.labels = labels;
          chartRps.data.datasets[0].data = ds1;
          chartRps.data.datasets[1].data = ds2;
          chartRps.update();
        }
      } else { showEmpty('chart-rps-empty', true); }
    }
    
    // ── 부하 테스트 탭 ──────────────────────────────────
    var ltRunning = false;
    var ltStopped = false;
    var ltStats = { total: 0, success: 0, fail: 0, times: [] };
    var ltTarget = 0;
    var chartLt = null;
    var ltChartData = { labels: [], success: [], fail: [] };
    var ltScaleTimer = null;
    var ltEventTimer = null;
    
    async function pollScalingStatus() {
      try {
        var k8sRes = await fetch('/api/admin/k8s');
        var k8s = await k8sRes.json();
        document.getElementById('lt-pod-count').textContent = k8s.worker_pods + ' / ' + k8s.worker_desired;
        document.getElementById('lt-node-count').textContent = k8s.nodes_ready;
      } catch(e) {}
      try {
        var sRes = await fetch('/api/admin/stats');
        var sd = await sRes.json();
        document.getElementById('lt-queue-count').textContent = sd.queue_depth;
        document.getElementById('lt-tickets-left').textContent = sd.tickets_left;
      } catch(e) {}
    }
    
    function ltLog(msg, type) {
      var log = document.getElementById('lt-log');
      var line = document.createElement('div');
      line.className = 'lt-log-line ' + (type || 'info');
      line.textContent = new Date().toLocaleTimeString('ko-KR') + '  ' + msg;
      log.insertBefore(line, log.firstChild);
      if (log.children.length > 200) log.removeChild(log.lastChild);
    }
    
    function ltUpdateUI() {
      document.getElementById('lt-s-total').textContent = ltStats.total;
      document.getElementById('lt-s-success').textContent = ltStats.success;
      document.getElementById('lt-s-fail').textContent = ltStats.fail;
      var avg = ltStats.times.length > 0 ? Math.round(ltStats.times.reduce(function(a,b){return a+b;},0) / ltStats.times.length) : 0;
      document.getElementById('lt-s-avg').textContent = ltStats.times.length > 0 ? avg + 'ms' : '-';
      var pct = ltTarget > 0 ? Math.round(ltStats.total / ltTarget * 100) : 0;
      document.getElementById('lt-s-progress').textContent = ltStats.total + ' / ' + ltTarget + ' (' + pct + '%)';
      var rate = ltStats.total > 0 ? Math.round(ltStats.success / ltStats.total * 100) : 0;
      document.getElementById('lt-s-success-rate').textContent = '성공률 ' + rate + '%';
    }
    
    function ltUpdateChart(batchSuccess, batchFail) {
      var now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      ltChartData.labels.push(now);
      ltChartData.success.push(batchSuccess);
      ltChartData.fail.push(batchFail);
      if (ltChartData.labels.length > 60) {
        ltChartData.labels.shift();
        ltChartData.success.shift();
        ltChartData.fail.shift();
      }
      if (!chartLt) {
        showEmpty('chart-lt-empty', false);
        chartLt = new Chart(document.getElementById('chart-lt'), {
          type: 'bar',
          data: {
            labels: ltChartData.labels,
            datasets: [
              { label: '성공', data: ltChartData.success, backgroundColor: 'rgba(34,197,94,0.5)', borderColor: '#22c55e', borderWidth: 1 },
              { label: '실패', data: ltChartData.fail, backgroundColor: 'rgba(239,68,68,0.5)', borderColor: '#ef4444', borderWidth: 1 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { legend: { labels: { color: '#9e9e9e', font: { family: 'Outfit', size: 11 } } } },
            scales: {
              x: { stacked: true, ticks: { color: '#555', font: { size: 9 }, maxRotation: 0, maxTicksLimit: 10 }, grid: { color: '#1f1f1f' } },
              y: { stacked: true, ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1f1f1f' } }
            }
          }
        });
      } else {
        chartLt.data.labels = ltChartData.labels;
        chartLt.data.datasets[0].data = ltChartData.success;
        chartLt.data.datasets[1].data = ltChartData.fail;
        chartLt.update('none');
      }
    }
    
    async function startLoadTest() {
      var concurrency = 500;
      var total = 30000;
      var interval = 0;
    
      ltRunning = true;
      ltStopped = false;
      ltStats = { total: 0, success: 0, fail: 0, times: [] };
      ltTarget = total;
      ltChartData = { labels: [], success: [], fail: [] };
      if (chartLt) { chartLt.destroy(); chartLt = null; }
      showEmpty('chart-lt-empty', true);
    
      document.getElementById('lt-start-btn').disabled = true;
      document.getElementById('lt-stop-btn').style.display = 'block';
      document.getElementById('lt-log').innerHTML = '';
      ltLog('부하 테스트 시작 — 동시 ' + concurrency + '명 / 총 ' + total + '회 / 버스트 모드', 'info');
    
      // 스케일링 상태 실시간 폴링 시작 (5초 간격)
      pollScalingStatus();
      ltScaleTimer = setInterval(pollScalingStatus, 5000);
      // 이벤트 로그 통계 실시간 갱신 (5초 간격)
      ltEventTimer = setInterval(loadStats, 5000);
      ltUpdateUI();
    
      var sent = 0;
    
      async function runBatch() {
        if (ltStopped || sent >= total) {
          ltRunning = false;
          document.getElementById('lt-start-btn').disabled = false;
          document.getElementById('lt-stop-btn').style.display = 'none';
          if (ltScaleTimer) { clearInterval(ltScaleTimer); ltScaleTimer = null; }
          if (ltEventTimer) { clearInterval(ltEventTimer); ltEventTimer = null; }
          ltLog('테스트 완료 — 성공: ' + ltStats.success + ' / 실패: ' + ltStats.fail + ' / 평균: ' + (ltStats.times.length > 0 ? Math.round(ltStats.times.reduce(function(a,b){return a+b;},0)/ltStats.times.length) : 0) + 'ms', 'info');
          pollScalingStatus(); // 최종 상태 갱신
          return;
        }
    
        var batchSize = Math.min(concurrency, total - sent);
        sent += batchSize;
        var batchSuccess = 0, batchFail = 0;
    
        var promises = Array.from({length: batchSize}, function() {
          return (async function() {
            var t0 = Date.now();
            try {
              var res = await fetch('/api/claim', { method: 'POST' });
              var elapsed = Date.now() - t0;
              ltStats.times.push(elapsed);
              if (res.ok) {
                ltStats.success++; batchSuccess++;
              } else {
                ltStats.fail++; batchFail++;
                var body = {};
                try { body = await res.json(); } catch(e2) {}
                ltLog('HTTP ' + res.status + ' — ' + (body.message || body.error || res.statusText), 'fail');
              }
            } catch(e) {
              ltStats.fail++; batchFail++;
              ltLog('네트워크 오류 — ' + e.message, 'fail');
            }
            ltStats.total++;
          })();
        });
    
        await Promise.all(promises);
        ltUpdateUI();
        ltUpdateChart(batchSuccess, batchFail);
        if (batchFail > 0)
          ltLog('배치 완료 — 성공: ' + batchSuccess + ' 실패: ' + batchFail, 'fail');
        else
          ltLog('배치 완료 — 성공: ' + batchSuccess, 'success');
    
        setTimeout(runBatch, Math.max(interval, 10));
      }
    
      runBatch();
    }
    
    function stopLoadTest() {
      ltStopped = true;
      if (ltScaleTimer) { clearInterval(ltScaleTimer); ltScaleTimer = null; }
      if (ltEventTimer) { clearInterval(ltEventTimer); ltEventTimer = null; }
      document.getElementById('lt-start-btn').disabled = false;
      document.getElementById('lt-stop-btn').style.display = 'none';
      ltLog('테스트 중지됨 (총 ' + ltStats.total + '개 요청 완료)', 'info');
      pollScalingStatus();
    }
    </script>
    </body>
    </html>
    
