<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y2KS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--white:#fff;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#555;--accent:#c8a96e;--accent-d:#a8803e;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa}
body{font-family:'Outfit',sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh}
.header{background:#0a0a0a;border-bottom:1px solid #1f1f1f;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:22px;font-weight:800;letter-spacing:8px;color:#fff}
.logo span{color:var(--accent);font-size:12px;font-weight:400;letter-spacing:3px;margin-left:12px;vertical-align:middle}
.header-right{display:flex;align-items:center;gap:16px}
.last-updated{font-size:12px;color:#555}
.logout-btn{font-size:12px;color:#555;background:none;border:1px solid #2a2a2a;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.tabs{display:flex;border-bottom:1px solid #1f1f1f;padding:0 40px;background:#0a0a0a}
.tab-btn{padding:16px 20px;font-size:13px;font-family:inherit;background:none;border:none;border-bottom:2px solid transparent;color:#555;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:#e8e8e8}
.chat-panel{display:flex;flex-direction:column;height:calc(100vh - 130px);max-width:1100px;margin:0 auto;padding:24px 40px}
.chat-header{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.chat-title{font-size:13px;letter-spacing:2px;color:#555;text-transform:uppercase}
.chat-sub{font-size:12px;color:#333;margin-top:4px}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.qa-btn{background:#111;border:1px solid #2a2a2a;color:#9e9e9e;padding:6px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.qa-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.qa-btn:disabled{opacity:.4;cursor:default}
.diag-btn{background:linear-gradient(135deg,#1a1a2e,#2d1b4e);border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700;transition:all .2s;white-space:nowrap}
.diag-btn:hover:not(:disabled){background:rgba(200,169,110,.15)}
.diag-btn:disabled{opacity:.4;cursor:default}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding-right:4px}
.msg-user{align-self:flex-end;max-width:65%;background:var(--accent);color:#0a0a0a;padding:12px 18px;border-radius:18px 18px 4px 18px;font-size:14px;font-weight:600}
.msg-agent-wrap{display:flex;gap:12px;align-items:flex-start}
.agent-icon{width:32px;height:32px;border-radius:50%;background:#111;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);flex-shrink:0;letter-spacing:1px;font-weight:700}
.agent-body{flex:1}
.processing-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;color:#555;font-size:13px;padding:8px 0;user-select:none}
.processing-toggle:hover{color:#e8e8e8}
.chevron{transition:transform .2s;font-size:10px}
.chevron.open{transform:rotate(0deg)}
.chevron.closed{transform:rotate(-90deg)}
.processing-log{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.log-card{background:#111;border:1px solid #1f1f1f;border-radius:8px;padding:12px 16px}
.log-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.log-card-meta{display:flex;align-items:center;gap:8px}
.lc-type{font-size:11px;color:#9e9e9e;font-weight:600}
.lc-tag{font-size:11px;padding:2px 8px;border-radius:3px;font-weight:600}
.lc-agent{background:rgba(200,169,110,.12);color:var(--accent);border:1px solid rgba(200,169,110,.2)}
.lc-system{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.lc-tool{background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.lc-final{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.lc-time{font-size:11px;color:#444}
.log-card-body{font-size:13px;color:#ccc;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg-final{background:#111;border:1px solid rgba(200,169,110,.2);border-radius:8px;padding:16px;font-size:14px;color:#e8e8e8;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.thinking-dots{display:flex;gap:6px;padding:12px 0}
.thinking-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:.3;animation:pulse 1.2s infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.chat-input-wrap{display:flex;gap:10px;padding:16px 0 0;border-top:1px solid #1f1f1f;margin-top:8px}
.chat-input{flex:1;background:#111;border:1px solid #2a2a2a;color:#e8e8e8;padding:12px 18px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;height:48px}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:#444}
.send-btn{background:linear-gradient(135deg,var(--accent),var(--accent-d));border:none;color:#0a0a0a;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s;flex-shrink:0}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,169,110,.3)}
.send-btn:disabled{opacity:.4;cursor:default;transform:none}
.main{max-width:1400px;margin:0 auto;padding:32px 40px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px}
.stat-label{font-size:11px;letter-spacing:2px;color:#555;margin-bottom:10px;text-transform:uppercase}
.stat-value{font-size:36px;font-weight:700;line-height:1}
.stat-sub{font-size:12px;color:#444;margin-top:8px}
.v-green{color:var(--green)}
.v-red{color:var(--red)}
.v-accent{color:var(--accent)}
.v-blue{color:var(--blue)}
.v-purple{color:var(--purple)}
.section-title{font-size:13px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1f1f1f}
table{width:100%;border-collapse:collapse}
.table-wrap{background:#111;border:1px solid #1f1f1f;border-radius:10px;overflow:hidden}
th{background:#0a0a0a;padding:12px 16px;text-align:left;font-size:11px;letter-spacing:1.5px;color:#555;text-transform:uppercase;font-weight:600;border-bottom:1px solid #1f1f1f}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #161616;color:#ccc}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px}
.b-winner{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-loser{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-sent{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.b-pending{background:rgba(255,255,255,.05);color:#555;border:1px solid #222}
.empty{text-align:center;padding:48px;color:#333;font-size:14px}
.toast{position:fixed;bottom:32px;right:32px;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;padding:14px 22px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;background:#111;border-top:1px solid #1f1f1f;border-radius:0 0 10px 10px}
.pg-btn{background:#0d0d0d;border:1px solid #2a2a2a;color:#9e9e9e;padding:6px 14px;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.pg-btn:disabled{opacity:.3;cursor:default}
.pg-info{font-size:12px;color:#555;padding:0 12px}
</style>
</head>
<body>
<header class="header">
  <div class="logo">Y2KS <span>ADMIN</span></div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">-</span>
    <button class="logout-btn" onclick="location.href='/admin/logout'">로그아웃</button>
  </div>
</header>
<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab(event,'stats')">이벤트 통계</button>
  <button class="tab-btn" onclick="switchTab(event,'agent')">멀티 에이전트</button>
</nav>

<div id="panel-events">
<main class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">남은 티켓</div>
      <div class="stat-value v-accent" id="s-left">-</div>
      <div class="stat-sub">/ 100장</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">당첨자</div>
      <div class="stat-value v-green" id="s-winner">-</div>
      <div class="stat-sub">쿠폰 발급 완료</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">낙첨자</div>
      <div class="stat-value v-red" id="s-loser">-</div>
      <div class="stat-sub">소진 후 참여</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">SQS 대기</div>
      <div class="stat-value v-blue" id="s-email">-</div>
      <div class="stat-sub">처리 대기 중</div>
    </div>
  </div>
  <div class="section-title" id="claims-title">클레임 내역</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>닉네임</th>
          <th>상태</th>
          <th>쿠폰 코드</th>
          <th>처리 시각</th>
        </tr>
      </thead>
      <tbody id="claims-body">
        <tr><td colspan="4" class="empty">로딩 중...</td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <button class="pg-btn" id="pg-first" onclick="gotoPage(1)">«</button>
      <button class="pg-btn" id="pg-prev" onclick="gotoPage(currentPage-1)">‹</button>
      <span class="pg-info" id="pg-info">-</span>
      <button class="pg-btn" id="pg-next" onclick="gotoPage(currentPage+1)">›</button>
      <button class="pg-btn" id="pg-last" onclick="gotoPage(totalPages)">»</button>
    </div>
  </div>
</main>
</div>

<div id="panel-agent" style="display:none">
  <div class="chat-panel">
    <div class="chat-header">
      <div>
        <div class="chat-title">Multi Agent Console</div>
        <div class="chat-sub">EKS · DB · Observe 전문가 에이전트에게 클러스터 운영 질문을 하세요</div>
      </div>
      <button class="diag-btn" id="diag-btn" onclick="runDiagnosis()">전체 자동 진단</button>
    </div>
    <div class="quick-actions">
      <button class="qa-btn" onclick="quickSend('현재 EKS 클러스터 전체 상태를 진단해줘')">전체 클러스터 진단</button>
      <button class="qa-btn" onclick="quickSend('지금 Pending 상태인 파드가 있어? 원인도 알려줘')">Pending 파드 확인</button>
      <button class="qa-btn" onclick="quickSend('SQS 큐 깊이와 Worker 스케일 상태 알려줘')">SQS 큐 현황</button>
      <button class="qa-btn" onclick="quickSend('OnDemand 대비 Spot 전환 시 비용 절감액 계산해줘')">비용 최적화 분석</button>
      <button class="qa-btn" onclick="quickSend('DynamoDB에서 봇 트래픽 패턴 탐지해줘')">봇 트래픽 탐지</button>
      <button class="qa-btn" onclick="quickSend('Karpenter 노드 현황과 CPU 한계 상태 확인해줘')">Karpenter 상태</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input class="chat-input" id="chat-input" placeholder="EKS 클러스터에 대해 질문하세요... (Enter: 전송)" onkeydown="handleKey(event)">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">전송</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
// ── 토스트 ──────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── 이벤트 로그 탭 ──────────────────────────────────
async function loadStats() {
  try {
    var res = await fetch('/api/admin/stats');
    var d = await res.json();
    document.getElementById('s-left').textContent = d.tickets_left;
    document.getElementById('s-winner').textContent = d.winner_count;
    document.getElementById('s-loser').textContent = d.loser_count;
    document.getElementById('s-email').textContent = d.queue_depth;
    document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    return d;
  } catch(e) { console.error(e); return null; }
}

var currentPage = 1;
var totalPages = 1;
var pageSize = 20;

function gotoPage(page) {
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  loadClaims();
}

async function loadClaims() {
  try {
    var res = await fetch('/api/admin/claims?page=' + currentPage + '&limit=' + pageSize);
    var d = await res.json();
    totalPages = d.pages || 1;
    var total = d.total || 0;
    document.getElementById('pg-prev').disabled = currentPage <= 1;
    document.getElementById('pg-first').disabled = currentPage <= 1;
    document.getElementById('pg-next').disabled = currentPage >= totalPages;
    document.getElementById('pg-last').disabled = currentPage >= totalPages;
    document.getElementById('pg-info').textContent = currentPage + ' / ' + totalPages + ' 페이지  (총 ' + total + '건)';
    document.getElementById('claims-title').textContent = '클레임 내역 (총 ' + total + '건)';
    var tbody = document.getElementById('claims-body');
    if (!d.items || d.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">데이터가 없습니다</td></tr>';
      return;
    }
    tbody.innerHTML = d.items.map(function(item) {
      var statusBadge = item.status === 'winner'
        ? '<span class="badge b-winner">당첨</span>'
        : '<span class="badge b-loser">낙첨</span>';
      var coupon = item.coupon_code || '-';
      var time = item.claimed_at ? item.claimed_at.replace('T', ' ').substring(0, 19) : '-';
      var nickname = item.request_id || '-';
      return '<tr><td style="font-size:13px;color:#ccc">' + nickname + '</td><td>' + statusBadge + '</td><td style="font-family:monospace;letter-spacing:2px;color:var(--accent)">' + coupon + '</td><td style="color:#555;font-size:12px">' + time + '</td></tr>';
    }).join('');
  } catch(e) { console.error(e); }
}

async function loadAll() {
  await Promise.all([loadStats(), loadClaims()]);
}

loadAll();
setInterval(loadAll, 3000);

// ── 탭 전환 ─────────────────────────────────────────
function switchTab(e, tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  e.target.classList.add('active');
  document.getElementById('panel-events').style.display = tab === 'stats' ? '' : 'none';
  document.getElementById('panel-agent').style.display = tab === 'agent' ? '' : 'none';
}

// ── 멀티에이전트 채팅 (실제 API 연동) ────────────────
var agentBusy = false;
// 에이전트 API 주소: 같은 도메인이면 상대경로, 아니면 직접 지정
var AGENT_API = window.AGENT_API_URL || 'https://constant-unviable-dispersal.ngrok-free.dev';

var AGENT_META = {
  eks:     { label: 'EKS Agent',     type: 'agent',  tag: 'EKS' },
  db:      { label: 'DB Agent',      type: 'tool',   tag: 'DB' },
  observe: { label: 'Observe Agent', type: 'system', tag: 'Observe' },
  final:   { label: '팀장 종합 판단', type: 'final',  tag: '팀장' }
};

function setAgentBusy(busy) {
  agentBusy = busy;
  document.getElementById('send-btn').disabled = busy;
  document.getElementById('diag-btn').disabled = busy;
  document.querySelectorAll('.qa-btn').forEach(function(b){ b.disabled = busy; });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function nowTime() {
  return new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function scrollBottom() {
  var msgs = document.getElementById('chat-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function appendUserMsg(text) {
  var el = document.createElement('div');
  el.className = 'msg-user';
  el.textContent = text;
  document.getElementById('chat-messages').appendChild(el);
  scrollBottom();
}

function createAgentWrap() {
  var wrap = document.createElement('div');
  wrap.className = 'msg-agent-wrap';
  wrap.innerHTML = '<div class="agent-icon">AI</div><div class="agent-body"></div>';
  document.getElementById('chat-messages').appendChild(wrap);
  scrollBottom();
  return wrap.querySelector('.agent-body');
}

function addThinking(body) {
  var el = document.createElement('div');
  el.className = 'thinking-dots';
  el.id = 'thinking-indicator';
  el.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
  body.appendChild(el);
  scrollBottom();
  return el;
}

function addProcessingToggle(body) {
  var tog = document.createElement('div');
  tog.className = 'processing-toggle';
  tog.innerHTML = '<span class="chevron open">&#9660;</span><span>전문가 분석 과정</span>';
  var log = document.createElement('div');
  log.className = 'processing-log';
  tog.onclick = function() {
    var c = tog.querySelector('.chevron');
    if (log.style.display === 'none') {
      log.style.display = '';
      c.className = 'chevron open';
      c.innerHTML = '&#9660;';
    } else {
      log.style.display = 'none';
      c.className = 'chevron closed';
      c.innerHTML = '&#9654;';
    }
  };
  body.appendChild(tog);
  body.appendChild(log);
  return log;
}

function addLogCard(container, type, tag, content) {
  var card = document.createElement('div');
  card.className = 'log-card';
  var escaped = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  card.innerHTML = '<div class="log-card-header"><div class="log-card-meta"><span class="lc-type">agent</span><span class="lc-tag lc-' + type + '">' + tag + '</span></div><span class="lc-time">' + nowTime() + '</span></div><div class="log-card-body">' + escaped + '</div>';
  container.appendChild(card);
  scrollBottom();
}

function addFinalMsg(body, content) {
  var el = document.createElement('div');
  el.className = 'msg-final';
  el.textContent = content;
  body.appendChild(el);
  scrollBottom();
}

function renderAgentResult(cards) {
  var body = createAgentWrap();
  var keys = Object.keys(cards);
  var expertKeys = keys.filter(function(k){ return k !== 'final'; });

  // 전문가가 여럿이면 processing log로 접을 수 있게
  if (expertKeys.length > 0) {
    var log = addProcessingToggle(body);
    expertKeys.forEach(function(k) {
      var meta = AGENT_META[k] || { label: k, type: 'agent', tag: k };
      addLogCard(log, meta.type, meta.label, cards[k]);
    });
  }

  // final: 단일 전문가면 그게 곧 최종 / 복수면 팀장 종합
  var finalKey = keys.length === 1 ? keys[0] : 'final';
  if (cards[finalKey]) {
    // 단일 전문가 + final이 같으면 중복 안 보임
    var isDup = expertKeys.length === 1 && cards[finalKey] === cards[expertKeys[0]];
    if (!isDup) {
      addFinalMsg(body, cards[finalKey]);
    } else {
      addFinalMsg(body, cards[expertKeys[0]]);
    }
  }
}

function quickSend(text) {
  if (agentBusy) return;
  document.getElementById('chat-input').value = text;
  sendMessage();
}

async function sendMessage() {
  if (agentBusy) return;
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;
  setAgentBusy(true);
  input.value = '';

  appendUserMsg(text);
  var body = createAgentWrap();
  var thinking = addThinking(body);

  try {
    var res = await fetch(AGENT_API + '/api/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    var data = await res.json();
    thinking.remove();
    if (data.ok && data.result) {
      renderAgentResult(data.result);
      // 이전 wrap 제거 (비어있으면)
      if (!body.hasChildNodes()) body.parentElement.remove();
    } else {
      addFinalMsg(body, '오류: ' + (data.error || '알 수 없는 오류'));
    }
  } catch(e) {
    thinking.remove();
    addFinalMsg(body, '연결 오류: API 서버에 접속할 수 없습니다. (' + AGENT_API + ')');
  }

  setAgentBusy(false);
}

async function runDiagnosis() {
  if (agentBusy) return;
  setAgentBusy(true);

  appendUserMsg('전체 자동 진단 실행');
  var body = createAgentWrap();
  var thinking = addThinking(body);

  try {
    var res = await fetch(AGENT_API + '/api/auto-diagnosis', { method: 'POST' });
    var data = await res.json();
    thinking.remove();
    if (data.ok && data.result) {
      addFinalMsg(body, data.result);
    } else {
      addFinalMsg(body, '오류: ' + (data.error || '알 수 없는 오류'));
    }
  } catch(e) {
    thinking.remove();
    addFinalMsg(body, '연결 오류: API 서버에 접속할 수 없습니다. (' + AGENT_API + ')');
  }

  setAgentBusy(false);
}
</script>
