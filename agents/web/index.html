<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Y2KS AIOps Console</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
    --orange: #f0883e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    font-size: 15px; font-weight: 700; letter-spacing: 2px;
    color: var(--accent);
  }
  .badge {
    background: var(--accent-dim); color: var(--accent);
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    padding: 2px 8px; border-radius: 20px; border: 1px solid var(--accent);
  }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-label { font-size: 12px; color: var(--text-muted); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-title {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px;
  }
  .quick-btn {
    width: 100%; text-align: left; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-size: 12px;
    cursor: pointer; margin-bottom: 6px; transition: all .15s;
    font-family: inherit;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .quick-btn .icon { margin-right: 8px; }

  .agent-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; font-size: 13px;
  }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .agent-name { font-weight: 500; }
  .agent-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Message ── */
  .msg { display: flex; gap: 12px; max-width: 900px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .avatar.user { background: var(--accent-dim); border: 1px solid var(--accent); }
  .avatar.assistant { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px; border-radius: 10px;
    font-size: 13px; line-height: 1.7;
    max-width: 720px;
  }
  .bubble.user {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--text);
  }
  .bubble.assistant {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  /* ── Agent Result Cards ── */
  .agent-cards { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .agent-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .agent-card-header {
    padding: 8px 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .agent-card-body {
    padding: 12px 14px;
    font-size: 12px; line-height: 1.8;
    white-space: pre-wrap;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    max-height: 300px;
    overflow-y: auto;
  }
  .final-card .agent-card-header { background: #1a2332; border-color: var(--accent); }
  .final-card { border-color: var(--accent); }
  .final-card .agent-card-body { color: var(--text); font-family: 'Inter', sans-serif; }

  /* ── Thinking indicator ── */
  .thinking {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px; color: var(--text-muted);
  }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: bounce .8s infinite;
  }
  .thinking-dot:nth-child(2) { animation-delay: .15s; }
  .thinking-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

  /* ── Welcome ── */
  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    color: var(--text-muted);
  }
  .welcome-icon { font-size: 48px; }
  .welcome h2 { font-size: 20px; color: var(--text); font-weight: 600; }
  .welcome p { font-size: 13px; max-width: 400px; text-align: center; line-height: 1.7; }

  /* ── Input ── */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-wrap {
    flex: 1; position: relative;
  }
  textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 12px 14px;
    font-size: 13px; font-family: 'Inter', sans-serif;
    resize: none; outline: none; transition: border-color .15s;
    line-height: 1.5; max-height: 120px;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 42px; height: 42px; border-radius: 8px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .15s; flex-shrink: 0;
  }
  .send-btn:hover { background: #79b8ff; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .diag-btn {
    padding: 0 16px; height: 42px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 12px;
    font-family: 'Inter', sans-serif; transition: all .15s; white-space: nowrap;
  }
  .diag-btn:hover { border-color: var(--purple); color: var(--purple); }
  .diag-btn:disabled { opacity: .4; cursor: not-allowed; }

  .hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  /* ── Timestamp ── */
  .ts { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-align: right; }
  .msg.assistant .ts { text-align: left; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const AGENTS = [
  { key: 'eks',     label: 'EKS Agent',     color: '#58a6ff', desc: 'kubectl · KEDA · Karpenter · SQS' },
  { key: 'db',      label: 'DB Agent',       color: '#3fb950', desc: 'DynamoDB · 봇탐지 · 참여분석' },
  { key: 'observe', label: 'Observe Agent',  color: '#f0883e', desc: '리소스 · 비용 · 성능' },
  { key: 'final',   label: '팀장 종합 판단', color: '#bc8cff', desc: '교차분석 · 근본원인 · 우선순위' },
];

const QUICK = [
  { icon: '[진단]', label: '전체 클러스터 진단',   msg: '현재 EKS 클러스터 전체 상태를 진단해줘' },
  { icon: '[파드]', label: 'Pending 파드 확인',   msg: '지금 Pending 상태인 파드가 있어? 원인도 알려줘' },
  { icon: '[SQS]',  label: 'SQS 큐 현황',         msg: 'SQS 큐 깊이와 Worker 스케일 상태 알려줘' },
  { icon: '[비용]', label: '비용 최적화 분석',     msg: 'OnDemand 대비 Spot 전환 시 비용 절감액 계산해줘' },
  { icon: '[봇]',   label: '봇 트래픽 탐지',       msg: 'DynamoDB에서 봇 트래픽 패턴 탐지해줘' },
  { icon: '[K8s]',  label: 'Karpenter 상태',      msg: 'Karpenter 노드 현황과 CPU 한계 상태 확인해줘' },
];

function AgentCard({ agentKey, content }) {
  const a = AGENTS.find(x => x.key === agentKey) || { label: agentKey, color: '#7d8590' };
  const isFinal = agentKey === 'final';
  return (
    <div className={`agent-card${isFinal ? ' final-card' : ''}`}>
      <div className="agent-card-header">
        <span style={{ color: a.color }}>●</span>
        <span style={{ color: a.color }}>{a.label}</span>
      </div>
      <div className="agent-card-body">{content}</div>
    </div>
  );
}

function Message({ msg }) {
  const isUser = msg.role === 'user';
  const ts = new Date(msg.ts).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

  return (
    <div className={`msg ${msg.role}`}>
      <div className={`avatar ${msg.role}`}>
        {isUser ? 'U' : 'AI'}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4, flex: 1 }}>
        {isUser ? (
          <div className="bubble user">{msg.content}</div>
        ) : msg.cards ? (
          <div className="agent-cards">
            {Object.entries(msg.cards).filter(([k, v]) => {
              // 단일 전문가일 때 final이 전문가 결과와 동일하면 숨김
              if (k === 'final') {
                const experts = Object.entries(msg.cards).filter(([ek]) => ek !== 'final');
                if (experts.length === 1 && experts[0][1] === v) return false;
              }
              return true;
            }).map(([k, v]) => (
              <AgentCard key={k} agentKey={k} content={v} />
            ))}
          </div>
        ) : (
          <div className="bubble assistant">{msg.content}</div>
        )}
        <div className="ts">{ts}</div>
      </div>
    </div>
  );
}

function Thinking() {
  return (
    <div className="msg assistant">
      <div className="avatar assistant">AI</div>
      <div className="thinking">
        <div className="thinking-dots">
          <div className="thinking-dot" />
          <div className="thinking-dot" />
          <div className="thinking-dot" />
        </div>
        에이전트 분석 중...
      </div>
    </div>
  );
}

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  const send = useCallback(async (text) => {
    if (!text.trim() || loading) return;
    const q = text.trim();
    setInput('');
    setMessages(prev => [...prev, { role: 'user', content: q, ts: Date.now() }]);
    setLoading(true);

    try {
      const res = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: q }),
      });
      const data = await res.json();
      if (data.ok) {
        setMessages(prev => [...prev, {
          role: 'assistant', cards: data.result, ts: Date.now()
        }]);
      } else {
        setMessages(prev => [...prev, {
          role: 'assistant', content: `오류: ${data.error}`, ts: Date.now()
        }]);
      }
    } catch (e) {
      setMessages(prev => [...prev, {
        role: 'assistant', content: `연결 오류: ${e.message}`, ts: Date.now()
      }]);
    } finally {
      setLoading(false);
    }
  }, [loading]);

  const runDiagnosis = useCallback(async () => {
    if (loading) return;
    setMessages(prev => [...prev, {
      role: 'user', content: '전체 자동 진단 실행', ts: Date.now()
    }]);
    setLoading(true);
    try {
      const res = await fetch('/api/auto-diagnosis', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        setMessages(prev => [...prev, {
          role: 'assistant',
          cards: { final: data.result },
          ts: Date.now()
        }]);
      } else {
        setMessages(prev => [...prev, {
          role: 'assistant', content: `오류: ${data.error}`, ts: Date.now()
        }]);
      }
    } catch(e) {
      setMessages(prev => [...prev, {
        role: 'assistant', content: `연결 오류: ${e.message}`, ts: Date.now()
      }]);
    } finally {
      setLoading(false);
    }
  }, [loading]);

  const onKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input);
    }
  };

  return (
    <>
      <div className="header">
        <div className="header-left">
          <span className="logo">Y2KS</span>
          <span className="badge">AIOps Console</span>
        </div>
        <div className="header-right">
          <div className="status-dot" />
          <span className="status-label">Agent Online</span>
        </div>
      </div>

      <div className="layout">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-title">Quick Actions</div>
            {QUICK.map(q => (
              <button key={q.label} className="quick-btn" onClick={() => send(q.msg)} disabled={loading}>
                <span className="icon">{q.icon}</span>{q.label}
              </button>
            ))}
          </div>

          <div className="sidebar-section">
            <div className="sidebar-title">Active Agents</div>
            {AGENTS.map(a => (
              <div key={a.key} className="agent-item">
                <div className="agent-dot" style={{ background: a.color, boxShadow: `0 0 5px ${a.color}` }} />
                <div>
                  <div className="agent-name" style={{ color: a.color }}>{a.label}</div>
                  <div className="agent-desc">{a.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Chat */}
        <div className="chat-area">
          <div className="messages">
            {messages.length === 0 && !loading ? (
              <div className="welcome">
                <div className="welcome-icon">Y2KS</div>
                <h2>Y2KS AIOps Agent</h2>
                <p>EKS 클러스터를 실시간 모니터링하고 장애를 분석합니다.<br />왼쪽 Quick Actions를 클릭하거나 직접 질문하세요.</p>
              </div>
            ) : (
              messages.map((m, i) => <Message key={i} msg={m} />)
            )}
            {loading && <Thinking />}
            <div ref={bottomRef} />
          </div>

          <div className="input-area">
            <div className="input-row">
              <div className="input-wrap">
                <textarea
                  ref={textareaRef}
                  rows={1}
                  placeholder="EKS 클러스터에 대해 질문하세요... (Enter: 전송, Shift+Enter: 줄바꿈)"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={onKey}
                  disabled={loading}
                />
              </div>
              <button className="diag-btn" onClick={runDiagnosis} disabled={loading}>
                전체 진단
              </button>
              <button className="send-btn" onClick={() => send(input)} disabled={loading || !input.trim()}>
                전송
              </button>
            </div>
            <div className="hint">EKS · KEDA · Karpenter · DynamoDB · SQS 실시간 분석</div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
