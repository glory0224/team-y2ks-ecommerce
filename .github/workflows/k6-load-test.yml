name: Load Test (k6 to S3/Athena)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Application URL (e.g. http://a1b2c3...elb.amazonaws.com)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  k6-load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Y2ksGitHubK6Role
          aws-region: ap-northeast-2

      - name: Setup k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E341F7867E1099B7026512D220546F
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 load test (JSON output only)
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          k6 run \
            --out json=result.json \
            k6/coupon-load-test.js || true

      - name: Generate run ID
        id: run_info
        run: |
          RUN_ID=$(date +%Y%m%d_%H%M%S)
          RUN_DATE=$(date +%Y-%m-%d)
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "run_date=${RUN_DATE}" >> $GITHUB_OUTPUT

      - name: Convert k6 output to partitioned JSONL
        run: |
          # k6 --out json generates streaming JSON strings (JSONL)
          # We use jq to add run_date and run_id to every line so Athena can partition it easily.
          cat result.json | while IFS= read -r line; do
            echo "$line" | jq -c '. + {"run_id": "${{ steps.run_info.outputs.run_id }}", "run_date": "${{ steps.run_info.outputs.run_date }}"}'
          done > result_enriched.jsonl

      - name: Upload to S3 (Bronze layer)
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_PATH="s3://y2ks-datalake-${ACCOUNT_ID}"
          
          # 파티션 구조로 업로드: run_date=YYYY-MM-DD/run_id=RUN_ID/
          aws s3 cp result_enriched.jsonl \
            "${S3_PATH}/k6/raw/run_date=${{ steps.run_info.outputs.run_date }}/run_id=${{ steps.run_info.outputs.run_id }}/result.jsonl"
          
          echo "S3 업로드 완료: run_id=${{ steps.run_info.outputs.run_id }}"

      - name: Register Athena partition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          aws athena start-query-execution \
            --query-string "ALTER TABLE k6_raw ADD IF NOT EXISTS PARTITION (run_date='${{ steps.run_info.outputs.run_date }}', run_id='${{ steps.run_info.outputs.run_id }}') LOCATION 's3://y2ks-datalake-${ACCOUNT_ID}/k6/raw/run_date=${{ steps.run_info.outputs.run_date }}/run_id=${{ steps.run_info.outputs.run_id }}/';" \
            --query-execution-context Database=y2ks_analytics \
            --work-group y2ks-analytics \
            --region ap-northeast-2

      - name: Summary with Athena query hint
        if: always()
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "## k6 Load Test 완료 (S3 Datalake 저장)" >> $GITHUB_STEP_SUMMARY
          echo "- \`run_id\`: ${{ steps.run_info.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 경로**: \`s3://y2ks-datalake-${ACCOUNT_ID}/k6/raw/run_date=${{ steps.run_info.outputs.run_date }}/run_id=${{ steps.run_info.outputs.run_id }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Athena 즉시 분석 쿼리" >> $GITHUB_STEP_SUMMARY
          echo 'AWS Console > Athena 탭에 가서 아래 쿼리를 바로 실행하세요!' >> $GITHUB_STEP_SUMMARY
          echo '```sql' >> $GITHUB_STEP_SUMMARY
          echo "SELECT metric, AVG(data.value) AS avg_val, MAX(data.value) AS max_val, COUNT(*) AS cnt" >> $GITHUB_STEP_SUMMARY
          echo "FROM y2ks_analytics.k6_raw" >> $GITHUB_STEP_SUMMARY
          echo "WHERE run_id = '${{ steps.run_info.outputs.run_id }}'" >> $GITHUB_STEP_SUMMARY
          echo "GROUP BY metric ORDER BY avg_val DESC;" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
