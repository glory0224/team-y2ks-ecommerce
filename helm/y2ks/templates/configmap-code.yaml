apiVersion: v1
kind: ConfigMap
metadata:
  name: y2ks-app-code
data:
  app.py: |
    from flask import Flask, jsonify, request, Response
    import boto3, redis, json, os, random, string, hashlib, threading, queue, uuid, time
    from prometheus_flask_exporter import PrometheusMetrics
    try:
        import anthropic as _anthropic_lib
        _HAS_ANTHROPIC = True
    except ImportError:
        _HAS_ANTHROPIC = False

    app = Flask(__name__)
    metrics = PrometheusMetrics(
        app,
        excluded_paths=['/metrics'],
        group_by='url_rule',
        default_labels={'app': 'y2ks-frontend'}
    )

    REDIS_HOST = os.environ.get('REDIS_HOST', 'redis-service')
    AWS_REGION = os.environ.get('AWS_REGION', 'ap-northeast-2')
    QUEUE_URL = os.environ.get('SQS_QUEUE_URL', '')
    DDB_TABLE = os.environ.get('DDB_TABLE', 'y2ks-coupon-claims')
    TICKET_COUNT = int(os.environ.get('TICKET_COUNT', '100'))

    r = redis.Redis(host=REDIS_HOST, port=6379, db=0, decode_responses=True)
    sqs_client = boto3.client('sqs', region_name=AWS_REGION)

    def hash_password(password):
        return hashlib.sha256(password.encode()).hexdigest()

    MAIN_HTML = open('/app/main.html').read()
    EVENT_HTML = open('/app/event.html').read()

    @app.route('/')
    def index():
        return MAIN_HTML

    @app.route('/event')
    def event():
        return EVENT_HTML

    def restore_tickets_from_ddb():
        """Redis 재시작 시 DynamoDB 당첨 수 기반으로 남은 티켓 복구"""
        try:
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            scan_kw = {
                'FilterExpression': '#s = :w',
                'ExpressionAttributeNames': {'#s': 'status'},
                'ExpressionAttributeValues': {':w': 'winner'},
                'Select': 'COUNT'
            }
            winners = 0
            while True:
                resp = table.scan(**scan_kw)
                winners += resp['Count']
                if 'LastEvaluatedKey' not in resp:
                    break
                scan_kw['ExclusiveStartKey'] = resp['LastEvaluatedKey']
            return max(TICKET_COUNT - winners, 0)
        except Exception as e:
            print(f'DynamoDB restore error: {e}', flush=True)
            return 0

    @app.route('/api/tickets')
    def get_tickets():
        val = r.get('tickets')
        if val is None:
            remaining = restore_tickets_from_ddb()
            r.set('tickets', remaining, nx=True)
            val = str(remaining)
        return jsonify({'remaining': int(val)})

    @app.route('/api/claim', methods=['POST'])
    def claim():
        data = request.get_json() or {}
        nickname = data.get('nickname', '').strip()
        password = data.get('password', '').strip()
        if not nickname or not password:
            return jsonify({'error': 'invalid_input', 'message': '닉네임과 비밀번호를 입력해주세요.'}), 400
        # Redis SADD로 중복 참여 차단 (0이면 이미 존재)
        added = r.sadd('participants', nickname)
        if added == 0:
            return jsonify({'error': 'duplicate', 'message': '이미 참여하셨습니다.'}), 409
        password_hash = hash_password(password)
        r.setex(f'result:{nickname}', 600, 'pending')
        r.setex(f'phash:{nickname}', 600, password_hash)
        try:
            sqs_client.send_message(
                QueueUrl=QUEUE_URL,
                MessageBody=json.dumps({'request_id': nickname, 'password_hash': password_hash, 'type': 'claim'})
            )
        except Exception as e:
            r.srem('participants', nickname)
            r.delete(f'result:{nickname}')
            r.delete(f'phash:{nickname}')
            return jsonify({'error': 'queue_unavailable', 'message': str(e)}), 503
        return jsonify({'request_id': nickname, 'status': 'queued'})

    @app.route('/api/check/<request_id>')
    def check_result(request_id):
        result = r.get(f'result:{request_id}')
        return jsonify({'status': result if result else 'pending'})

    @app.route('/api/result', methods=['POST'])
    def get_result():
        data = request.get_json() or {}
        nickname = data.get('nickname', '').strip()
        password = data.get('password', '').strip()
        if not nickname or not password:
            return jsonify({'success': False, 'message': '닉네임과 비밀번호를 입력해주세요.'}), 400
        try:
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            resp = table.get_item(Key={'request_id': nickname})
            item = resp.get('Item')
            if not item:
                return jsonify({'success': False, 'message': '참여 기록이 없습니다.'})
            if item.get('password_hash') != hash_password(password):
                return jsonify({'success': False, 'message': '비밀번호가 올바르지 않습니다.'})
            return jsonify({
                'success': True,
                'status': item.get('status'),
                'coupon_code': item.get('coupon_code', '')
            })
        except Exception as e:
            return jsonify({'success': False, 'message': str(e)}), 500

    @app.route('/admin')
    def admin():
        return open('/app/admin.html').read()

    @app.route('/api/admin/stats')
    def admin_stats():
        tickets_left = r.get('tickets')
        if tickets_left is None:
            tickets_left = 100
        tickets_left = int(tickets_left)
        claimed = TICKET_COUNT - max(tickets_left, 0)
        try:
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            winner_count = loser_count = 0
            scan_kw = {'ProjectionExpression': '#s', 'ExpressionAttributeNames': {'#s': 'status'}}
            while True:
                resp = table.scan(**scan_kw)
                for item in resp.get('Items', []):
                    if item.get('status') == 'winner':
                        winner_count += 1
                    elif item.get('status') == 'loser':
                        loser_count += 1
                if 'LastEvaluatedKey' not in resp:
                    break
                scan_kw['ExclusiveStartKey'] = resp['LastEvaluatedKey']
        except Exception as e:
            winner_count = loser_count = 0
        try:
            sqs_resp = sqs_client.get_queue_attributes(
                QueueUrl=QUEUE_URL,
                AttributeNames=['ApproximateNumberOfMessages', 'ApproximateNumberOfMessagesNotVisible']
            )
            queue_depth = int(sqs_resp['Attributes'].get('ApproximateNumberOfMessages', 0))
            in_flight = int(sqs_resp['Attributes'].get('ApproximateNumberOfMessagesNotVisible', 0))
        except Exception:
            queue_depth = in_flight = 0
        return jsonify({
            'tickets_left': max(tickets_left, 0),
            'tickets_claimed': claimed,
            'winner_count': winner_count,
            'loser_count': loser_count,
            'queue_depth': queue_depth,
            'in_flight': in_flight
        })

    @app.route('/api/admin/claims')
    def admin_claims():
        try:
            page = max(1, int(request.args.get('page', 1)))
            limit = max(1, min(100, int(request.args.get('limit', 20))))
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            items = []
            scan_kw = {}
            while True:
                result = table.scan(**scan_kw)
                items.extend(result.get('Items', []))
                if 'LastEvaluatedKey' not in result:
                    break
                scan_kw['ExclusiveStartKey'] = result['LastEvaluatedKey']
            items = sorted(items, key=lambda x: x.get('claimed_at', ''), reverse=True)
            total = len(items)
            start = (page - 1) * limit
            pages = max(1, (total + limit - 1) // limit)
            return jsonify({'items': items[start:start+limit], 'total': total, 'page': page, 'limit': limit, 'pages': pages})
        except Exception as e:
            return jsonify({'items': [], 'total': 0, 'page': 1, 'limit': 20, 'pages': 1, 'error': str(e)})

    @app.route('/api/admin/reset', methods=['POST'])
    def admin_reset():
        keep_logs = (request.get_json(silent=True) or {}).get('keep_logs', False)
        r.set('tickets', TICKET_COUNT)
        r.delete('participants')
        try:
            sqs_client.purge_queue(QueueUrl=QUEUE_URL)
        except Exception as e:
            print(f'SQS flush warning: {e}', flush=True)
        if not keep_logs:
            try:
                ddb_r = boto3.resource('dynamodb', region_name=AWS_REGION)
                table = ddb_r.Table(DDB_TABLE)
                scan = table.scan(ProjectionExpression='request_id')
                with table.batch_writer() as batch:
                    for item in scan.get('Items', []):
                        batch.delete_item(Key={'request_id': item['request_id']})
                while 'LastEvaluatedKey' in scan:
                    scan = table.scan(ProjectionExpression='request_id', ExclusiveStartKey=scan['LastEvaluatedKey'])
                    with table.batch_writer() as batch:
                        for item in scan.get('Items', []):
                            batch.delete_item(Key={'request_id': item['request_id']})
            except Exception as e:
                print(f'DynamoDB reset warning: {e}', flush=True)
        msg = f'티켓 {TICKET_COUNT}장, SQS 큐, 참여자 목록이 초기화되었습니다.' if keep_logs else f'티켓 {TICKET_COUNT}장, SQS 큐, DynamoDB, 참여자 목록이 초기화되었습니다.'
        return jsonify({'success': True, 'message': msg})

    # ── AI 멀티에이전트 채팅 기능 ────────────────────────────────────
