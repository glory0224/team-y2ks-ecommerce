apiVersion: v1
kind: ConfigMap
metadata:
  name: y2ks-app-code
data:
  app.py: |
    from flask import Flask, jsonify, request, session, redirect
    from functools import wraps
    import boto3, redis, json, os, random, string, re, base64, bcrypt, hashlib, urllib.request, urllib.error
    from prometheus_flask_exporter import PrometheusMetrics

    app = Flask(__name__)
    metrics = PrometheusMetrics(
        app,
        excluded_paths=['/metrics'],
        group_by='url_rule',
        default_labels={'app': 'y2ks-frontend'}
    )

    REDIS_HOST = os.environ.get('REDIS_HOST', 'redis-service')
    AWS_REGION = os.environ.get('AWS_REGION', 'ap-northeast-2')
    QUEUE_URL = os.environ.get('SQS_QUEUE_URL', '')
    DDB_TABLE = os.environ.get('DDB_TABLE', 'y2ks-coupon-claims')
    TICKET_COUNT = int(os.environ.get('TICKET_COUNT', '100'))
    ADMIN_TOKEN = os.environ.get('ADMIN_TOKEN', '')

    app.secret_key = hashlib.sha256(f'y2ks-{ADMIN_TOKEN}'.encode()).hexdigest()

    r = redis.Redis(host=REDIS_HOST, port=6379, db=0, decode_responses=True)
    sqs_client = boto3.client('sqs', region_name=AWS_REGION)

    NICKNAME_RE = re.compile(r'^[a-zA-Z0-9가-힣_-]+$')

    def hash_password(password):
        return bcrypt.hashpw(password.encode(), bcrypt.gensalt(rounds=4)).decode()

    def verify_password(password, hashed):
        try:
            return bcrypt.checkpw(password.encode(), hashed.encode())
        except Exception:
            return False

    def validate_claim(nickname, password):
        if not nickname or len(nickname) > 20:
            return '닉네임은 1-20자 사이여야 합니다.'
        if not NICKNAME_RE.match(nickname):
            return '닉네임에 허용되지 않는 문자가 포함되어 있습니다.'
        if not password or len(password) < 4:
            return '비밀번호는 최소 4자 이상이어야 합니다.'
        return None

    def require_admin(f):
        @wraps(f)
        def decorated(*args, **kwargs):
            if not ADMIN_TOKEN:
                return f(*args, **kwargs)
            if session.get('admin_authenticated'):
                return f(*args, **kwargs)
            if request.headers.get('X-Admin-Token') == ADMIN_TOKEN:
                return f(*args, **kwargs)
            return jsonify({'error': 'Unauthorized'}), 401
        return decorated

    @app.route('/admin/login', methods=['GET', 'POST'])
    def admin_login():
        if request.method == 'POST':
            token = request.form.get('token', '').strip()
            if token == ADMIN_TOKEN:
                session['admin_authenticated'] = True
                return redirect('/admin')
            return _login_page(error=True)
        return _login_page()

    def _login_page(error=False):
        err_html = '<p style="color:#ef4444;font-size:13px;margin-top:10px">비밀번호가 올바르지 않습니다.</p>' if error else ''
        return (
            '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">'
            '<title>Y2KS Admin Login</title>'
            '<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">'
            '<style>'
            '*{margin:0;padding:0;box-sizing:border-box}'
            'body{font-family:"Outfit",sans-serif;background:#0d0d0d;color:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh}'
            '.box{background:#111;border:1px solid #1f1f1f;border-radius:12px;padding:48px 40px;width:100%;max-width:360px}'
            '.logo{font-size:20px;font-weight:800;letter-spacing:8px;color:#fff;margin-bottom:8px}'
            '.logo span{color:#c8a96e;font-size:11px;font-weight:400;letter-spacing:3px;margin-left:8px;vertical-align:middle}'
            '.sub{font-size:12px;color:#444;margin-bottom:32px}'
            'label{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase}'
            'input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#e8e8e8;padding:12px 16px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-top:8px;transition:border-color .2s}'
            'input:focus{border-color:#c8a96e}'
            'button{width:100%;margin-top:20px;background:linear-gradient(135deg,#c8a96e,#a8803e);border:none;color:#0a0a0a;padding:13px;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s}'
            'button:hover{opacity:.85}'
            '</style></head>'
            '<body><div class="box">'
            '<div class="logo">Y2KS <span>ADMIN</span></div>'
            '<div class="sub">관리자 인증이 필요합니다</div>'
            '<form method="POST">'
            '<label>비밀번호</label>'
            '<input type="password" name="token" placeholder="어드민 토큰 입력" autofocus>'
            + err_html +
            '<button type="submit">로그인</button>'
            '</form></div></body></html>'
        )

    @app.route('/admin/logout')
    def admin_logout():
        session.clear()
        return redirect('/')

    MAIN_HTML = open('/app/main.html').read()
    EVENT_HTML = open('/app/event.html').read()

    @app.route('/')
    def index():
        return MAIN_HTML

    @app.route('/event')
    def event():
        return EVENT_HTML

    def restore_tickets_from_ddb():
        """Redis 재시작 시 DynamoDB 당첨 수 기반으로 남은 티켓 복구"""
        try:
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            scan_kw = {
                'FilterExpression': '#s = :w',
                'ExpressionAttributeNames': {'#s': 'status'},
                'ExpressionAttributeValues': {':w': 'winner'},
                'Select': 'COUNT'
            }
            winners = 0
            while True:
                resp = table.scan(**scan_kw)
                winners += resp['Count']
                if 'LastEvaluatedKey' not in resp:
                    break
                scan_kw['ExclusiveStartKey'] = resp['LastEvaluatedKey']
            return max(TICKET_COUNT - winners, 0)
        except Exception as e:
            print(f'DynamoDB restore error: {e}', flush=True)
            return 0

    @app.route('/api/tickets')
    def get_tickets():
        val = r.get('tickets')
        if val is None:
            remaining = restore_tickets_from_ddb()
            r.set('tickets', remaining, nx=True)
            val = str(remaining)
        return jsonify({'remaining': int(val)})

    @app.route('/api/claim', methods=['POST'])
    def claim():
        data = request.get_json() or {}
        nickname = data.get('nickname', '').strip()
        password = data.get('password', '').strip()
        err = validate_claim(nickname, password)
        if err:
            return jsonify({'error': 'invalid_input', 'message': err}), 400
        # Redis SADD로 중복 참여 차단 (0이면 이미 존재)
        added = r.sadd('participants', nickname)
        if added == 0:
            return jsonify({'error': 'duplicate', 'message': '이미 참여하셨습니다.'}), 409
        password_hash = hash_password(password)
        r.setex(f'result:{nickname}', 600, 'pending')
        r.setex(f'phash:{nickname}', 600, password_hash)
        try:
            sqs_client.send_message(
                QueueUrl=QUEUE_URL,
                MessageBody=json.dumps({'request_id': nickname, 'password_hash': password_hash, 'type': 'claim'})
            )
        except Exception as e:
            r.srem('participants', nickname)
            r.delete(f'result:{nickname}')
            r.delete(f'phash:{nickname}')
            return jsonify({'error': 'queue_unavailable', 'message': str(e)}), 503
        return jsonify({'request_id': nickname, 'status': 'queued'})

    @app.route('/api/check/<request_id>')
    def check_result(request_id):
        result = r.get(f'result:{request_id}')
        return jsonify({'status': result if result else 'pending'})

    @app.route('/api/result', methods=['POST'])
    def get_result():
        data = request.get_json() or {}
        nickname = data.get('nickname', '').strip()
        password = data.get('password', '').strip()
        if not nickname or not password:
            return jsonify({'success': False, 'message': '닉네임과 비밀번호를 입력해주세요.'}), 400
        try:
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            resp = table.get_item(Key={'request_id': nickname})
            item = resp.get('Item')
            if not item:
                return jsonify({'success': False, 'message': '참여 기록이 없습니다.'})
            if not verify_password(password, item.get('password_hash', '')):
                return jsonify({'success': False, 'message': '비밀번호가 올바르지 않습니다.'})
            return jsonify({
                'success': True,
                'status': item.get('status'),
                'coupon_code': item.get('coupon_code', '')
            })
        except Exception as e:
            return jsonify({'success': False, 'message': str(e)}), 500

    @app.route('/admin')
    def admin():
        if ADMIN_TOKEN and not session.get('admin_authenticated'):
            return redirect('/admin/login')
        return open('/app/admin.html').read()

    @app.route('/api/admin/stats')
    @require_admin
    def admin_stats():
        tickets_left = r.get('tickets')
        if tickets_left is None:
            tickets_left = 100
        tickets_left = int(tickets_left)
        claimed = TICKET_COUNT - max(tickets_left, 0)
        try:
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            winner_count = loser_count = 0
            scan_kw = {'ProjectionExpression': '#s', 'ExpressionAttributeNames': {'#s': 'status'}}
            while True:
                resp = table.scan(**scan_kw)
                for item in resp.get('Items', []):
                    if item.get('status') == 'winner':
                        winner_count += 1
                    elif item.get('status') == 'loser':
                        loser_count += 1
                if 'LastEvaluatedKey' not in resp:
                    break
                scan_kw['ExclusiveStartKey'] = resp['LastEvaluatedKey']
        except Exception as e:
            winner_count = loser_count = 0
        try:
            sqs_resp = sqs_client.get_queue_attributes(
                QueueUrl=QUEUE_URL,
                AttributeNames=['ApproximateNumberOfMessages', 'ApproximateNumberOfMessagesNotVisible']
            )
            queue_depth = int(sqs_resp['Attributes'].get('ApproximateNumberOfMessages', 0))
            in_flight = int(sqs_resp['Attributes'].get('ApproximateNumberOfMessagesNotVisible', 0))
        except Exception:
            queue_depth = in_flight = 0
        return jsonify({
            'tickets_left': max(tickets_left, 0),
            'tickets_claimed': claimed,
            'winner_count': winner_count,
            'loser_count': loser_count,
            'queue_depth': queue_depth,
            'in_flight': in_flight
        })

    @app.route('/api/admin/claims')
    @require_admin
    def admin_claims():
        try:
            page = max(1, int(request.args.get('page', 1)))
            limit = max(1, min(100, int(request.args.get('limit', 20))))
            ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
            table = ddb.Table(DDB_TABLE)
            items = []
            scan_kw = {}
            while True:
                result = table.scan(**scan_kw)
                items.extend(result.get('Items', []))
                if 'LastEvaluatedKey' not in result:
                    break
                scan_kw['ExclusiveStartKey'] = result['LastEvaluatedKey']
            items = sorted(items, key=lambda x: x.get('claimed_at', ''), reverse=True)
            total = len(items)
            start = (page - 1) * limit
            pages = max(1, (total + limit - 1) // limit)
            return jsonify({'items': items[start:start+limit], 'total': total, 'page': page, 'limit': limit, 'pages': pages})
        except Exception as e:
            return jsonify({'items': [], 'total': 0, 'page': 1, 'limit': 20, 'pages': 1, 'error': str(e)})

    @app.route('/api/admin/reset', methods=['POST'])
    @require_admin
    def admin_reset():
        keep_logs = (request.get_json(silent=True) or {}).get('keep_logs', False)
        r.set('tickets', TICKET_COUNT)
        r.delete('participants')
        try:
            sqs_client.purge_queue(QueueUrl=QUEUE_URL)
        except Exception as e:
            print(f'SQS flush warning: {e}', flush=True)
        if not keep_logs:
            try:
                ddb_r = boto3.resource('dynamodb', region_name=AWS_REGION)
                table = ddb_r.Table(DDB_TABLE)
                scan = table.scan(ProjectionExpression='request_id')
                with table.batch_writer() as batch:
                    for item in scan.get('Items', []):
                        batch.delete_item(Key={'request_id': item['request_id']})
                while 'LastEvaluatedKey' in scan:
                    scan = table.scan(ProjectionExpression='request_id', ExclusiveStartKey=scan['LastEvaluatedKey'])
                    with table.batch_writer() as batch:
                        for item in scan.get('Items', []):
                            batch.delete_item(Key={'request_id': item['request_id']})
            except Exception as e:
                print(f'DynamoDB reset warning: {e}', flush=True)
        msg = f'티켓 {TICKET_COUNT}장, SQS 큐, 참여자 목록이 초기화되었습니다.' if keep_logs else f'티켓 {TICKET_COUNT}장, SQS 큐, DynamoDB, 참여자 목록이 초기화되었습니다.'
        return jsonify({'success': True, 'message': msg})

    AGENT_SERVICE_URL = os.environ.get('AGENT_SERVICE_URL', 'http://agent-service:8080')

    @app.route('/api/agent/query', methods=['POST'])
    @require_admin
    def agent_query():
        body = request.get_data()
        try:
            req = urllib.request.Request(
                f'{AGENT_SERVICE_URL}/api/query',
                data=body,
                headers={'Content-Type': 'application/json'},
                method='POST'
            )
            with urllib.request.urlopen(req, timeout=120) as resp:
                return app.response_class(resp.read(), status=resp.status, mimetype='application/json')
        except urllib.error.URLError as e:
            return jsonify({'error': f'Agent 서비스 연결 실패: {e}'}), 502

    @app.route('/api/agent/auto-diagnosis', methods=['POST'])
    @require_admin
    def agent_auto_diagnosis():
        try:
            req = urllib.request.Request(
                f'{AGENT_SERVICE_URL}/api/auto-diagnosis',
                data=b'{}',
                headers={'Content-Type': 'application/json'},
                method='POST'
            )
            with urllib.request.urlopen(req, timeout=300) as resp:
                return app.response_class(resp.read(), status=resp.status, mimetype='application/json')
        except urllib.error.URLError as e:
            return jsonify({'error': f'Agent 서비스 연결 실패: {e}'}), 502

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000, debug=False)

