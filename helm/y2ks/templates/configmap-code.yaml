    import boto3, redis, json, time, os, random, string, bcrypt
    from datetime import datetime, timezone

    REDIS_HOST = os.environ.get('REDIS_HOST', 'redis-service')
    AWS_REGION = os.environ.get('AWS_REGION', 'ap-northeast-2')
    QUEUE_URL = os.environ.get('SQS_QUEUE_URL', '')
    DDB_TABLE = os.environ.get('DDB_TABLE', 'y2ks-coupon-claims')
    TICKET_COUNT = int(os.environ.get('TICKET_COUNT', '100'))

    r = redis.Redis(host=REDIS_HOST, port=6379, db=0, decode_responses=True)
    sqs = boto3.client('sqs', region_name=AWS_REGION)
    ddb = boto3.resource('dynamodb', region_name=AWS_REGION)
    table = ddb.Table(DDB_TABLE)

    def hash_password(password):
        return bcrypt.hashpw(password.encode(), bcrypt.gensalt(rounds=4)).decode()

    def gen_coupon():
        chars = string.ascii_uppercase + string.digits
        p1 = ''.join(random.choices(chars, k=4))
        p2 = ''.join(random.choices(chars, k=4))
        return f'Y2KS-{p1}-{p2}'

    def update_ddb_status(nickname, status, coupon_code=None):
        expr = 'SET #s = :status, claimed_at = :time'
        vals = {':status': status, ':time': datetime.now(timezone.utc).isoformat()}
        if coupon_code:
            expr += ', coupon_code = :coupon'
            vals[':coupon'] = coupon_code
        try:
            table.update_item(
                Key={'request_id': nickname},
                UpdateExpression=expr,
                ExpressionAttributeNames={'#s': 'status'},
                ExpressionAttributeValues=vals
            )
            print(f'DynamoDB updated: {nickname} -> {status}', flush=True)
        except Exception as e:
            print(f'DynamoDB error: {e}', flush=True)

    def restore_tickets_from_ddb():
        """Redis 재시작 시 DynamoDB 당첨 수를 기반으로 남은 티켓 수량 복구"""
        try:
            winners = 0
            scan_kwargs = {
                'FilterExpression': '#s = :winner',
                'ExpressionAttributeNames': {'#s': 'status'},
                'ExpressionAttributeValues': {':winner': 'winner'},
                'Select': 'COUNT'
            }
            response = table.scan(**scan_kwargs)
            winners += response['Count']
            while 'LastEvaluatedKey' in response:
                scan_kwargs['ExclusiveStartKey'] = response['LastEvaluatedKey']
                response = table.scan(**scan_kwargs)
                winners += response['Count']
            remaining = max(TICKET_COUNT - winners, 0)
            print(f'Redis restored from DynamoDB: {winners} winners, tickets={remaining}', flush=True)
            return remaining
        except Exception as e:
            print(f'DynamoDB restore error: {e} — defaulting to 0 for safety', flush=True)
            return 0

    print('Y2KS Worker started', flush=True)

    while True:
        try:
            open('/tmp/worker_alive', 'w').close()
            response = sqs.receive_message(
                QueueUrl=QUEUE_URL,
                MaxNumberOfMessages=10,
                WaitTimeSeconds=5
            )
            if 'Messages' in response:
                for msg in response['Messages']:
                    receipt = msg['ReceiptHandle']
                    try:
                        body = json.loads(msg['Body'])
                        nickname = body.get('request_id')
                        print(f'Processing claim: {nickname}', flush=True)
                        if r.get('tickets') is None:
                            remaining = restore_tickets_from_ddb()
                            r.set('tickets', remaining, nx=True)
                        tickets = r.decr('tickets')
                        if tickets >= 0:
                            coupon = gen_coupon()
                            r.setex(f'result:{nickname}', 600, 'winner')
                            r.setex(f'coupon:{nickname}', 600, coupon)
                            update_ddb_status(nickname, 'winner', coupon)
                            print(f'Winner! nickname={nickname} coupon={coupon}, left={tickets}', flush=True)
                        else:
                            r.set('tickets', 0)
                            r.setex(f'result:{nickname}', 600, 'loser')
                            update_ddb_status(nickname, 'loser')
                            print(f'Sold out. {nickname} missed.', flush=True)
                        sqs.delete_message(QueueUrl=QUEUE_URL, ReceiptHandle=receipt)
                    except Exception as e:
                        print(f'Error processing {nickname}: {e} — message will be retried', flush=True)
        except Exception as e:
            print(f'Queue error: {e}', flush=True)
            time.sleep(2)

