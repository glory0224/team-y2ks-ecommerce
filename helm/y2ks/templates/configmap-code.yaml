    if RECOMMEND_BUCKET:
        _s3_products = load_products_from_s3()
        if _s3_products:
            PRODUCTS = _s3_products

    PRODUCT_INDEX = {p['id']: i for i, p in enumerate(PRODUCTS)}
    SIM_KEY = 'rec:sim_matrix'

    def build_sim():
        from sklearn.feature_extraction.text import TfidfVectorizer
        from sklearn.metrics.pairwise import cosine_similarity
        corpus = [
            f"{p['category']} {p['brand'].replace('Y2KS ','')} {' '.join(p['tags'])}"
            for p in PRODUCTS
        ]
        sim = cosine_similarity(TfidfVectorizer().fit_transform(corpus)).tolist()
        r.setex(SIM_KEY, 86400, json.dumps(sim))
        print('Similarity matrix built and cached.', flush=True)
        return sim

    def get_sim():
        cached = r.get(SIM_KEY)
        return json.loads(cached) if cached else build_sim()

    @app.route('/health')
    def health():
        return jsonify({'ok': True})

    @app.route('/event', methods=['POST'])
    def track_event():
        data = request.json or {}
        sid = data.get('session_id', '')
        pid = data.get('product_id', '')
        if sid and pid and pid in PRODUCT_INDEX:
            key = f'rec:sess:{sid}'
            r.lpush(key, pid)
            r.ltrim(key, 0, 9)
            r.expire(key, 3600)
        return jsonify({'ok': True})

    @app.route('/recommend')
    def recommend():
        viewed_param = request.args.get('viewed', '')
        session_id = request.args.get('session', '')
        viewed = [v for v in viewed_param.split(',') if v and v in PRODUCT_INDEX]
        if not viewed and session_id:
            viewed = r.lrange(f'rec:sess:{session_id}', 0, 4)
        exclude = set(viewed)
        scores = {}
        if viewed:
            sim = get_sim()
            for pid in viewed:
                idx = PRODUCT_INDEX.get(pid)
                if idx is None:
                    continue
                for i, score in enumerate(sim[idx]):
                    cand = PRODUCTS[i]['id']
                    if cand not in exclude:
                        scores[cand] = scores.get(cand, 0.0) + score
        if not scores:
            for p in PRODUCTS:
                if p['id'] not in exclude:
                    scores[p['id']] = p['weight']
        top_ids = sorted(scores, key=scores.get, reverse=True)[:8]
        result = [p for p in PRODUCTS if p['id'] in top_ids]
        return jsonify(result[:8])

    if __name__ == '__main__':
        build_sim()
        app.run(host='0.0.0.0', port=5001, debug=False)


