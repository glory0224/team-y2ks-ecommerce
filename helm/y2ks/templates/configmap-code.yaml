    _EXPERT_MAP = {
        "ask_eks_expert": ("EKS Expert", _EKS_EXPERT_PROMPT),
        "ask_infra_expert": ("Infra Expert", _INFRA_EXPERT_PROMPT),
        "ask_database_expert": ("Database Expert", _DB_EXPERT_PROMPT),
    }

    def _push_event(q, event):
        try:
            q.put_nowait(event)
        except Exception:
            pass

    def _call_expert(tool_name, question, q, results, idx, tool_use_id):
        agent_name, system_prompt = _EXPERT_MAP[tool_name]
        _push_event(q, {"type": "delegation", "from": "team-leader", "to": agent_name, "question": question})
        full_text = ""
        try:
            client = _anthropic_lib.Anthropic(api_key=_ANTHROPIC_KEY)
            with client.messages.stream(
                model=_ANTHROPIC_MODEL,
                max_tokens=2048,
                system=[{
                            "type": "text",
                            "text": system_prompt,
                            "cache_control": {"type": "ephemeral"}
                }],
                messages=[{"role": "user", "content": question}]
            ) as stream:
                for text in stream.text_stream:
                    full_text += text
                    _push_event(q, {"type": "agent_thinking", "agent": agent_name, "content": text})
            _push_event(q, {"type": "agent_done", "agent": agent_name})
        except Exception as e:
            full_text = "오류: " + str(e)
            _push_event(q, {"type": "agent_done", "agent": agent_name})
        results[idx] = {"tool_use_id": tool_use_id, "content": full_text}

    def _run_team_leader(session_id, user_message):
        with _chat_lock:
            session = _chat_sessions.get(session_id)
        if not session:
            return
        q = session['queue']
        if not _HAS_ANTHROPIC or not _ANTHROPIC_KEY:
            _push_event(q, {"type": "error", "message": "ANTHROPIC_API_KEY가 설정되지 않았습니다."})
            return
        try:
            client = _anthropic_lib.Anthropic(api_key=_ANTHROPIC_KEY)
            _push_event(q, {"type": "status", "message": "Team Leader가 질문을 분석 중입니다..."})
            messages = [{"role": "user", "content": user_message}]
            for _ in range(3):
                resp = client.messages.create(
                    model=_ANTHROPIC_MODEL,
                    max_tokens=4096,
                    system=_TEAM_LEADER_PROMPT,
                    tools=_AGENT_TOOLS,
                    messages=messages
                )
                tool_blocks = [b for b in resp.content if b.type == "tool_use"]
                if not tool_blocks:
                    break
                _push_event(q, {"type": "status", "message": str(len(tool_blocks)) + "개 전문가에게 위임합니다..."})
                results = [None] * len(tool_blocks)
                threads = []
                for i, block in enumerate(tool_blocks):
                    t = threading.Thread(
                        target=_call_expert,
                        args=(block.name, block.input.get("question", user_message), q, results, i, block.id),
                        daemon=True
                    )
                    threads.append(t)
                    t.start()
                for t in threads:
                    t.join(timeout=90)
                assistant_content = []
                for b in resp.content:
                    if b.type == "text":
                        assistant_content.append({"type": "text", "text": b.text})
                    elif b.type == "tool_use":
                        assistant_content.append({"type": "tool_use", "id": b.id, "name": b.name, "input": b.input})
                tool_results_content = []
                for i, block in enumerate(tool_blocks):
                    r = results[i]
                    tool_results_content.append({
                        "type": "tool_result",
                        "tool_use_id": block.id,
                        "content": r["content"] if r else "응답 없음"
                    })
                messages.append({"role": "assistant", "content": assistant_content})
                messages.append({"role": "user", "content": tool_results_content})
                if resp.stop_reason == "end_turn":
                    break
            _push_event(q, {"type": "status", "message": "Team Leader가 최종 답변을 종합합니다..."})
            with client.messages.stream(
                model=_ANTHROPIC_MODEL,
                max_tokens=4096,
                system=_TEAM_LEADER_PROMPT,
                tools=_AGENT_TOOLS,
                messages=messages
            ) as stream:
                for text in stream.text_stream:
                    _push_event(q, {"type": "final_answer", "content": text})
        except Exception as e:
            _push_event(q, {"type": "error", "message": "처리 중 오류: " + str(e)})
        finally:
            _push_event(q, {"type": "done"})

    def _cleanup_daemon():
        while True:
            time.sleep(300)
            cutoff = time.time() - 1800
            with _chat_lock:
                stale = [sid for sid, s in list(_chat_sessions.items()) if s['ts'] < cutoff]
                for sid in stale:
                    del _chat_sessions[sid]

    threading.Thread(target=_cleanup_daemon, daemon=True).start()

    @app.route('/api/chat', methods=['POST'])
    def chat_start():
        if not _ANTHROPIC_KEY:
            return jsonify({'error': 'ANTHROPIC_API_KEY가 설정되지 않았습니다.'}), 503
        data = request.get_json(silent=True) or {}
        user_message = data.get('message', '').strip()
        if not user_message:
            return jsonify({'error': 'message required'}), 400
        session_id = str(uuid.uuid4())
        q = queue.Queue()
        with _chat_lock:
            _chat_sessions[session_id] = {'queue': q, 'ts': time.time()}
        threading.Thread(target=_run_team_leader, args=(session_id, user_message), daemon=True).start()
        return jsonify({'session_id': session_id})

    @app.route('/api/chat/stream/<session_id>')
    def chat_stream(session_id):
        with _chat_lock:
            session = _chat_sessions.get(session_id)
        if not session:
            def _err():
                yield 'data: {"type":"error","message":"Invalid session"}\n\n'
            return app.response_class(_err(), mimetype='text/event-stream',
                                       headers={'Cache-Control': 'no-cache', 'X-Accel-Buffering': 'no'})
        q = session['queue']
        def generate():
            while True:
                try:
                    event = q.get(timeout=25)
                    yield 'data: ' + json.dumps(event, ensure_ascii=False) + '\n\n'
                    if event.get('type') in ('done', 'error'):
                        break
                except queue.Empty:
                    yield 'data: {"type":"heartbeat"}\n\n'
        return app.response_class(generate(), mimetype='text/event-stream',
                                   headers={'Cache-Control': 'no-cache', 'X-Accel-Buffering': 'no'})

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000, debug=False)

