apiVersion: v1
kind: ConfigMap
metadata:
  name: y2ks-k6-script
data:
  load-test.js: |
    import http from 'k6/http';
    import { check } from 'k6';

    const BASE_URL = __ENV.TARGET_URL || 'http://y2ks-frontend-svc';
    const TEST_RUN_ID = Date.now();

    export const options = {
      stages: [
        { duration: '30s', target: 50  },
        { duration: '2m',  target: 200 },
        { duration: '1m',  target: 200 },
        { duration: '30s', target: 0   },
      ],
      thresholds: {
        http_req_failed:   ['rate<0.30'],
        http_req_duration: ['p(95)<10000'],
      },
    };

    export function setup() {
      http.post(
        `${BASE_URL}/api/admin/reset`,
        JSON.stringify({ keep_logs: true }),
        { headers: { 'Content-Type': 'application/json' } }
      );
    }

    export default function () {
      const nickname = `${TEST_RUN_ID}_user_${__VU}_${__ITER}`;
      const password = 'test1234';

      const res = http.post(
        `${BASE_URL}/api/claim`,
        JSON.stringify({ nickname: nickname, password: password }),
        {
          headers: { 'Content-Type': 'application/json' },
          tags: { name: 'claim' },
          timeout: '10s',
        }
      );

      check(res, {
        'status 200 or 409': (r) => r.status === 200 || r.status === 409,
        'has request_id': (r) => {
          try { return !!JSON.parse(r.body).request_id; } catch { return false; }
        },
      });
    }
