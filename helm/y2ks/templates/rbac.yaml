apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: y2ks-k8s-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: y2ks-k8s-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: y2ks-k8s-reader
subjects:
- kind: ServiceAccount
  name: worker-sa
  namespace: default
