# ============================================================
# Agent ServiceAccount + RBAC
# kubectl 명령어 실행을 위한 ClusterRole 부여
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "{{ .Values.agentRoleArn }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: y2ks-agent-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools", "nodeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: y2ks-agent-reader-binding
subjects:
  - kind: ServiceAccount
    name: agent-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: y2ks-agent-reader
  apiGroup: rbac.authorization.k8s.io
---
# ============================================================
# Agent Deployment
# Karpenter 노드에 스케줄링 (y2ks-low 우선순위 — 이벤트 없을 때 저비용)
# CPU: 500m req / 1000m limit  — Bedrock API 호출 + kubectl 위주로 CPU 경량
# Memory: 512Mi req / 1Gi limit — strands-agents + boto3 상주 메모리
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: y2ks-agent
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      serviceAccountName: agent-sa
      priorityClassName: y2ks-low
      tolerations:
        - key: karpenter
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["spot", "on-demand"]
      containers:
        - name: agent
          image: "{{ .Values.images.agent }}"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: aws-config
                  key: AWS_REGION
            - name: DDB_TABLE
              valueFrom:
                secretKeyRef:
                  name: y2ks-secrets
                  key: DDB_TABLE
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: y2ks-secrets
                  key: SQS_QUEUE_URL
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: y2ks-agent-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: y2ks-agent-secrets
                  key: SLACK_APP_TOKEN
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: y2ks-agent-secrets
                  key: SLACK_SIGNING_SECRET
            - name: SLACK_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: y2ks-agent-secrets
                  key: SLACK_CHANNEL_ID
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
spec:
  selector:
    app: agent
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
