    .thinking-dots{display:flex;gap:6px;padding:12px 0}
    .thinking-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:.3;animation:pulse 1.2s infinite}
    .thinking-dot:nth-child(2){animation-delay:.2s}
    .thinking-dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
    .chat-input-wrap{display:flex;gap:10px;padding:16px 0 0;border-top:1px solid #e0e0e0;margin-top:8px}
    .chat-input{flex:1;background:#f5f5f5;border:1px solid #d0d0d0;color:#0a0a0a;padding:12px 18px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;height:48px}
    .chat-input:focus{border-color:var(--accent)}
