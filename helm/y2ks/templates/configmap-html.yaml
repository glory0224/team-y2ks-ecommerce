    .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px}
    .b-winner{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
    .b-loser{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
    .b-sent{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
    .b-pending{background:rgba(0,0,0,.05);color:#666;border:1px solid #ccc}
    .empty{text-align:center;padding:48px;color:#888;font-size:14px}
    .toast{position:fixed;bottom:32px;right:32px;background:#f9f9f9;border:1px solid #d0d0d0;color:#0a0a0a;padding:14px 22px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateY(0)}
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;background:#f9f9f9;border-top:1px solid #e0e0e0;border-radius:0 0 10px 10px}
    .pg-btn{background:#ffffff;border:1px solid #d0d0d0;color:#666;padding:6px 14px;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
    .pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .pg-btn:disabled{opacity:.3;cursor:default}
    .pg-info{font-size:12px;color:#888;padding:0 12px}
    .chart-report-header{padding:0 0 16px;border-bottom:1px solid rgba(200,169,110,.15);margin-bottom:20px}
    .chart-report-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:6px}
    .chart-report-meta{font-size:11px;color:#999;margin-bottom:10px}
    .chart-report-summary{font-size:12px;color:#444;line-height:1.6;background:#f0f0f0;border:1px solid #e0e0e0;border-radius:6px;padding:10px 14px}
    .chart-panels{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    @media(max-width:1400px){.chart-panels{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:900px){.chart-panels{grid-template-columns:1fr}}
    .chart-panel{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:10px}
    .chart-panel-header{}
    .chart-panel-dash{font-size:10px;color:#999;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
    .chart-panel-title{font-size:13px;font-weight:700;color:#0a0a0a;line-height:1.3}
    .chart-panel-desc{font-size:11px;color:#777;line-height:1.5;margin-top:4px}
    .chart-panel-canvas{position:relative;height:110px;overflow:hidden}
    .chart-panel-status{font-size:11px;padding:4px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:5px;margin-top:6px}
    .status-ok{background:rgba(34,197,94,.08);color:#4ade80;border:1px solid rgba(34,197,94,.15)}
    .status-warn{background:rgba(245,158,11,.08);color:#fbbf24;border:1px solid rgba(245,158,11,.15)}
    .status-crit{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15)}
    .dash-list-table{width:100%;border-collapse:collapse}
    .dash-list-table th{font-size:11px;letter-spacing:1.5px;color:#666;text-align:left;padding:8px 12px;border-bottom:1px solid #e0e0e0;font-weight:600}
    .dash-list-table td{font-size:13px;color:#333;padding:10px 12px;border-bottom:1px solid #e0e0e0}
    .dash-list-table tr:hover td{background:rgba(0,0,0,.02)}
    .dash-list-tag{display:inline-block;background:rgba(200,169,110,.1);color:var(--accent);border:1px solid rgba(200,169,110,.2);padding:2px 8px;border-radius:3px;font-size:11px;margin:1px}
    </style>
    </head>
    <body>
    <header class="header">
      <div class="logo">Y2KS <span>ADMIN</span></div>
      <div class="header-right">
        <span class="last-updated" id="last-updated">-</span>
        <button class="logout-btn" onclick="location.href='/admin/logout'">로그아웃</button>
      </div>
    </header>
    <nav class="tabs">
      <button class="tab-btn active" onclick="switchTab(event,'stats')">이벤트 통계</button>
      <button class="tab-btn" onclick="switchTab(event,'agent')">멀티 에이전트</button>
    </nav>

    <div id="panel-events">
    <main class="main">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">남은 티켓</div>
          <div class="stat-value v-accent" id="s-left">-</div>
          <div class="stat-sub">/ 100장</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">당첨자</div>
          <div class="stat-value v-green" id="s-winner">-</div>
          <div class="stat-sub">쿠폰 발급 완료</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">낙첨자</div>
          <div class="stat-value v-red" id="s-loser">-</div>
          <div class="stat-sub">소진 후 참여</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">SQS 대기</div>
          <div class="stat-value v-blue" id="s-email">-</div>
          <div class="stat-sub">처리 대기 중</div>
        </div>
      </div>
      <div class="section-title" id="claims-title">클레임 내역</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>닉네임</th>
              <th>상태</th>
              <th>쿠폰 코드</th>
              <th>처리 시각</th>
            </tr>
          </thead>
          <tbody id="claims-body">
            <tr><td colspan="4" class="empty">로딩 중...</td></tr>
          </tbody>
        </table>
        <div class="pagination">
          <button class="pg-btn" id="pg-first" onclick="gotoPage(1)">«</button>
          <button class="pg-btn" id="pg-prev" onclick="gotoPage(currentPage-1)">‹</button>
          <span class="pg-info" id="pg-info">-</span>
          <button class="pg-btn" id="pg-next" onclick="gotoPage(currentPage+1)">›</button>
          <button class="pg-btn" id="pg-last" onclick="gotoPage(totalPages)">»</button>
        </div>
      </div>
    </main>
    </div>

    <div id="panel-agent" style="display:none">
      <div class="chat-panel">
        <div class="chat-header">
          <div>
            <div class="chat-title">Multi Agent Console</div>
            <div class="chat-sub">EKS · DB · Observe 전문가 에이전트에게 클러스터 운영 질문을 하세요</div>
          </div>
          <button class="diag-btn" id="diag-btn" onclick="runDiagnosis()">전체 자동 진단</button>
        </div>
        <div class="quick-actions">
          <button class="qa-btn" onclick="quickSend('현재 EKS 클러스터 전체 상태를 진단해줘')">전체 클러스터 진단</button>
          <button class="qa-btn" onclick="quickSend('지금 Pending 상태인 파드가 있어? 원인도 알려줘')">Pending 파드 확인</button>
          <button class="qa-btn" onclick="quickSend('SQS 큐 깊이와 Worker 스케일 상태 알려줘')">SQS 큐 현황</button>
          <button class="qa-btn" onclick="quickSend('OnDemand 대비 Spot 전환 시 비용 절감액 계산해줘')">비용 최적화 분석</button>
          <button class="qa-btn" onclick="quickSend('DynamoDB에서 봇 트래픽 패턴 탐지해줘')">봇 트래픽 탐지</button>
          <button class="qa-btn" onclick="quickSend('Karpenter 노드 현황과 CPU 한계 상태 확인해줘')">Karpenter 상태</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-wrap">
          <input class="chat-input" id="chat-input" placeholder="EKS 클러스터에 대해 질문하세요... (Enter: 전송)" onkeydown="handleKey(event)">
          <button class="send-btn" id="send-btn" onclick="sendMessage()">전송</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script>
    // ── 토스트 ──────────────────────────────────────────
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    
    // ── 이벤트 로그 탭 ──────────────────────────────────
    async function loadStats() {
      try {
        var res = await fetch('/api/admin/stats');
        var d = await res.json();
        document.getElementById('s-left').textContent = d.tickets_left;
        document.getElementById('s-winner').textContent = d.winner_count;
        document.getElementById('s-loser').textContent = d.loser_count;
        document.getElementById('s-email').textContent = d.queue_depth;
        document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
        return d;
      } catch(e) { console.error(e); return null; }
    }
    
    var currentPage = 1;
    var totalPages = 1;
    var pageSize = 20;
    
    function gotoPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadClaims();
    }
    
    async function loadClaims() {
      try {
        var res = await fetch('/api/admin/claims?page=' + currentPage + '&limit=' + pageSize);
        var d = await res.json();
        totalPages = d.pages || 1;
        var total = d.total || 0;
        document.getElementById('pg-prev').disabled = currentPage <= 1;
        document.getElementById('pg-first').disabled = currentPage <= 1;
        document.getElementById('pg-next').disabled = currentPage >= totalPages;
        document.getElementById('pg-last').disabled = currentPage >= totalPages;
        document.getElementById('pg-info').textContent = currentPage + ' / ' + totalPages + ' 페이지  (총 ' + total + '건)';
        document.getElementById('claims-title').textContent = '클레임 내역 (총 ' + total + '건)';
        var tbody = document.getElementById('claims-body');
        if (!d.items || d.items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">데이터가 없습니다</td></tr>';
          return;
        }
        tbody.innerHTML = d.items.map(function(item) {
          var statusBadge = item.status === 'winner'
            ? '<span class="badge b-winner">당첨</span>'
            : '<span class="badge b-loser">낙첨</span>';
          var coupon = item.coupon_code || '-';
          var time = item.claimed_at ? item.claimed_at.replace('T', ' ').substring(0, 19) : '-';
          var nickname = item.request_id || '-';
          return '<tr><td style="font-size:13px;color:#ccc">' + nickname + '</td><td>' + statusBadge + '</td><td style="font-family:monospace;letter-spacing:2px;color:var(--accent)">' + coupon + '</td><td style="color:#555;font-size:12px">' + time + '</td></tr>';
        }).join('');
      } catch(e) { console.error(e); }
    }
    
    async function loadAll() {
      await Promise.all([loadStats(), loadClaims()]);
    }
    
    loadAll();
    setInterval(loadAll, 3000);

    // ── 탭 전환 ─────────────────────────────────────────
    function switchTab(e, tab) {
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      e.target.classList.add('active');
      document.getElementById('panel-events').style.display = tab === 'stats' ? '' : 'none';
      document.getElementById('panel-agent').style.display = tab === 'agent' ? '' : 'none';
    }

    // ── 멀티에이전트 채팅 (실제 API 연동) ────────────────
    var agentBusy = false;
    // frontend가 /api/agent/* 로 프록시 → 클러스터 내 agent-service:8080 으로 중계
    var AGENT_API = '';

    var AGENT_META = {
      eks:     { label: 'EKS Agent',     type: 'agent',  tag: 'EKS' },
      db:      { label: 'DB Agent',      type: 'tool',   tag: 'DB' },
      observe: { label: 'Observe Agent', type: 'system', tag: 'Observe' },
      final:   { label: '팀장 종합 판단', type: 'final',  tag: '팀장' }
    };

    function setAgentBusy(busy) {
      agentBusy = busy;
      document.getElementById('send-btn').disabled = busy;
      document.getElementById('diag-btn').disabled = busy;
      document.querySelectorAll('.qa-btn').forEach(function(b){ b.disabled = busy; });
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function nowTime() {
      return new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }

    function scrollBottom() {
      var msgs = document.getElementById('chat-messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendUserMsg(text) {
      var el = document.createElement('div');
      el.className = 'msg-user';
      el.textContent = text;
      document.getElementById('chat-messages').appendChild(el);
      scrollBottom();
    }

    function createAgentWrap() {
      var wrap = document.createElement('div');
      wrap.className = 'msg-agent-wrap';
      wrap.innerHTML = '<div class="agent-icon">AI</div><div class="agent-body"></div>';
      document.getElementById('chat-messages').appendChild(wrap);
      scrollBottom();
      return wrap.querySelector('.agent-body');
    }

    function addThinking(body) {
      var el = document.createElement('div');
      el.className = 'thinking-dots';
      el.id = 'thinking-indicator';
      el.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
      body.appendChild(el);
      scrollBottom();
      return el;
    }

    function addProcessingToggle(body) {
      var tog = document.createElement('div');
      tog.className = 'processing-toggle';
      tog.innerHTML = '<span class="chevron closed">&#9654;</span><span>전문가 분석 과정 보기</span>';
      var log = document.createElement('div');
      log.className = 'processing-log';
      log.style.display = 'none';
      tog.onclick = function() {
        var c = tog.querySelector('.chevron');
        var label = tog.querySelector('span:last-child');
        if (log.style.display === 'none') {
          log.style.display = '';
          c.className = 'chevron open';
          c.innerHTML = '&#9660;';
          label.textContent = '전문가 분석 과정 숨기기';
        } else {
          log.style.display = 'none';
          c.className = 'chevron closed';
          c.innerHTML = '&#9654;';
          label.textContent = '전문가 분석 과정 보기';
        }
      };
      body.appendChild(tog);
      body.appendChild(log);
      return log;
    }

    function addLogCard(container, type, tag, content) {
      var card = document.createElement('div');
      card.className = 'log-card';
      card.innerHTML = '<div class="log-card-header"><div class="log-card-meta"><span class="lc-type">agent</span><span class="lc-tag lc-' + type + '">' + tag + '</span></div><span class="lc-time">' + nowTime() + '</span></div><div class="log-card-body">' + mdToHtml(content) + '</div>';
      container.appendChild(card);
      scrollBottom();
    }

    function mdToHtml(text) {
      // <result> 태그 제거
      text = text.replace(/<\/?result>/g, '');
      // 코드블록
      text = text.replace(/```[\s\S]*?```/g, function(m) {
        var code = m.replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
        return '<pre><code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>';
      });
      // h3 h2 h1
      text = text.replace(/^### (.+)$/mg, '<h3>$1</h3>');
      text = text.replace(/^## (.+)$/mg, '<h2>$1</h2>');
      text = text.replace(/^# (.+)$/mg, '<h1>$1</h1>');
      // bold, italic
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // 수평선
      text = text.replace(/^---+$/mg, '<hr>');
      // 리스트
      text = text.replace(/^(\s*[-•] .+)(\n\s*[-•] .+)*/mg, function(m) {
        var items = m.split('\n').filter(Boolean).map(function(l) {
          return '<li>' + l.replace(/^\s*[-•] /, '') + '</li>';
        });
        return '<ul>' + items.join('') + '</ul>';
      });
      // 번호 리스트
      text = text.replace(/^(\s*\d+\. .+)(\n\s*\d+\. .+)*/mg, function(m) {
        var items = m.split('\n').filter(Boolean).map(function(l) {
          return '<li>' + l.replace(/^\s*\d+\. /, '') + '</li>';
        });
        return '<ol>' + items.join('') + '</ol>';
      });
      // 심각도 뱃지
      text = text.replace(/(심각도|Severity)[:\s]*(Critical|High|Medium|Low|Info|치명|높음|보통|낮음|정보)/gi, function(m, label, val) {
        var cls = {critical:'crit',high:'crit',치명:'crit',높음:'warn',medium:'warn',보통:'warn',low:'info',낮음:'info',info:'ok',정보:'ok'}[val.toLowerCase()] || 'info';
        return label + ': <span class="report-badge badge-' + cls + '">' + val + '</span>';
      });
      // 신뢰도 뱃지
      text = text.replace(/(신뢰도|Confidence)[:\s]*(High|Medium|Low|높음|보통|낮음)/gi, function(m, label, val) {
        var cls = {high:'ok',높음:'ok',medium:'warn',보통:'warn',low:'crit',낮음:'crit'}[val.toLowerCase()] || 'info';
        return label + ': <span class="report-badge badge-' + cls + '">' + val + '</span>';
      });
      // 빈줄을 단락으로
      text = text.replace(/(<\/ul>|<\/ol>|<\/h[123]>|<hr>)\n/g, '$1');
      text = text.replace(/\n{2,}/g, '</p><p>');
      text = text.replace(/\n/g, '<br>');
      if (!text.startsWith('<')) text = '<p>' + text + '</p>';
      return text.trim();
    }

    var _chartSeq = 0;

    function tryParseReport(text) {
      // Direct parse (response is pure JSON)
      try { var r = JSON.parse(text); if (r && r.__type) return r; } catch(e) {}
      // Fallback: find first { and parse from there
      var idx = text.indexOf('{');
      if (idx === -1) return null;
      try { var r2 = JSON.parse(text.slice(idx)); if (r2 && r2.__type) return r2; } catch(e) {}
      return null;
    }

    function fmtVal(v, unit) {
      if (v === null || v === undefined || isNaN(v)) return '-';
      var u = (unit || '').toLowerCase();
      if (u === 'bytes' || u === 'decbytes') {
        if (Math.abs(v) >= 1073741824) return (v/1073741824).toFixed(2) + ' GB';
        if (Math.abs(v) >= 1048576)    return (v/1048576).toFixed(2) + ' MB';
        if (Math.abs(v) >= 1024)       return (v/1024).toFixed(1) + ' KB';
        return v.toFixed(0) + ' B';
      }
      if (u === 'percent')     return v.toFixed(1) + '%';
      if (u === 'percentunit') return (v*100).toFixed(1) + '%';
      if (u === 'ms')          return v.toFixed(1) + ' ms';
      if (u === 's')           return v < 1 ? (v*1000).toFixed(1)+' ms' : v.toFixed(3)+' s';
      if (u === 'reqps' || u === 'rps') return v.toFixed(2) + ' req/s';
      if (Math.abs(v) >= 1e9)  return (v/1e9).toFixed(2) + 'G';
      if (Math.abs(v) >= 1e6)  return (v/1e6).toFixed(2) + 'M';
      if (Math.abs(v) >= 1e3)  return (v/1e3).toFixed(2) + 'K';
      return parseFloat(v.toPrecision(4)).toString();
    }

    function cleanLabel(lbl) {
      if (!lbl) return '';
      lbl = lbl.replace(/\b(\d{1,3}\.){3}\d{1,3}(:\d+)?\b/g, function(m) {
        var parts = m.split(':');
        return parts[1] ? ':' + parts[1] : m.split('.').slice(-2).join('.');
      });
      lbl = lbl.replace(/_/g, ' ');
      lbl = lbl.replace(/\s+/g, ' ').trim();
      return lbl.charAt(0).toUpperCase() + lbl.slice(1) || 'value';
    }

    var _PANEL_HINTS = {
      'cpu':          { emoji:'⚙️',  desc:'CPU 사용량 추이' },
      'memory':       { emoji:'💾',  desc:'메모리 사용량 추이' },
      'request':      { emoji:'📡',  desc:'요청 처리량(RPS)' },
      'error':        { emoji:'🔴',  desc:'에러 발생률' },
      'latency':      { emoji:'⏱️',  desc:'응답 지연(Latency)' },
      'duration':     { emoji:'⏱️',  desc:'처리 소요시간' },
      'replica':      { emoji:'🔢',  desc:'Pod 레플리카 수' },
      'queue':        { emoji:'📬',  desc:'큐 적재 깊이' },
      'node':         { emoji:'🖥️',  desc:'노드 리소스 현황' },
      'availability': { emoji:'✅',  desc:'SLO 가용성 지표' },
      'cache':        { emoji:'⚡',  desc:'캐시 히트율' },
      'goroutine':    { emoji:'🔄',  desc:'Go 런타임 고루틴 수' },
      'alert':        { emoji:'🔔',  desc:'Alertmanager 알럿 현황' },
      'provisioned':  { emoji:'🚀',  desc:'Karpenter 노드 프로비저닝' },
      'budget':       { emoji:'📊',  desc:'에러 버짓 소진율' },
      'sli':          { emoji:'📈',  desc:'SLI 메트릭 추이' },
      'work queue':   { emoji:'📋',  desc:'API 서버 워크큐 상태' },
      'utilisation':  { emoji:'📊',  desc:'리소스 사용률' },
      'commitment':   { emoji:'📌',  desc:'리소스 요청/제한 커밋률' },
    };

    function getPanelHint(title) {
      var t = title.toLowerCase();
      for (var kw in _PANEL_HINTS) {
        if (t.indexOf(kw) !== -1) return _PANEL_HINTS[kw];
      }
      return { emoji:'📉', desc:'' };
    }

    function renderChartReport(body, report) {
      var el = document.createElement('div');
      el.className = 'msg-final';
      var panels = report.panels || [];
      var seq = _chartSeq++;

      var dashList = (report.dashboards || []).join(' &nbsp;·&nbsp; ') || '';
      var meta = (report.generated_at || '').replace('T',' ').substring(0,19) + ' &nbsp;·&nbsp; ' + panels.length + '개 패널';

      el.innerHTML =
        '<div class="chart-report-header">' +
        '<div class="chart-report-title">📊 ' + (report.title || 'Grafana 리포트') + '</div>' +
        '<div class="chart-report-meta">' + meta + '</div>' +
        (dashList ? '<div class="chart-report-summary">포함 대시보드: ' + dashList + '</div>' : '') +
        '</div>' +
        '<div class="chart-panels" id="cps-' + seq + '"></div>';

      body.appendChild(el);
      var container = el.querySelector('#cps-' + seq);
      var COLORS = ['#c8a96e','#60a5fa','#4ade80','#c084fc','#fb923c','#f472b6','#34d399','#a78bfa'];

      panels.forEach(function(panel, pi) {
        var pEl = document.createElement('div');
        pEl.className = 'chart-panel';
        var cid = 'chart-' + seq + '-' + pi;
        var unit = panel.unit || '';
        var hint = getPanelHint(panel.title);
        var desc = panel.description || hint.desc;

        pEl.innerHTML =
          '<div class="chart-panel-header">' +
          (panel.dashboard ? '<div class="chart-panel-dash">' + panel.dashboard + '</div>' : '') +
          '<div class="chart-panel-title">' + hint.emoji + ' ' + panel.title + '</div>' +
          (desc ? '<div class="chart-panel-desc">' + desc + '</div>' : '') +
          '</div>' +
          '<div class="chart-panel-canvas"><canvas id="' + cid + '" height="110"></canvas></div>';

        container.appendChild(pEl);

        setTimeout(function() {
          var canvas = document.getElementById(cid);
          if (!canvas || !(panel.series || []).length) return;
          var u = unit;
          var seen = {};
          var datasets = panel.series.map(function(s, si) {
            var lbl = cleanLabel(s.label);
            if (seen[lbl]) lbl = lbl + ' ' + (si+1);
            seen[lbl] = true;
            var col = COLORS[si % COLORS.length];
            var isHex = col.startsWith('#');
            var r = isHex ? parseInt(col.slice(1,3),16) : 200;
            var g = isHex ? parseInt(col.slice(3,5),16) : 169;
            var b = isHex ? parseInt(col.slice(5,7),16) : 110;
            return {
              label: lbl,
              data: s.data.map(function(v) { return {x: v[0]*1000, y: v[1]}; }),
              borderColor: col,
              backgroundColor: 'rgba('+r+','+g+','+b+',0.07)',
              borderWidth: 1.8,
              pointRadius: 0,
              pointHoverRadius: 4,
              fill: panel.series.length === 1,
              tension: 0.35
            };
          });
          new Chart(canvas, {
            type: 'line',
            data: { datasets: datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                legend: {
                  labels: { color: '#777', font: { size: 11 }, boxWidth: 10, padding: 10, usePointStyle: true }
                },
                tooltip: {
                  backgroundColor: '#111',
                  borderColor: '#2a2a2a',
                  borderWidth: 1,
                  titleColor: '#888',
                  bodyColor: '#e8e8e8',
                  padding: 10,
                  callbacks: {
                    label: function(ctx) {
                      return '  ' + ctx.dataset.label + ': ' + fmtVal(ctx.parsed.y, u);
                    }
                  }
                }
              },
              scales: {
                x: {
                  type: 'time',
                  time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                  ticks: { color: '#888', maxTicksLimit: 6, font: { size: 10 }, maxRotation: 0 },
                  grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false },
                  border: { display: false }
                },
                y: {
                  ticks: {
                    color: '#888', font: { size: 10 }, maxTicksLimit: 4,
                    callback: function(v) { return fmtVal(v, u); }
                  },
                  grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false },
                  border: { display: false }
                }
              }
            }
          });
        }, 30);
      });

      scrollBottom();
    }

    function renderDashboardList(body, list) {
      var el = document.createElement('div');
      el.className = 'msg-final';
      var rows = (list.dashboards || []).map(function(d) {
        var tags = (d.tags || []).map(function(t) { return '<span class="dash-list-tag">' + t + '</span>'; }).join('');
        return '<tr><td>' + d.title + '</td><td style="font-family:monospace;font-size:12px;color:var(--accent)">' + d.uid + '</td><td>' + (tags || '<span style="color:#333">-</span>') + '</td></tr>';
      }).join('');
      el.innerHTML =
        '<h2>Grafana 대시보드 목록</h2>' +
        '<p style="font-size:12px;color:#444;margin:6px 0 14px">' + (list.generated_at || '') + ' &nbsp;·&nbsp; 총 ' + (list.total || 0) + '개</p>' +
        '<table class="dash-list-table"><thead><tr><th>대시보드</th><th>UID</th><th>태그</th></tr></thead><tbody>' + rows + '</tbody></table>';
      body.appendChild(el);
      scrollBottom();
    }

    function addFinalMsg(body, content) {
      var report = tryParseReport(content);
      if (report) {
        if (report.__type === 'chart_report') { renderChartReport(body, report); return; }
        if (report.__type === 'dashboard_list') { renderDashboardList(body, report); return; }
      }
      var el = document.createElement('div');
      el.className = 'msg-final';
      el.innerHTML = mdToHtml(content);
      body.appendChild(el);
      scrollBottom();
    }

    function renderAgentResult(cards) {
      var body = createAgentWrap();
      var keys = Object.keys(cards);
      var expertKeys = keys.filter(function(k){ return k !== 'final'; });

      // 전문가가 여럿이면 processing log로 접을 수 있게
      if (expertKeys.length > 0) {
        var log = addProcessingToggle(body);
        expertKeys.forEach(function(k) {
          var meta = AGENT_META[k] || { label: k, type: 'agent', tag: k };
          addLogCard(log, meta.type, meta.label, cards[k]);
        });
      }

      // final: 단일 전문가면 그게 곧 최종 / 복수면 팀장 종합
      var finalKey = keys.length === 1 ? keys[0] : 'final';
      if (cards[finalKey]) {
        // 단일 전문가 + final이 같으면 중복 안 보임
        var isDup = expertKeys.length === 1 && cards[finalKey] === cards[expertKeys[0]];
        if (!isDup) {
          addFinalMsg(body, cards[finalKey]);
        } else {
          addFinalMsg(body, cards[expertKeys[0]]);
        }
      }
    }

    function quickSend(text) {
      if (agentBusy) return;
      document.getElementById('chat-input').value = text;
      sendMessage();
    }

    async function sendMessage() {
      if (agentBusy) return;
      var input = document.getElementById('chat-input');
      var text = input.value.trim();
      if (!text) return;
      setAgentBusy(true);
      input.value = '';

      appendUserMsg(text);
      var body = createAgentWrap();
      var thinking = addThinking(body);

      try {
        var res = await fetch(AGENT_API + '/api/agent/query', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: text})
        });
        var data = await res.json();
        thinking.remove();
        if (data.ok && data.result) {
          renderAgentResult(data.result);
          // 이전 wrap 제거 (비어있으면)
          if (!body.hasChildNodes()) body.parentElement.remove();
        } else {
          addFinalMsg(body, '오류: ' + (data.error || '알 수 없는 오류'));
        }
      } catch(e) {
        thinking.remove();
        addFinalMsg(body, '연결 오류: API 서버에 접속할 수 없습니다. (' + AGENT_API + ')');
      }

      setAgentBusy(false);
    }

    async function runDiagnosis() {
      if (agentBusy) return;
      setAgentBusy(true);

      appendUserMsg('전체 자동 진단 실행');
      var body = createAgentWrap();
      var thinking = addThinking(body);

      try {
        var res = await fetch(AGENT_API + '/api/agent/auto-diagnosis', { method: 'POST' });
        var data = await res.json();
        thinking.remove();
        if (data.ok && data.result) {
          addFinalMsg(body, data.result);
        } else {
          addFinalMsg(body, '오류: ' + (data.error || '알 수 없는 오류'));
        }
      } catch(e) {
        thinking.remove();
        addFinalMsg(body, '연결 오류: API 서버에 접속할 수 없습니다. (' + AGENT_API + ')');
      }

      setAgentBusy(false);
    }
    </script>
    </body>
    </html>
    
