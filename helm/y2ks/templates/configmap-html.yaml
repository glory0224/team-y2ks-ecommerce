    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2KS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#555;--accent:#c8a96e;--accent-d:#a8803e;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa}
    body{font-family:'Outfit',sans-serif;background:#ffffff;color:#0a0a0a;min-height:100vh}
    .header{background:#f9f9f9;border-bottom:1px solid #e0e0e0;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo{font-size:22px;font-weight:800;letter-spacing:8px;color:#0a0a0a}
    .logo span{color:var(--accent);font-size:12px;font-weight:400;letter-spacing:3px;margin-left:12px;vertical-align:middle}
    .header-right{display:flex;align-items:center;gap:16px}
    .last-updated{font-size:12px;color:#888}
    .logout-btn{font-size:12px;color:#666;background:none;border:1px solid #d0d0d0;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}
    .tabs{display:flex;border-bottom:1px solid #e0e0e0;padding:0 40px;background:#f9f9f9}
    .tab-btn{padding:16px 20px;font-size:13px;font-family:inherit;background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-btn:hover:not(.active){color:#0a0a0a}
    .chat-panel{display:flex;flex-direction:column;height:calc(100vh - 130px);max-width:1600px;margin:0 auto;padding:24px 40px}
    .chat-header{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .chat-title{font-size:13px;letter-spacing:2px;color:#777;text-transform:uppercase}
    .chat-sub{font-size:12px;color:#666;margin-top:4px}
    .quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .qa-btn{background:#f5f5f5;border:1px solid #d0d0d0;color:#666;padding:6px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
    .qa-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .qa-btn:disabled{opacity:.4;cursor:default}
    .diag-btn{background:linear-gradient(135deg,#f0f0ff,#ece0ff);border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700;transition:all .2s;white-space:nowrap}
    .diag-btn:hover:not(:disabled){background:rgba(200,169,110,.15)}
    .diag-btn:disabled{opacity:.4;cursor:default}
    .chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding-right:4px}
    .msg-user{align-self:flex-end;max-width:65%;background:var(--accent);color:#0a0a0a;padding:12px 18px;border-radius:18px 18px 4px 18px;font-size:14px;font-weight:600}
    .msg-agent-wrap{display:flex;gap:12px;align-items:flex-start}
    .agent-icon{width:32px;height:32px;border-radius:50%;background:#f0f0f0;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);flex-shrink:0;letter-spacing:1px;font-weight:700}
    .agent-body{flex:1}
    .processing-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;color:#777;font-size:13px;padding:8px 0;user-select:none}
    .processing-toggle:hover{color:#0a0a0a}
    .chevron{transition:transform .2s;font-size:10px}
