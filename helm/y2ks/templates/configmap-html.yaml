    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 이벤트 - Y2KS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--accent:#c8a96e;--accent-d:#a8803e;--g200:#e8e8e8}
    body{font-family:'Nanum Gothic',sans-serif;background:var(--black);color:#fff;min-height:100vh}
    a{text-decoration:none;color:inherit}
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid rgba(255,255,255,.08)}
    .logo{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:8px}
    .back{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.5);transition:color .2s;padding:8px 0}
    .back:hover{color:var(--accent)}
    .hero{text-align:center;padding:80px 40px 60px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(200,169,110,.12) 0%,transparent 65%);pointer-events:none}
    .hero-label{font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:5px;color:var(--accent);font-weight:600;margin-bottom:20px}
    .hero-title{font-family:'Outfit',sans-serif;font-size:58px;font-weight:800;line-height:1.1;letter-spacing:-2px;margin-bottom:16px}
    .hero-title span{color:var(--accent)}
    .hero-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:40px;line-height:1.7}
    .ticket-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);border-radius:50px;padding:12px 28px;margin-bottom:40px}
    .tb-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}
    .tb-count{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--accent)}
    .tabs{display:flex;gap:0;max-width:520px;margin:0 auto 0;border:1px solid rgba(255,255,255,.1);border-radius:12px 12px 0 0;overflow:hidden}
    .tab-btn{flex:1;padding:14px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);font-size:14px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .tab-btn.active{background:rgba(200,169,110,.12);color:var(--accent);border-bottom:2px solid var(--accent)}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 16px 16px;padding:40px 48px;max-width:520px;margin:0 auto 60px;backdrop-filter:blur(10px)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .form-group{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
    .form-input{padding:15px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--accent)}
    .form-input::placeholder{color:rgba(255,255,255,.3)}
    .claim-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:1px;transition:all .3s;font-family:inherit}
    .claim-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(200,169,110,.3)}
    .claim-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .state{display:none}
    .state.active{display:block}
    .spinner{width:48px;height:48px;border:3px solid rgba(200,169,110,.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result-icon{font-size:56px;margin-bottom:16px}
    .result-title{font-size:22px;font-weight:800;margin-bottom:10px}
    .result-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:24px;line-height:1.7}
    .coupon-code{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:6px;color:#fff;background:rgba(200,169,110,.1);border:1px dashed rgba(200,169,110,.4);padding:18px 24px;border-radius:8px;margin:16px 0;text-align:center}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
    .confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear forwards}
    @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .error-msg{font-size:12px;color:#ef5350;margin-top:4px;text-align:center;min-height:18px}
    .small-link{display:inline-block;margin-top:16px;padding:10px 28px;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;background:none;font-family:inherit;transition:all .2s}
    .small-link:hover{border-color:var(--accent);color:var(--accent)}
    </style>
    </head>
    <body>
    <header class="header">
      <div class="logo">Y2KS</div>
      <a href="/" class="back">← 쇼핑몰로 돌아가기</a>
    </header>

    <div class="confetti-wrap" id="confetti-wrap"></div>

    <section class="hero">
      <div class="hero-label">LIMITED COUPON EVENT</div>
      <h1 class="hero-title">봄맞이 특별 쿠폰<br><span>100장</span> 무료 증정</h1>
      <p class="hero-sub">선착순으로 90% 할인 쿠폰을 드립니다.<br>닉네임과 비밀번호로 참여하세요!</p>
      <div class="ticket-badge">
        <span class="tb-label">남은 쿠폰</span>
        <span class="tb-count" id="ticket-count">- / 100</span>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('join')">🎁 쿠폰 참여</button>
        <button class="tab-btn" onclick="switchTab('check')">🔍 결과 조회</button>
      </div>

      <div class="card">
        <!-- 참여 탭 -->
        <div class="tab-panel active" id="tab-join">
          <!-- IDLE -->
          <div class="state active" id="state-idle">
            <div class="form-group">
              <input class="form-input" type="text" id="nickname-input" placeholder="닉네임을 입력하세요" maxlength="30">
              <input class="form-input" type="password" id="password-input" placeholder="비밀번호를 입력하세요" maxlength="50">
            </div>
            <button class="claim-btn" id="claim-btn" onclick="claimCoupon()">지금 쿠폰 받기</button>
            <div class="error-msg" id="claim-error"></div>
          </div>
          <!-- LOADING -->
          <div class="state" id="state-loading">
            <div class="spinner"></div>
            <div style="font-size:18px;font-weight:700;margin-bottom:8px">처리 중입니다...</div>
            <div style="font-size:13px;color:rgba(255,255,255,.45)">잠시만 기다려주세요.</div>
          </div>
          <!-- WINNER -->
          <div class="state" id="state-winner">
            <div class="result-icon" style="animation:bounce .6s ease">🎉</div>
            <div class="result-title" style="color:var(--accent)">당첨되셨습니다!</div>
            <div class="result-sub">90% 할인 쿠폰이 발급되었습니다.<br>닉네임+비밀번호로 언제든지 다시 조회할 수 있습니다.</div>
            <div class="coupon-code" id="coupon-display-winner"></div>
            <div style="font-size:12px;color:rgba(255,255,255,.3)">유효기간: 2026년 6월 30일까지</div>
          </div>
          <!-- LOSER -->
          <div class="state" id="state-loser">
            <div class="result-icon">😢</div>
            <div class="result-title">아쉽게도 놓쳤어요</div>
            <div class="result-sub">쿠폰이 모두 소진되었습니다.<br>다음 이벤트에서 꼭 성공하시길 바랍니다!</div>
            <a href="/" class="small-link">← 쇼핑 계속하기</a>
          </div>
        </div>

        <!-- 결과 조회 탭 -->
        <div class="tab-panel" id="tab-check">
          <div class="state active" id="state-check-idle">
            <div style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:20px;line-height:1.7">참여 시 입력한 닉네임과<br>비밀번호로 결과를 조회하세요.</div>
            <div class="form-group">
              <input class="form-input" type="text" id="check-nickname" placeholder="닉네임" maxlength="30">
              <input class="form-input" type="password" id="check-password" placeholder="비밀번호" maxlength="50">
            </div>
            <button class="claim-btn" onclick="checkResult()">결과 확인하기</button>
            <div class="error-msg" id="check-error"></div>
          </div>
          <div class="state" id="state-check-result">
            <div class="result-icon" id="check-result-icon"></div>
            <div class="result-title" id="check-result-title"></div>
            <div class="result-sub" id="check-result-sub"></div>
            <div class="coupon-code" id="coupon-display-check" style="display:none"></div>
            <button class="small-link" onclick="resetCheckForm()">← 다시 조회</button>
          </div>
        </div>
      </div>
    </section>

    <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(function(b,i){ b.classList.toggle('active', (tab==='join'&&i===0)||(tab==='check'&&i===1)); });
      document.getElementById('tab-join').classList.toggle('active', tab==='join');
      document.getElementById('tab-check').classList.toggle('active', tab==='check');
    }

    function setState(name) {
      ['idle','loading','winner','loser'].forEach(function(s){
        var el = document.getElementById('state-'+s);
        if(el) el.classList.toggle('active', s===name);
      });
    }

    function updateTicketCount() {
      fetch('/api/tickets').then(function(r){ return r.json(); }).then(function(d){
        document.getElementById('ticket-count').textContent = d.remaining + ' / 100';
      }).catch(function(){});
    }

    var currentNickname = null;
    var pollInterval = null;

    async function claimCoupon() {
      var nickname = document.getElementById('nickname-input').value.trim();
      var password = document.getElementById('password-input').value.trim();
      var errEl = document.getElementById('claim-error');
      errEl.textContent = '';
      if (!nickname || !password) { errEl.textContent = '닉네임과 비밀번호를 모두 입력해주세요.'; return; }
      document.getElementById('claim-btn').disabled = true;
      setState('loading');
      try {
        var res = await fetch('/api/claim', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({nickname: nickname, password: password})
        });
        var data = await res.json();
        if (res.status === 409) { setState('idle'); document.getElementById('claim-btn').disabled=false; errEl.textContent='이미 참여하셨습니다. 결과 조회 탭을 이용해주세요.'; return; }
        if (!res.ok) { setState('idle'); document.getElementById('claim-btn').disabled=false; errEl.textContent=data.message||'오류가 발생했습니다.'; return; }
        currentNickname = data.request_id;
        pollInterval = setInterval(pollResult, 2000);
      } catch(e) {
        setState('idle');
        document.getElementById('claim-btn').disabled = false;
        errEl.textContent = '네트워크 오류가 발생했습니다.';
      }
    }

    async function pollResult() {
      try {
        var res = await fetch('/api/check/' + encodeURIComponent(currentNickname));
        var data = await res.json();
        if (data.status === 'winner') {
          clearInterval(pollInterval);
          var coupon = await getCouponFromDdb();
          document.getElementById('coupon-display-winner').textContent = coupon;
          setState('winner');
          launchConfetti();
          updateTicketCount();
        } else if (data.status === 'loser') {
          clearInterval(pollInterval);
          setState('loser');
          updateTicketCount();
        }
      } catch(e) { console.error('poll error', e); }
    }

    async function getCouponFromDdb() {
      var pw = document.getElementById('password-input').value.trim();
      try {
        var res = await fetch('/api/result', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({nickname: currentNickname, password: pw})
        });
        var d = await res.json();
        return d.coupon_code || '';
      } catch(e) { return ''; }
    }

    async function checkResult() {
      var nickname = document.getElementById('check-nickname').value.trim();
      var password = document.getElementById('check-password').value.trim();
      var errEl = document.getElementById('check-error');
      errEl.textContent = '';
      if (!nickname || !password) { errEl.textContent = '닉네임과 비밀번호를 입력해주세요.'; return; }
      try {
        var res = await fetch('/api/result', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({nickname: nickname, password: password})
        });
        var data = await res.json();
        if (!data.success) { errEl.textContent = data.message; return; }
        var iconEl = document.getElementById('check-result-icon');
        var titleEl = document.getElementById('check-result-title');
        var subEl = document.getElementById('check-result-sub');
        var couponEl = document.getElementById('coupon-display-check');
        if (data.status === 'winner') {
          iconEl.textContent = '🎉';
          titleEl.textContent = '당첨되셨습니다!';
          titleEl.style.color = 'var(--accent)';
          subEl.textContent = '아래 쿠폰 코드를 사용해주세요.';
          couponEl.textContent = data.coupon_code;
          couponEl.style.display = 'block';
          launchConfetti();
        } else {
          iconEl.textContent = '😢';
          titleEl.textContent = '낙첨되었습니다';
          titleEl.style.color = '#fff';
          subEl.textContent = '아쉽게도 쿠폰이 소진된 후 참여하셨습니다.';
          couponEl.style.display = 'none';
        }
        document.getElementById('state-check-idle').classList.remove('active');
        document.getElementById('state-check-result').classList.add('active');
      } catch(e) { errEl.textContent = '네트워크 오류가 발생했습니다.'; }
    }

    function resetCheckForm() {
      document.getElementById('state-check-idle').classList.add('active');
      document.getElementById('state-check-result').classList.remove('active');
      document.getElementById('check-nickname').value = '';
      document.getElementById('check-password').value = '';
      document.getElementById('check-error').textContent = '';
    }

    function launchConfetti() {
      var wrap = document.getElementById('confetti-wrap');
      var colors = ['#c8a96e','#fff','#f9d423','#ff6b9d','#a8edea','#fed6e3'];
      for (var i = 0; i < 80; i++) {
        (function(i) {
          setTimeout(function() {
            var el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.width = (Math.random() * 8 + 6) + 'px';
            el.style.height = (Math.random() * 8 + 6) + 'px';
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (Math.random() * 2 + 2) + 's';
            el.style.animationDelay = '0s';
            wrap.appendChild(el);
            setTimeout(function() { el.remove(); }, 4000);
          }, i * 30);
        })(i);
      }
    }

    updateTicketCount();
    setInterval(updateTicketCount, 10000);
    </script>
    </body>
    </html>

