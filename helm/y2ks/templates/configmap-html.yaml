apiVersion: v1
kind: ConfigMap
metadata:
  name: y2ks-app-html
data:
  main.html: |
    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2KS - 모던 패션 스토어</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#555;--accent:#c8a96e;--accent-d:#a8803e}
    body{font-family:'Nanum Gothic',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    .top-bar{background:var(--black);color:rgba(255,255,255,0.85);text-align:center;padding:10px 20px;font-size:12px;letter-spacing:.5px}ㄴ
    .top-bar a{color:var(--accent);font-weight:700;margin-left:8px;text-decoration:underline;transition:color .2s}
    .top-bar a:hover{color:#fff}
    .header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--g200);padding:0 48px}
    .h-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:72px}
    .logo{font-family:'Outfit',sans-serif;font-size:30px;font-weight:800;letter-spacing:10px;color:var(--black)}
    .search{flex:1;max-width:420px;margin:0 48px;position:relative}
    .search input{width:100%;padding:11px 46px 11px 18px;border:1.5px solid var(--g200);border-radius:50px;font-size:13px;background:var(--g100);outline:none;cursor:default;color:#aaa;font-family:inherit}
    .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:15px}
    .h-icons{display:flex;gap:4px}
    .icon-btn{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:none;border:none;cursor:default;font-size:19px;transition:background .2s}
    .icon-btn:hover{background:var(--g100)}
    .nav{border-bottom:1px solid var(--g200)}
    .nav-inner{max-width:1400px;margin:0 auto;padding:0 48px;display:flex}
    .nav-item{padding:14px 18px;font-size:13px;font-weight:600;color:var(--g600);cursor:default;position:relative;transition:color .2s;white-space:nowrap}
    .nav-item:hover{color:var(--black)}
    .nav-item.active{color:var(--black)}
    .nav-item.active::after{content:'';position:absolute;bottom:0;left:18px;right:18px;height:2px;background:var(--black)}
    .nav-event{color:var(--accent-d)!important;font-weight:700}
    .nav-event:hover{color:var(--accent)!important}
    .hero{height:580px;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 60%,#2d1b4e 100%);display:flex;align-items:center;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:url('https://picsum.photos/seed/fashion-spring/1400/580') center/cover;opacity:.18}
    .hero-deco{position:absolute;right:-80px;bottom:-60px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,110,.12),transparent 70%)}
    .hero-content{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 80px;width:100%}
    .hero-tag{display:inline-block;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;padding:5px 14px;border-radius:2px;margin-bottom:20px}
    .hero-title{font-family:'Outfit',sans-serif;font-size:72px;font-weight:800;color:#fff;line-height:1.05;letter-spacing:-3px;margin-bottom:18px}
    .hero-sub{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:40px;letter-spacing:.5px}
    .hero-btn{display:inline-block;background:#fff;color:var(--black);padding:15px 44px;font-weight:700;font-size:13px;letter-spacing:2px;border-radius:3px;transition:all .3s;cursor:default}
    .hero-btn:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
    .event-wrap{max-width:1400px;margin:48px auto;padding:0 48px}
    .event-band{background:linear-gradient(100deg,#0a0a0a,#1a1a2e);border:1px solid var(--accent);border-radius:10px;padding:28px 44px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .eb-label{font-size:10px;letter-spacing:4px;color:var(--accent);font-family:'Outfit',sans-serif;font-weight:700;margin-bottom:8px}
    .eb-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:5px}
    .eb-sub{font-size:13px;color:rgba(255,255,255,.5)}
    .eb-btn{background:var(--accent);color:#fff;padding:16px 44px;font-weight:700;font-size:14px;letter-spacing:1px;border-radius:5px;white-space:nowrap;transition:all .3s;display:inline-block}
    .eb-btn:hover{background:var(--accent-d);transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,169,110,.3)}
    .section{max-width:1400px;margin:0 auto;padding:0 48px 80px}
    .sec-header{display:flex;align-items:baseline;gap:14px;margin-bottom:32px;padding-bottom:16px;border-bottom:2px solid var(--black)}
    .sec-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
    .sec-sub{font-size:12px;color:var(--g400);letter-spacing:.5px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px}
    .card{cursor:default}
    .card-img{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--g100);border-radius:6px;margin-bottom:14px}
    .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
    .card:hover .card-img img{transform:scale(1.06)}
    .badge{position:absolute;top:12px;left:12px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:1.5px;border-radius:2px}
    .b-best{background:var(--black);color:#fff}
    .b-new{background:var(--accent);color:#fff}
    .b-sale{background:#e53935;color:#fff}
    .card-brand{font-size:10px;color:var(--g400);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
    .card-name{font-size:14px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-price{font-size:15px;font-weight:700}
    .price-sale{color:#e53935}
    .price-orig{color:var(--g400);text-decoration:line-through;font-size:12px;font-weight:400;margin-left:6px}
    footer{background:var(--black);color:rgba(255,255,255,.45);padding:56px 48px 40px;font-size:12px;line-height:2.2}
    .ft-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:40px}
    .ft-logo{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:8px;color:#fff;margin-bottom:14px}
    .ft-cols{display:flex;gap:56px}
    .ft-col h4{color:rgba(255,255,255,.8);font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:12px}
    .ft-col p{cursor:default;transition:color .2s}
    .ft-col p:hover{color:rgba(255,255,255,.7)}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.hero-title{font-size:44px}.search{display:none}}
    .rec-section{max-width:1400px;margin:0 auto;padding:0 48px 80px}
    .rec-header{display:flex;align-items:baseline;gap:14px;margin-bottom:32px;padding-bottom:16px;border-bottom:2px solid var(--black)}
    .card.clickable{cursor:pointer}
    .card.clickable:hover .card-name{color:var(--accent)}
    .card-skeleton .card-img{background:var(--g200);border-radius:6px;aspect-ratio:3/4}
    .skel-line{background:var(--g200);border-radius:4px;height:11px;margin-bottom:8px}
    .skel-line.w60{width:60%}.skel-line.w80{width:80%}.skel-line.w40{width:40%}
    </style>
    </head>
    <body>
    <div class="top-bar">🌸 봄 시즌 특별 이벤트 진행 중! 선착순 100명에게 쿠폰을 드립니다 <a href="/event">지금 받기 →</a></div>
    <header class="header">
      <div class="h-inner">
        <div class="logo">Y2KS</div>
        <div class="search"><input type="text" placeholder="원하는 상품을 검색하세요" readonly><span class="search-icon">🔍</span></div>
        <div class="h-icons">
          <button class="icon-btn">🤍</button>
          <button class="icon-btn">🛍️</button>
          <button class="icon-btn">👤</button>
        </div>
      </div>
    </header>
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-item active">신상품</div>
        <div class="nav-item">베스트</div>
        <div class="nav-item">아우터</div>
        <div class="nav-item">상의</div>
        <div class="nav-item">하의</div>
        <div class="nav-item">원피스</div>
        <div class="nav-item">가방</div>
        <div class="nav-item">신발</div>
        <div class="nav-item">세일</div>
        <a class="nav-item nav-event" href="/event">🎁 이벤트</a>
      </div>
    </nav>
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-deco"></div>
      <div class="hero-content">
        <div class="hero-tag">2026 SPRING COLLECTION</div>
        <h1 class="hero-title">New Season,<br>New Style.</h1>
        <p class="hero-sub">봄을 맞이하는 가장 세련된 방법</p>
        <span class="hero-btn">SHOP NOW</span>
      </div>
    </section>
    <div class="event-wrap">
      <div class="event-band">
        <div>
          <div class="eb-label">LIMITED EVENT</div>
          <div class="eb-title">🎁 봄맞이 특별 쿠폰 100장 무료 증정!</div>
          <div class="eb-sub">선착순 100명 한정 · 90% 할인 쿠폰 · 지금 바로 참여하세요</div>
        </div>
        <a href="/event" class="eb-btn">쿠폰 받기 →</a>
      </div>
    </div>
    <section class="rec-section">
      <div class="rec-header">
        <h2 class="sec-title">Y2KS 카테고리 트렌드</h2>
        <span class="sec-sub">사용자님과 유사한 연령대가 구매했어요</span>
      </div>
      <div id="rec-grid" class="grid"></div>
    </section>
    <main class="section">
      <div class="sec-header">
        <h2 class="sec-title">BEST SELLERS</h2>
        <span class="sec-sub">이번 시즌 가장 사랑받는 아이템</span>
      </div>
      <div class="grid">
        <div class="card clickable" onclick="trackClick('p001')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/flannel-shirt.jpg" alt="체크 플란넬 셔츠"><span class="badge b-best">BEST</span></div><div class="card-brand">Y2KS BASIC</div><div class="card-name">체크 플란넬 셔츠</div><div class="card-price">89,000원</div></div>
        <div class="card clickable" onclick="trackClick('p002')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/knit-sweater.jpg" alt="네이비 니트 스웨터"><span class="badge b-new">NEW</span></div><div class="card-brand">Y2KS KNIT</div><div class="card-name">네이비 니트 스웨터</div><div class="card-price">79,000원</div></div>
        <div class="card clickable" onclick="trackClick('p003')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/denim-jacket.jpg" alt="데님 트러커 재킷"><span class="badge b-best">BEST</span></div><div class="card-brand">Y2KS DENIM</div><div class="card-name">데님 트러커 재킷</div><div class="card-price">139,000원</div></div>
        <div class="card clickable" onclick="trackClick('p004')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/black-tshirt.jpg" alt="레터링 블랙 티셔츠"></div><div class="card-brand">Y2KS BASIC</div><div class="card-name">레터링 블랙 티셔츠</div><div class="card-price">35,000원</div></div>
        <div class="card clickable" onclick="trackClick('p005')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/cardigan.jpg" alt="크로셰 그래니 가디건"><span class="badge b-new">NEW</span></div><div class="card-brand">Y2KS KNIT</div><div class="card-name">크로셰 그래니 가디건</div><div class="card-price">125,000원</div></div>
        <div class="card clickable" onclick="trackClick('p006')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/linen-vest.jpg" alt="린넨 슬리브리스 베스트"></div><div class="card-brand">Y2KS LINEN</div><div class="card-name">린넨 슬리브리스 베스트</div><div class="card-price">59,000원</div></div>
        <div class="card clickable" onclick="trackClick('p007')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/linen-blouse.jpg" alt="린넨 반소매 블라우스"><span class="badge b-new">NEW</span></div><div class="card-brand">Y2KS LINEN</div><div class="card-name">린넨 반소매 블라우스</div><div class="card-price">55,000원</div></div>
        <div class="card clickable" onclick="trackClick('p008')"><div class="card-img"><img src="https://y2ks-product-images.s3.ap-northeast-2.amazonaws.com/bomber-jacket.jpg" alt="테라코타 봄버 재킷"><span class="badge b-sale">SALE</span></div><div class="card-brand">Y2KS OUTER</div><div class="card-name">테라코타 봄버 재킷</div><div class="card-price">119,000원</div></div>
      </div>
    </main>
    <footer>
      <div class="ft-inner">
        <div>
          <div class="ft-logo">Y2KS</div>
          <p>서울특별시 강남구 패션로 88, Y2KS 빌딩</p>
          <p>고객센터: 1588-0000 | 평일 10:00–18:00</p>
          <p>이메일: help@Y2KS-fashion.kr</p>
          <p style="margin-top:12px;font-size:11px;">© 2026 Y2KS Fashion Inc. All rights reserved.</p>
        </div>
        <div class="ft-cols">
          <div class="ft-col"><h4>SHOP</h4><p>신상품</p><p>베스트</p><p>세일</p><p>이벤트</p></div>
          <div class="ft-col"><h4>HELP</h4><p>배송 안내</p><p>교환/반품</p><p>사이즈 가이드</p><p>FAQ</p></div>
          <div class="ft-col"><h4>INFO</h4><p>브랜드 소개</p><p>지속 가능성</p><p>채용 정보</p><p>제휴 문의</p></div>
        </div>
      </div>
    </footer>
    <script>
    var REC_SESSION = localStorage.getItem('y2ks_sid');
    if (!REC_SESSION) {
      REC_SESSION = Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('y2ks_sid', REC_SESSION);
    }
    var viewedIds = [];

    function badgeHtml(badge) {
      if (!badge) return '';
      var cls = badge === 'BEST' ? 'b-best' : badge === 'NEW' ? 'b-new' : 'b-sale';
      return '<span class="badge ' + cls + '">' + badge + '</span>';
    }

    var SKEL = '<div class="card card-skeleton"><div class="card-img"></div><div class="skel-line w60"></div><div class="skel-line w80"></div><div class="skel-line w40"></div></div>';
    function renderRec(items) {
      var grid = document.getElementById('rec-grid');
      if (!items || items.length === 0) {
        grid.innerHTML = SKEL + SKEL + SKEL + SKEL;
        return;
      }
      grid.innerHTML = items.map(function(p) {
        var price = p.price.toLocaleString('ko-KR') + '원';
        return '<div class="card clickable" onclick="trackClick(\'' + p.id + '\')">' +
          '<div class="card-img"><img src="' + p.image + '" alt="' + p.name + '" loading="lazy">' + badgeHtml(p.badge) + '</div>' +
          '<div class="card-brand">' + p.brand + '</div>' +
          '<div class="card-name">' + p.name + '</div>' +
          '<div class="card-price">' + price + '</div></div>';
      }).join('');
    }

    function loadRecommend() {
      var params = 'session=' + REC_SESSION;
      if (viewedIds.length > 0) params += '&viewed=' + viewedIds.slice(-5).join(',');
      fetch('/api/recommend?' + params)
        .then(function(r) { return r.ok ? r.json() : []; })
        .then(renderRec)
        .catch(function() { renderRec([]); });
    }

    function trackClick(pid) {
      if (viewedIds[viewedIds.length - 1] === pid) return;
      viewedIds.push(pid);
      if (viewedIds.length > 10) viewedIds.shift();
      fetch('/api/event', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session_id: REC_SESSION, product_id: pid})
      }).catch(function(){});
      loadRecommend();
    }

    loadRecommend();
    </script>
    </body>
    </html>

