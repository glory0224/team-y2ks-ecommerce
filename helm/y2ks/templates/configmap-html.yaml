apiVersion: v1
kind: ConfigMap
metadata:
  name: y2ks-app-html
data:
  main.html: |
    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2KS - 모던 패션 스토어</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#555;--accent:#c8a96e;--accent-d:#a8803e}
    body{font-family:'Nanum Gothic',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    .top-bar{background:var(--black);color:rgba(255,255,255,0.85);text-align:center;padding:10px 20px;font-size:12px;letter-spacing:.5px}ㄴ
    .top-bar a{color:var(--accent);font-weight:700;margin-left:8px;text-decoration:underline;transition:color .2s}
    .top-bar a:hover{color:#fff}
    .header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--g200);padding:0 48px}
    .h-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:72px}
    .logo{font-family:'Outfit',sans-serif;font-size:30px;font-weight:800;letter-spacing:10px;color:var(--black)}
    .search{flex:1;max-width:420px;margin:0 48px;position:relative}
    .search input{width:100%;padding:11px 46px 11px 18px;border:1.5px solid var(--g200);border-radius:50px;font-size:13px;background:var(--g100);outline:none;cursor:default;color:#aaa;font-family:inherit}
    .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:15px}
    .h-icons{display:flex;gap:4px}
    .icon-btn{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:none;border:none;cursor:default;font-size:19px;transition:background .2s}
    .icon-btn:hover{background:var(--g100)}
    .nav{border-bottom:1px solid var(--g200)}
    .nav-inner{max-width:1400px;margin:0 auto;padding:0 48px;display:flex}
    .nav-item{padding:14px 18px;font-size:13px;font-weight:600;color:var(--g600);cursor:default;position:relative;transition:color .2s;white-space:nowrap}
    .nav-item:hover{color:var(--black)}
    .nav-item.active{color:var(--black)}
    .nav-item.active::after{content:'';position:absolute;bottom:0;left:18px;right:18px;height:2px;background:var(--black)}
    .nav-event{color:var(--accent-d)!important;font-weight:700}
    .nav-event:hover{color:var(--accent)!important}
    .hero{height:580px;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 60%,#2d1b4e 100%);display:flex;align-items:center;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:url('https://picsum.photos/seed/fashion-spring/1400/580') center/cover;opacity:.18}
    .hero-deco{position:absolute;right:-80px;bottom:-60px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,110,.12),transparent 70%)}
    .hero-content{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 80px;width:100%}
    .hero-tag{display:inline-block;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;padding:5px 14px;border-radius:2px;margin-bottom:20px}
    .hero-title{font-family:'Outfit',sans-serif;font-size:72px;font-weight:800;color:#fff;line-height:1.05;letter-spacing:-3px;margin-bottom:18px}
    .hero-sub{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:40px;letter-spacing:.5px}
    .hero-btn{display:inline-block;background:#fff;color:var(--black);padding:15px 44px;font-weight:700;font-size:13px;letter-spacing:2px;border-radius:3px;transition:all .3s;cursor:default}
    .hero-btn:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
    .event-wrap{max-width:1400px;margin:48px auto;padding:0 48px}
    .event-band{background:linear-gradient(100deg,#0a0a0a,#1a1a2e);border:1px solid var(--accent);border-radius:10px;padding:28px 44px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .eb-label{font-size:10px;letter-spacing:4px;color:var(--accent);font-family:'Outfit',sans-serif;font-weight:700;margin-bottom:8px}
    .eb-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:5px}
    .eb-sub{font-size:13px;color:rgba(255,255,255,.5)}
    .eb-btn{background:var(--accent);color:#fff;padding:16px 44px;font-weight:700;font-size:14px;letter-spacing:1px;border-radius:5px;white-space:nowrap;transition:all .3s;display:inline-block}
    .eb-btn:hover{background:var(--accent-d);transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,169,110,.3)}
    .section{max-width:1400px;margin:0 auto;padding:0 48px 80px}
    .sec-header{display:flex;align-items:baseline;gap:14px;margin-bottom:32px;padding-bottom:16px;border-bottom:2px solid var(--black)}
    .sec-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
    .sec-sub{font-size:12px;color:var(--g400);letter-spacing:.5px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px}
    .card{cursor:default}
    .card-img{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--g100);border-radius:6px;margin-bottom:14px}
    .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
    .card:hover .card-img img{transform:scale(1.06)}
    .badge{position:absolute;top:12px;left:12px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:1.5px;border-radius:2px}
    .b-best{background:var(--black);color:#fff}
    .b-new{background:var(--accent);color:#fff}
    .b-sale{background:#e53935;color:#fff}
    .card-brand{font-size:10px;color:var(--g400);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
    .card-name{font-size:14px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-price{font-size:15px;font-weight:700}
    .price-sale{color:#e53935}
    .price-orig{color:var(--g400);text-decoration:line-through;font-size:12px;font-weight:400;margin-left:6px}
    footer{background:var(--black);color:rgba(255,255,255,.45);padding:56px 48px 40px;font-size:12px;line-height:2.2}
    .ft-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:40px}
    .ft-logo{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:8px;color:#fff;margin-bottom:14px}
    .ft-cols{display:flex;gap:56px}
    .ft-col h4{color:rgba(255,255,255,.8);font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:12px}
    .ft-col p{cursor:default;transition:color .2s}
    .ft-col p:hover{color:rgba(255,255,255,.7)}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.hero-title{font-size:44px}.search{display:none}}
    </style>
    </head>
    <body>
    <div class="top-bar">🌸 봄 시즌 특별 이벤트 진행 중! 선착순 100명에게 쿠폰을 드립니다 <a href="/event">지금 받기 →</a></div>
    <header class="header">
      <div class="h-inner">
        <div class="logo">Y2KS</div>
        <div class="search"><input type="text" placeholder="원하는 상품을 검색하세요" readonly><span class="search-icon">🔍</span></div>
        <div class="h-icons">
          <button class="icon-btn">🤍</button>
          <button class="icon-btn">🛍️</button>
          <button class="icon-btn">👤</button>
        </div>
      </div>
    </header>
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-item active">신상품</div>
        <div class="nav-item">베스트</div>
        <div class="nav-item">아우터</div>
        <div class="nav-item">상의</div>
        <div class="nav-item">하의</div>
        <div class="nav-item">원피스</div>
        <div class="nav-item">가방</div>
        <div class="nav-item">신발</div>
        <div class="nav-item">세일</div>
        <a class="nav-item nav-event" href="/event">🎁 이벤트</a>
      </div>
    </nav>
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-deco"></div>
      <div class="hero-content">
        <div class="hero-tag">2026 SPRING COLLECTION</div>
        <h1 class="hero-title">New Season,<br>New Style.</h1>
        <p class="hero-sub">봄을 맞이하는 가장 세련된 방법</p>
        <span class="hero-btn">SHOP NOW</span>
      </div>
    </section>
    <div class="event-wrap">
      <div class="event-band">
        <div>
          <div class="eb-label">LIMITED EVENT</div>
          <div class="eb-title">🎁 봄맞이 특별 쿠폰 100장 무료 증정!</div>
          <div class="eb-sub">선착순 100명 한정 · 90% 할인 쿠폰 · 지금 바로 참여하세요</div>
        </div>
        <a href="/event" class="eb-btn">쿠폰 받기 →</a>
      </div>
    </div>
    <main class="section">
      <div class="sec-header">
        <h2 class="sec-title">BEST SELLERS</h2>
        <span class="sec-sub">이번 시즌 가장 사랑받는 아이템</span>
      </div>
      <div class="grid">
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion1/300/400" alt="오버핏 코튼 티셔츠"><span class="badge b-best">BEST</span></div><div class="card-brand">Y2KS BASIC</div><div class="card-name">오버핏 코튼 티셔츠</div><div class="card-price">29,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion2/300/400" alt="슬림 스트레이트 진"><span class="badge b-new">NEW</span></div><div class="card-brand">Y2KS DENIM</div><div class="card-name">슬림 스트레이트 진</div><div class="card-price">79,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion3/300/400" alt="루즈핏 후드 집업"></div><div class="card-brand">Y2KS SPORT</div><div class="card-name">루즈핏 후드 집업</div><div class="card-price">89,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion4/300/400" alt="플로럴 미디 드레스"><span class="badge b-best">BEST</span></div><div class="card-brand">Y2KS FEMME</div><div class="card-name">플로럴 미디 드레스</div><div class="card-price">119,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion5/300/400" alt="레이어드 니트 가디건"><span class="badge b-new">NEW</span></div><div class="card-brand">Y2KS KNIT</div><div class="card-name">레이어드 니트 가디건</div><div class="card-price">95,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion6/300/400" alt="울 블렌드 롱코트"></div><div class="card-brand">Y2KS OUTER</div><div class="card-name">울 블렌드 롱코트</div><div class="card-price">299,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion7/300/400" alt="레더 미니 크로스백"></div><div class="card-brand">Y2KS BAG</div><div class="card-name">레더 미니 크로스백</div><div class="card-price">159,000원</div></div>
        <div class="card"><div class="card-img"><img src="https://picsum.photos/seed/mfashion7/300/400" alt="레더 미니 크로스백"></div><div class="card-brand">Y2KS BAG</div><div class="card-name">레더 미니 크로스백</div><div class="card-price">159,000원</div></div>
      </div>
    </main>
    <footer>
      <div class="ft-inner">
        <div>
          <div class="ft-logo">Y2KS</div>
          <p>서울특별시 강남구 패션로 88, Y2KS 빌딩</p>
          <p>고객센터: 1588-0000 | 평일 10:00–18:00</p>
          <p>이메일: help@Y2KS-fashion.kr</p>
          <p style="margin-top:12px;font-size:11px;">© 2026 Y2KS Fashion Inc. All rights reserved.</p>
        </div>
        <div class="ft-cols">
          <div class="ft-col"><h4>SHOP</h4><p>신상품</p><p>베스트</p><p>세일</p><p>이벤트</p></div>
          <div class="ft-col"><h4>HELP</h4><p>배송 안내</p><p>교환/반품</p><p>사이즈 가이드</p><p>FAQ</p></div>
          <div class="ft-col"><h4>INFO</h4><p>브랜드 소개</p><p>지속 가능성</p><p>채용 정보</p><p>제휴 문의</p></div>
        </div>
      </div>
    </footer>
    </body>
    </html>

  admin.html: |
    <!DOCTYPE html>
    <html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2KS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--white:#fff;--g100:#f5f5f5;--g200:#e8e8e8;--g400:#9e9e9e;--g600:#555;--accent:#c8a96e;--accent-d:#a8803e;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa}
    body{font-family:'Outfit',sans-serif;background:#0d0d0d;color:#e8e8e8;min-height:100vh}
    .header{background:#0a0a0a;border-bottom:1px solid #1f1f1f;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo{font-size:22px;font-weight:800;letter-spacing:8px;color:#fff}
    .logo span{color:var(--accent);font-size:12px;font-weight:400;letter-spacing:3px;margin-left:12px;vertical-align:middle}
    .header-right{display:flex;align-items:center;gap:16px}
    .refresh-btn{background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);color:var(--accent);padding:8px 18px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
    .refresh-btn:hover{background:rgba(200,169,110,.2)}
    .reset-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:8px 18px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
    .reset-btn:hover{background:rgba(239,68,68,.2)}
    .last-updated{font-size:12px;color:#555}
    .tab-nav{background:#0a0a0a;border-bottom:1px solid #1f1f1f;padding:0 40px;display:flex;gap:0}
    .tab-btn{padding:14px 24px;font-size:13px;font-weight:600;color:#555;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .2s;border-bottom:2px solid transparent;letter-spacing:.5px}
    .tab-btn:hover{color:#e8e8e8}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .main{max-width:1400px;margin:0 auto;padding:32px 40px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
    @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
    .stat-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px}
    .stat-label{font-size:11px;letter-spacing:2px;color:#555;margin-bottom:10px;text-transform:uppercase}
    .stat-value{font-size:36px;font-weight:700;line-height:1}
    .stat-sub{font-size:12px;color:#444;margin-top:8px}
    .v-green{color:var(--green)}
    .v-red{color:var(--red)}
    .v-accent{color:var(--accent)}
    .v-blue{color:var(--blue)}
    .v-purple{color:var(--purple)}
    .section-title{font-size:13px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1f1f1f}
    .queue-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
    .queue-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px}
    .progress-bar{height:6px;background:#1f1f1f;border-radius:3px;margin-top:16px;overflow:hidden}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent-d));transition:width .5s ease}
    table{width:100%;border-collapse:collapse}
    .table-wrap{background:#111;border:1px solid #1f1f1f;border-radius:10px;overflow:hidden}
    th{background:#0a0a0a;padding:12px 16px;text-align:left;font-size:11px;letter-spacing:1.5px;color:#555;text-transform:uppercase;font-weight:600;border-bottom:1px solid #1f1f1f}
    td{padding:12px 16px;font-size:13px;border-bottom:1px solid #161616;color:#ccc}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px}
    .b-winner{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
    .b-loser{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
    .b-sent{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
    .b-pending{background:rgba(255,255,255,.05);color:#555;border:1px solid #222}
    .empty{text-align:center;padding:48px;color:#333;font-size:14px}
    .toast{position:fixed;bottom:32px;right:32px;background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e8e8;padding:14px 22px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateY(0)}
    .mon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
    @media(max-width:900px){.mon-grid{grid-template-columns:1fr}}
    .chart-card{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:24px;margin-bottom:16px}
    .chart-title{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1f1f1f}
    .chart-wrap{position:relative;height:220px}
    .chart-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px;background:#111;border-radius:4px}
    .lt-config{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:28px;margin-bottom:16px}
    .lt-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:end}
    @media(max-width:900px){.lt-grid{grid-template-columns:1fr 1fr}}
    .lt-label{font-size:11px;letter-spacing:1.5px;color:#555;text-transform:uppercase;margin-bottom:8px}
    .lt-input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:10px 14px;color:#e8e8e8;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .lt-input:focus{border-color:var(--accent)}
    .lt-start-btn{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);padding:10px 28px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;width:100%}
    .lt-start-btn:hover:not(:disabled){background:rgba(34,197,94,.25)}
    .lt-start-btn:disabled{opacity:.4;cursor:not-allowed}
    .lt-stop-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 28px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;width:100%;margin-top:8px}
    .lt-stop-btn:hover{background:rgba(239,68,68,.2)}
    .lt-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
    @media(max-width:900px){.lt-stats-grid{grid-template-columns:repeat(2,1fr)}}
    .lt-prog-bar{height:8px;background:#1f1f1f;border-radius:4px;margin-top:12px;overflow:hidden}
    .lt-prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#16a34a);transition:width .3s ease}
    .lt-log{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:10px;padding:20px;height:200px;overflow-y:auto;font-family:monospace;font-size:12px}
    .lt-log-line{padding:2px 0;border-bottom:1px solid #111}
    .lt-log-line.success{color:#22c55e}
    .lt-log-line.fail{color:#ef4444}
    .lt-log-line.info{color:#555}
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;background:#111;border-top:1px solid #1f1f1f;border-radius:0 0 10px 10px}
    .pg-btn{background:#0d0d0d;border:1px solid #2a2a2a;color:#9e9e9e;padding:6px 14px;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
    .pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .pg-btn:disabled{opacity:.3;cursor:default}
    .pg-info{font-size:12px;color:#555;padding:0 12px}
    .scale-panel{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:20px;margin-bottom:16px}
    .scale-panel-title{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:14px}
    .scale-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media(max-width:900px){.scale-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
    </head>
    <body>
    <header class="header">
      <div class="logo">Y2KS <span>ADMIN</span></div>
      <div class="header-right">
        <span class="last-updated" id="last-updated">-</span>
        <button class="reset-btn" onclick="resetTickets()">티켓 초기화</button>
        <button class="refresh-btn" onclick="refreshCurrentTab()">새로고침</button>
      </div>
    </header>
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('events')" id="tab-btn-events">이벤트 로그</button>
      <button class="tab-btn" onclick="switchTab('loadtest')" id="tab-btn-loadtest">부하 테스트</button>
    </nav>
    
    <div class="tab-panel active" id="panel-events">
    <main class="main">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">남은 티켓</div>
          <div class="stat-value v-accent" id="s-left">-</div>
          <div class="stat-sub">/ 100장</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">당첨자</div>
          <div class="stat-value v-green" id="s-winner">-</div>
          <div class="stat-sub">쿠폰 발급 완료</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">낙첨자</div>
          <div class="stat-value v-red" id="s-loser">-</div>
          <div class="stat-sub">소진 후 참여</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">이메일 발송</div>
          <div class="stat-value v-blue" id="s-email">-</div>
          <div class="stat-sub">SES 발송 완료</div>
        </div>
      </div>
      <div class="queue-row">
        <div class="queue-card">
          <div class="section-title">SQS 대기열</div>
          <div class="stat-value v-accent" id="s-queue">-</div>
          <div class="stat-sub" style="margin-top:8px">대기 중인 메시지</div>
          <div class="progress-bar"><div class="progress-fill" id="queue-bar" style="width:0%"></div></div>
        </div>
        <div class="queue-card">
          <div class="section-title">처리 중 (In-Flight)</div>
          <div class="stat-value v-blue" id="s-inflight">-</div>
          <div class="stat-sub" style="margin-top:8px">Worker 처리 중</div>
          <div class="progress-bar"><div class="progress-fill" id="inflight-bar" style="width:0%;background:linear-gradient(90deg,var(--blue),#60a5fa)"></div></div>
        </div>
      </div>
      <div class="section-title" id="claims-title">클레임 내역</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Request ID</th>
              <th>상태</th>
              <th>쿠폰 코드</th>
              <th>이메일</th>
              <th>이메일 발송</th>
              <th>처리 시각</th>
            </tr>
          </thead>
          <tbody id="claims-body">
            <tr><td colspan="6" class="empty">로딩 중...</td></tr>
          </tbody>
        </table>
        <div class="pagination">
          <button class="pg-btn" id="pg-first" onclick="gotoPage(1)">«</button>
          <button class="pg-btn" id="pg-prev" onclick="gotoPage(currentPage-1)">‹</button>
          <span class="pg-info" id="pg-info">-</span>
          <button class="pg-btn" id="pg-next" onclick="gotoPage(currentPage+1)">›</button>
          <button class="pg-btn" id="pg-last" onclick="gotoPage(totalPages)">»</button>
        </div>
      </div>
    </main>
    </div>
    
    <div class="tab-panel" id="panel-loadtest">
    <main class="main">
      <div class="lt-config">
        <div class="section-title">부하 테스트 — 클러스터 최대 부하 고정 스펙</div>
        <div class="scale-grid" style="margin-bottom:20px">
          <div class="stat-card"><div class="stat-label">총 요청 수</div><div class="stat-value v-accent">30000</div><div class="stat-sub">쿠폰 5× 초과 요청</div></div>
          <div class="stat-card"><div class="stat-label">동시 요청</div><div class="stat-value v-green">500</div><div class="stat-sub">KEDA 최대 Worker 수</div></div>
          <div class="stat-card"><div class="stat-label">요청 간격</div><div class="stat-value v-blue">0 ms</div><div class="stat-sub">버스트 모드</div></div>
          <div class="stat-card"><div class="stat-label">KEDA 스케일</div><div class="stat-value v-accent">1 → 50</div><div class="stat-sub">queueLength=5 트리거</div></div>
        </div>
        <div style="display:flex;gap:12px">
          <button class="lt-start-btn" id="lt-start-btn" onclick="startLoadTest()" style="flex:1">&#9654; 최대 부하 테스트 시작</button>
          <button class="lt-stop-btn" id="lt-stop-btn" onclick="stopLoadTest()" style="flex:1;display:none">&#9632; 중지</button>
        </div>
      </div>
      <div class="lt-stats-grid">
        <div class="stat-card">
          <div class="stat-label">총 요청</div>
          <div class="stat-value v-accent" id="lt-s-total">0</div>
          <div class="stat-sub" id="lt-s-progress">대기 중</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">성공 (2xx)</div>
          <div class="stat-value v-green" id="lt-s-success">0</div>
          <div class="stat-sub" id="lt-s-success-rate">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">실패 / 오류</div>
          <div class="stat-value v-red" id="lt-s-fail">0</div>
          <div class="stat-sub">오류 / 타임아웃</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 응답시간</div>
          <div class="stat-value v-blue" id="lt-s-avg">-</div>
          <div class="stat-sub">평균 latency</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">배치별 성공 / 실패 수</div>
        <div class="chart-wrap">
          <canvas id="chart-lt"></canvas>
          <div class="chart-empty" id="chart-lt-empty">테스트를 시작하면 결과가 표시됩니다</div>
        </div>
      </div>
      <div class="scale-panel">
        <div class="scale-panel-title">실시간 스케일링 현황 (10초 갱신)</div>
        <div class="scale-grid">
          <div class="stat-card">
            <div class="stat-label">SQS 대기열</div>
            <div class="stat-value v-red" id="lt-queue-count">-</div>
            <div class="stat-sub">처리 대기 메시지</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">남은 티켓</div>
            <div class="stat-value v-blue" id="lt-tickets-left">-</div>
            <div class="stat-sub">잔여 쿠폰 수</div>
          </div>
        </div>
      </div>
      <div class="section-title">실시간 로그</div>
      <div class="lt-log" id="lt-log">
        <div class="lt-log-line info">테스트를 시작하면 결과가 여기에 표시됩니다.</div>
      </div>
    </main>
    </div>
    
    <div class="toast" id="toast"></div>
    <script>
    // ── 탭 전환 ──────────────────────────────────────────
    var currentTab = 'events';
    
    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(function(el){ el.classList.remove('active'); });
      document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
      document.getElementById('panel-' + name).classList.add('active');
      document.getElementById('tab-btn-' + name).classList.add('active');
      currentTab = name;
      // 부하 테스트 탭 타이머도 정리
      if (ltScaleTimer) { clearInterval(ltScaleTimer); ltScaleTimer = null; }
      if (ltEventTimer) { clearInterval(ltEventTimer); ltEventTimer = null; }
    }
    
    function refreshCurrentTab() {
      if (currentTab === 'events') loadAll();
    }
    
    // ── 토스트 ──────────────────────────────────────────
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }
    
    // ── 이벤트 로그 탭 ──────────────────────────────────
    async function loadStats() {
      try {
        var res = await fetch('/api/admin/stats');
        var d = await res.json();
        document.getElementById('s-left').textContent = d.tickets_left;
        document.getElementById('s-winner').textContent = d.winner_count;
        document.getElementById('s-loser').textContent = d.loser_count;
        document.getElementById('s-email').textContent = d.email_sent_count;
        document.getElementById('s-queue').textContent = d.queue_depth;
        document.getElementById('s-inflight').textContent = d.in_flight;
        document.getElementById('queue-bar').style.width = Math.min(d.queue_depth / 50 * 100, 100) + '%';
        document.getElementById('inflight-bar').style.width = Math.min(d.in_flight / 50 * 100, 100) + '%';
        document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
        return d;
      } catch(e) { console.error(e); return null; }
    }
    
    var currentPage = 1;
    var totalPages = 1;
    var pageSize = 20;
    
    function gotoPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadClaims();
    }
    
    async function loadClaims() {
      try {
        var res = await fetch('/api/admin/claims?page=' + currentPage + '&limit=' + pageSize);
        var d = await res.json();
        totalPages = d.pages || 1;
        var total = d.total || 0;
        document.getElementById('pg-prev').disabled = currentPage <= 1;
        document.getElementById('pg-first').disabled = currentPage <= 1;
        document.getElementById('pg-next').disabled = currentPage >= totalPages;
        document.getElementById('pg-last').disabled = currentPage >= totalPages;
        document.getElementById('pg-info').textContent = currentPage + ' / ' + totalPages + ' 페이지  (총 ' + total + '건)';
        document.getElementById('claims-title').textContent = '클레임 내역 (총 ' + total + '건)';
        var tbody = document.getElementById('claims-body');
        if (!d.items || d.items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">데이터가 없습니다</td></tr>';
          return;
        }
        tbody.innerHTML = d.items.map(function(item) {
          var statusBadge = item.status === 'winner'
            ? '<span class="badge b-winner">당첨</span>'
            : '<span class="badge b-loser">낙첨</span>';
          var emailSent = item.email_sent
            ? '<span class="badge b-sent">발송완료</span>'
            : '<span class="badge b-pending">미발송</span>';
          var coupon = item.coupon_code || '-';
          var email = item.email || '-';
          var time = item.claimed_at ? item.claimed_at.replace('T', ' ').substring(0, 19) : '-';
          var shortId = item.request_id ? item.request_id.substring(0, 8) + '...' : '-';
          return '<tr><td style="font-family:monospace;font-size:12px;color:#666" title="' + item.request_id + '">' + shortId + '</td><td>' + statusBadge + '</td><td style="font-family:monospace;letter-spacing:2px;color:var(--accent)">' + coupon + '</td><td style="color:#888">' + email + '</td><td>' + emailSent + '</td><td style="color:#555;font-size:12px">' + time + '</td></tr>';
        }).join('');
      } catch(e) { console.error(e); }
    }
    
    async function loadAll() {
      await Promise.all([loadStats(), loadClaims()]);
    }
    
    async function resetTickets() {
      if (!confirm('티켓을 100장으로 초기화하시겠습니까?')) return;
      try {
        var res = await fetch('/api/admin/reset', {method: 'POST'});
        var d = await res.json();
        showToast(d.message);
        loadStats();
      } catch(e) { showToast('초기화 실패'); }
    }
    
    loadAll();
    setInterval(loadAll, 15000);
    
    // ── 부하 테스트 탭 ──────────────────────────────────
    function showEmpty(id, show) {
      var el = document.getElementById(id);
      if (el) el.style.display = show ? 'flex' : 'none';
    }
    var ltRunning = false;
    var ltStopped = false;
    var ltStats = { total: 0, success: 0, fail: 0, times: [] };
    var ltTarget = 0;
    var chartLt = null;
    var ltChartData = { labels: [], success: [], fail: [] };
    var ltScaleTimer = null;
    var ltEventTimer = null;
    
    async function pollScalingStatus() {
      try {
        var sRes = await fetch('/api/admin/stats');
        var sd = await sRes.json();
        document.getElementById('lt-queue-count').textContent = sd.queue_depth;
        document.getElementById('lt-tickets-left').textContent = sd.tickets_left;
      } catch(e) {}
    }
    
    function ltLog(msg, type) {
      var log = document.getElementById('lt-log');
      var line = document.createElement('div');
      line.className = 'lt-log-line ' + (type || 'info');
      line.textContent = new Date().toLocaleTimeString('ko-KR') + '  ' + msg;
      log.insertBefore(line, log.firstChild);
      if (log.children.length > 200) log.removeChild(log.lastChild);
    }
    
    function ltUpdateUI() {
      document.getElementById('lt-s-total').textContent = ltStats.total;
      document.getElementById('lt-s-success').textContent = ltStats.success;
      document.getElementById('lt-s-fail').textContent = ltStats.fail;
      var avg = ltStats.times.length > 0 ? Math.round(ltStats.times.reduce(function(a,b){return a+b;},0) / ltStats.times.length) : 0;
      document.getElementById('lt-s-avg').textContent = ltStats.times.length > 0 ? avg + 'ms' : '-';
      var pct = ltTarget > 0 ? Math.round(ltStats.total / ltTarget * 100) : 0;
      document.getElementById('lt-s-progress').textContent = ltStats.total + ' / ' + ltTarget + ' (' + pct + '%)';
      var rate = ltStats.total > 0 ? Math.round(ltStats.success / ltStats.total * 100) : 0;
      document.getElementById('lt-s-success-rate').textContent = '성공률 ' + rate + '%';
    }
    
    function ltUpdateChart(batchSuccess, batchFail) {
      var now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      ltChartData.labels.push(now);
      ltChartData.success.push(batchSuccess);
      ltChartData.fail.push(batchFail);
      if (ltChartData.labels.length > 60) {
        ltChartData.labels.shift();
        ltChartData.success.shift();
        ltChartData.fail.shift();
      }
      if (!chartLt) {
        showEmpty('chart-lt-empty', false);
        chartLt = new Chart(document.getElementById('chart-lt'), {
          type: 'bar',
          data: {
            labels: ltChartData.labels,
            datasets: [
              { label: '성공', data: ltChartData.success, backgroundColor: 'rgba(34,197,94,0.5)', borderColor: '#22c55e', borderWidth: 1 },
              { label: '실패', data: ltChartData.fail, backgroundColor: 'rgba(239,68,68,0.5)', borderColor: '#ef4444', borderWidth: 1 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { legend: { labels: { color: '#9e9e9e', font: { family: 'Outfit', size: 11 } } } },
            scales: {
              x: { stacked: true, ticks: { color: '#555', font: { size: 9 }, maxRotation: 0, maxTicksLimit: 10 }, grid: { color: '#1f1f1f' } },
              y: { stacked: true, ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1f1f1f' } }
            }
          }
        });
      } else {
        chartLt.data.labels = ltChartData.labels;
        chartLt.data.datasets[0].data = ltChartData.success;
        chartLt.data.datasets[1].data = ltChartData.fail;
        chartLt.update('none');
      }
    }
    
    async function startLoadTest() {
      var concurrency = 500;
      var total = 30000;
      var interval = 0;
    
      ltRunning = true;
      ltStopped = false;
      ltStats = { total: 0, success: 0, fail: 0, times: [] };
      ltTarget = total;
      ltChartData = { labels: [], success: [], fail: [] };
      if (chartLt) { chartLt.destroy(); chartLt = null; }
      showEmpty('chart-lt-empty', true);
    
      document.getElementById('lt-start-btn').disabled = true;
      document.getElementById('lt-stop-btn').style.display = 'block';
      document.getElementById('lt-log').innerHTML = '';
      ltLog('부하 테스트 시작 — 동시 ' + concurrency + '명 / 총 ' + total + '회 / 버스트 모드', 'info');
    
      // 스케일링 상태 실시간 폴링 시작 (5초 간격)
      pollScalingStatus();
      ltScaleTimer = setInterval(pollScalingStatus, 5000);
      // 이벤트 로그 통계 실시간 갱신 (5초 간격)
      ltEventTimer = setInterval(loadStats, 5000);
      ltUpdateUI();
    
      var sent = 0;
    
      async function runBatch() {
        if (ltStopped || sent >= total) {
          ltRunning = false;
          document.getElementById('lt-start-btn').disabled = false;
          document.getElementById('lt-stop-btn').style.display = 'none';
          if (ltScaleTimer) { clearInterval(ltScaleTimer); ltScaleTimer = null; }
          if (ltEventTimer) { clearInterval(ltEventTimer); ltEventTimer = null; }
          ltLog('테스트 완료 — 성공: ' + ltStats.success + ' / 실패: ' + ltStats.fail + ' / 평균: ' + (ltStats.times.length > 0 ? Math.round(ltStats.times.reduce(function(a,b){return a+b;},0)/ltStats.times.length) : 0) + 'ms', 'info');
          pollScalingStatus(); // 최종 상태 갱신
          return;
        }
    
        var batchSize = Math.min(concurrency, total - sent);
        sent += batchSize;
        var batchSuccess = 0, batchFail = 0;
    
        var promises = Array.from({length: batchSize}, function() {
          return (async function() {
            var t0 = Date.now();
            try {
              var res = await fetch('/api/claim', { method: 'POST' });
              var elapsed = Date.now() - t0;
              ltStats.times.push(elapsed);
              if (res.ok) {
                ltStats.success++; batchSuccess++;
              } else {
                ltStats.fail++; batchFail++;
                var body = {};
                try { body = await res.json(); } catch(e2) {}
                ltLog('HTTP ' + res.status + ' — ' + (body.message || body.error || res.statusText), 'fail');
              }
            } catch(e) {
              ltStats.fail++; batchFail++;
              ltLog('네트워크 오류 — ' + e.message, 'fail');
            }
            ltStats.total++;
          })();
        });
    
        await Promise.all(promises);
        ltUpdateUI();
        ltUpdateChart(batchSuccess, batchFail);
        if (batchFail > 0)
          ltLog('배치 완료 — 성공: ' + batchSuccess + ' 실패: ' + batchFail, 'fail');
        else
          ltLog('배치 완료 — 성공: ' + batchSuccess, 'success');
    
        setTimeout(runBatch, Math.max(interval, 10));
      }
    
      runBatch();
    }
    
    function stopLoadTest() {
      ltStopped = true;
      if (ltScaleTimer) { clearInterval(ltScaleTimer); ltScaleTimer = null; }
      if (ltEventTimer) { clearInterval(ltEventTimer); ltEventTimer = null; }
      document.getElementById('lt-start-btn').disabled = false;
      document.getElementById('lt-stop-btn').style.display = 'none';
      ltLog('테스트 중지됨 (총 ' + ltStats.total + '개 요청 완료)', 'info');
      pollScalingStatus();
    }
    </script>
    </body>
    </html>
    
