    .lc-time{font-size:11px;color:#999}
    .log-card-body{font-size:13px;color:#333;line-height:1.6;word-break:break-word}
    .log-card-body h2,.log-card-body h3{color:var(--accent);margin:10px 0 4px;font-size:13px}
    .log-card-body strong{color:#0a0a0a}
    .log-card-body ul,.log-card-body ol{padding-left:18px;margin:4px 0}
