    .msg-final{background:#f9f9f9;border:1px solid rgba(200,169,110,.2);border-radius:8px;padding:20px;font-size:14px;color:#0a0a0a;line-height:1.8;word-break:break-word}
    .msg-final h2{color:var(--accent);font-size:15px;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(200,169,110,.2)}
