# 결제 파드 — ondemand-node1(AZ-a) 고정, y2ks-low(100)
# Worker(500)가 Pending 시 선점 대상이 되어 자리를 비워줌
apiVersion: apps/v1
kind: Deployment
metadata:
  name: y2ks-payment
  labels:
    app: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      priorityClassName: y2ks-low
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values: ["ondemand-1","ondemand-2"]
      containers:
      - name: payment
        # 시연용 더미 컨테이너 — 실제 결제 로직 없음
        image: nginx:alpine
        resources:
          requests:
            cpu: 300m
            memory: 300Mi
          limits:
            cpu: 400m
            memory: 400Mi
---
apiVersion: v1
kind: Service
metadata:
  name: y2ks-payment-svc
spec:
  selector:
    app: payment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
