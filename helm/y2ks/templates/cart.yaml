# 장바구니 파드 — ondemand-node2(AZ-b) 고정, y2ks-low(100)
# Worker(500)가 Pending 시 선점 대상이 되어 자리를 비워줌
apiVersion: apps/v1
kind: Deployment
metadata:
  name: y2ks-cart
  labels:
    app: cart
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      priorityClassName: y2ks-low
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values: ["ondemand-2", "ondemand-1"]
      containers:
      - name: cart
        image: nginx:alpine
        resources:
          requests:
            cpu: 300m
            memory: 300Mi
          limits:
            cpu: 500m
            memory: 450Mi
---
apiVersion: v1
kind: Service
metadata:
  name: y2ks-cart-svc
spec:
  selector:
    app: cart
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
