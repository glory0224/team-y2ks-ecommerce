apiVersion: batch/v1
kind: Job
metadata:
  name: k6-athena
  labels:
    app: k6-athena
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-athena
    spec:
      serviceAccountName: worker-sa
      restartPolicy: Never
      priorityClassName: y2ks-high
      containers:
      - name: k6
        image: grafana/k6:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 1. aws-cli 및 jq 설치 (S3 업로드 및 파티션 가공용)
            apk add --no-cache aws-cli jq

            # 2. 부하 테스트 실행 (JSON으로만 추출, AMP로는 쏘지 않음)
            echo "[k6] Starting S3-only data collection load test..."
            k6 run /scripts/load-test.js --out json=result.json

            # 3. 테스트 종료 후 메타데이터 추출 (계정ID 및 시간)
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            RUN_DATE=$(date -u +"%Y-%m-%d")
            RUN_ID="job-$(date -u +"%H%M%S")"
            BUCKET_NAME="y2ks-athena-${ACCOUNT_ID}"
            
            echo "[k6] Uploading result.json to S3..."
            S3_PATH="s3://${BUCKET_NAME}/k6/raw/run_date=${RUN_DATE}/run_id=${RUN_ID}/result.json"
            aws s3 cp result.json ${S3_PATH}
            
            # 4. Athena에 파티션 등록
            echo "[k6] Registering partition in Athena..."
            aws athena start-query-execution \
              --query-string "ALTER TABLE y2ks_analytics.k6_raw ADD IF NOT EXISTS PARTITION (run_date='${RUN_DATE}', run_id='${RUN_ID}') LOCATION 's3://${BUCKET_NAME}/k6/raw/run_date=${RUN_DATE}/run_id=${RUN_ID}/'" \
              --work-group "y2ks-analytics" \
              --region ap-northeast-2
              
            echo "[k6] Athena Pipeline Completed Successfully."
        env:
        - name: TARGET_URL
          value: "http://y2ks-frontend-svc"
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
        volumeMounts:
        - name: k6-script
          mountPath: /scripts
        - name: k6-config
          mountPath: /k6-config
      volumes:
      - name: k6-script
        configMap:
          name: y2ks-k6-script
      - name: k6-config
        configMap:
          name: y2ks-k6-config
          optional: true
