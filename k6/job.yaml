apiVersion: batch/v1
kind: Job
metadata:
  name: k6-loadtest
  labels:
    app: k6-loadtest
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-loadtest
    spec:
      serviceAccountName: worker-sa
      securityContext:
        runAsUser: 0
      restartPolicy: Never
      priorityClassName: y2ks-high
      containers:
      - name: sigv4proxy
        image: public.ecr.aws/aws-observability/aws-sigv4-proxy:latest
        args:
          - --name
          - aps
          - --region
          - $(AWS_REGION)
          - --host
          - aps-workspaces.$(AWS_REGION).amazonaws.com
          - --port
          - ":8005"
        env:
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: aws-config
              key: AWS_REGION
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      - name: k6
        securityContext:
          runAsUser: 0
        image: grafana/k6:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            apk add --no-cache aws-cli jq
            WORKSPACE_ID=$(cat /k6-config/ampWorkspaceId 2>/dev/null || echo "")
            if [ -n "$WORKSPACE_ID" ]; then
              echo "[k6] waiting for sigv4proxy on :8005..."
              WAITED=0
              while [ $WAITED -lt 30 ]; do
                (echo > /dev/tcp/localhost/8005) 2>/dev/null && break
                sleep 1
                WAITED=$((WAITED+1))
              done
              echo "[k6] sigv4proxy ready (waited ${WAITED}s)"
              export K6_PROMETHEUS_RW_SERVER_URL="http://localhost:8005/workspaces/${WORKSPACE_ID}/api/v1/remote_write"
              export K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=false
              export K6_PROMETHEUS_RW_TREND_STATS="p(50),p(95),p(99)"
              echo "[k6] output: $K6_PROMETHEUS_RW_SERVER_URL"
              k6 run /scripts/load-test.js --out experimental-prometheus-rw --out json=result.json
            else
              echo "[k6] stdout mode"
              k6 run /scripts/load-test.js --out json=result.json
            fi

            # --- S3 + Athena Pipeline ---
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            RUN_DATE=$(date -u +"%Y-%m-%d")
            RUN_ID="job-$(date -u +"%H%M%S")"
            BUCKET_NAME="y2ks-athena-${ACCOUNT_ID}"
            
            echo "[k6] Uploading result.json to S3..."
            S3_PATH="s3://${BUCKET_NAME}/k6/raw/run_date=${RUN_DATE}/run_id=${RUN_ID}/result.json"
            aws s3 cp result.json ${S3_PATH}
            
            echo "[k6] Registering partition in Athena..."
            aws athena start-query-execution \
              --query-string "ALTER TABLE y2ks_analytics.k6_raw ADD IF NOT EXISTS PARTITION (run_date='${RUN_DATE}', run_id='${RUN_ID}') LOCATION 's3://${BUCKET_NAME}/k6/raw/run_date=${RUN_DATE}/run_id=${RUN_ID}/'" \
              --work-group "y2ks-analytics" \
              --region ap-northeast-2
              
            echo "[k6] Job Completed Successfully."
        env:
        - name: TARGET_URL
          value: "http://y2ks-frontend-svc"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
        volumeMounts:
        - name: k6-script
          mountPath: /scripts
        - name: k6-config
          mountPath: /k6-config
      volumes:
      - name: k6-script
        configMap:
          name: y2ks-k6-script
      - name: k6-config
        configMap:
          name: y2ks-k6-config
          optional: true
