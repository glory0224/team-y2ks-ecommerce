apiVersion: batch/v1
kind: Job
metadata:
  name: k6-loadtest
  labels:
    app: k6-loadtest
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-loadtest
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: worker-sa
      restartPolicy: Never
      priorityClassName: y2ks-high
      tolerations:
      - key: karpenter
        value: "true"
        effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: karpenter.sh/capacity-type
                operator: In
                values: ["spot", "on-demand"]
      containers:
      - name: k6
        image: grafana/k6:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            k6 run --out experimental-prometheus-rw /scripts/load-test.js
        env:
        - name: TARGET_URL
          value: "http://y2ks-frontend-svc"
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: y2ks-secrets
              key: ADMIN_TOKEN
        - name: K6_PROMETHEUS_RW_SERVER_URL
          value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
        - name: K6_PROMETHEUS_RW_TREND_STATS
          value: "p(50),p(95),p(99)"
        resources:
          requests:
            cpu: "2"
            memory: 2Gi
          limits:
            cpu: "4"
            memory: 4Gi
        volumeMounts:
        - name: k6-script
          mountPath: /scripts
      volumes:
      - name: k6-script
        configMap:
          name: y2ks-k6-script
