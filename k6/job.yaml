apiVersion: batch/v1
kind: Job
metadata:
  name: k6-loadtest
  labels:
    app: k6-loadtest
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-loadtest
    spec:
      serviceAccountName: worker-sa
      restartPolicy: Never
      priorityClassName: y2ks-high
      containers:
      - name: k6
        image: grafana/k6:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "[k6] stdout mode (self-hosted Prometheus — push gateway 불필요)"
            k6 run /scripts/load-test.js
        env:
        - name: TARGET_URL
          value: "http://y2ks-frontend-svc"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
        volumeMounts:
        - name: k6-script
          mountPath: /scripts
      volumes:
      - name: k6-script
        configMap:
          name: y2ks-k6-script
