# ============================================================
# kube-prometheus-stack helm values
# monitoring/amp.tf의 null_resource.prometheus_stack에서 사용
# AMP remote_write + KEDA/Karpenter ServiceMonitor 포함
# ============================================================

prometheus:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "__AMP_ROLE_ARN__"   # terraform이 치환

  prometheusSpec:
    # AMP remote_write - IRSA로 SigV4 서명
    remoteWrite:
      - url: "__AMP_ENDPOINT__api/v1/remote_write"     # terraform이 치환
        sigv4:
          region: ap-northeast-2
        queueConfig:
          capacity: 2500
          maxSamplesPerSend: 1000
          maxShards: 200

    # 모든 네임스페이스의 ServiceMonitor/PodMonitor를 수집
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
