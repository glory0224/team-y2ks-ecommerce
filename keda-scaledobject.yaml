apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: aws-sqs-queue-scaledobject
  namespace: default
spec:
  scaleTargetRef:
    name: y2ks-worker
  minReplicaCount: 1       # Optional, default: 0. Set to 1 so there's always a worker.
  maxReplicaCount: 50      # Optional, default: 100
  triggers:
  - type: aws-sqs-queue
    metadata:
      identityOwner: operator
      # NOTE: KEDA SQS scaler does not support referencing queueURL from a ConfigMap.
      # Keep this value in sync with SQS_QUEUE_URL in the aws-config ConfigMap.
      queueURL: https://sqs.ap-northeast-2.amazonaws.com/${AWS_ACCOUNT_ID}/y2ks-queue
      queueLength: "5"     # Scale up if there are more than 5 messages per replica
      awsRegion: "ap-northeast-2"
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-aws-credentials
  namespace: default
spec:
  podIdentity:
    provider: aws-eks
