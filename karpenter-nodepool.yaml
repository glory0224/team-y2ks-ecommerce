# EC2NodeClass: EC2 configuration used by Karpenter when provisioning new nodes.
# NodePool references this NodeClass, so it must be applied first.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Karpenter v1 API: AMI selection via amiSelectorTerms
  # alias: al2@latest - automatically selects the latest Amazon Linux 2 AMI compatible with EKS 1.31
  # amiFamily alone is no longer valid in v1; amiSelectorTerms is required
  amiSelectorTerms:
    - alias: al2@latest
  # Uses KarpenterNodeRole created by Terraform
  # This role is assumed by EC2 instances when registering as EKS worker nodes
  role: "KarpenterNodeRole-${CLUSTER_NAME}"
  # Select subnets by the tag applied to the cluster VPC subnets
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  # Select the cluster node security group by tag
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  # Tags applied to nodes provisioned by Karpenter
  tags:
    karpenter.sh/discovery: ${CLUSTER_NAME}
---
# NodePool: constraints for nodes that Karpenter automatically adds/removes
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"] # Keep Spot for cost savings
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["t3"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["small"] # Free tier: t3.small only
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: 72h
  limits:
    cpu: 20 # Increase to 10-20 to accommodate up to 50 KEDA workers
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
