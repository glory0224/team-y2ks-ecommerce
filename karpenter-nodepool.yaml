# EC2NodeClass: Karpenter가 새 노드를 프로비저닝할 때 사용할 EC2 설정
# NodePool이 이 NodeClass를 참조하므로 반드시 먼저 적용해야 합니다.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Karpenter v1 API: amiSelectorTerms 필드로 AMI 선택
  # alias: al2@latest → EKS 1.31과 호환되는 최신 Amazon Linux 2 AMI 자동 선택
  # amiFamily 단독 사용은 v1에서 더 이상 유효하지 않으므로 amiSelectorTerms 필수
  amiSelectorTerms:
    - alias: al2@latest
  # karpenter-cfn.yaml이 생성한 KarpenterNodeRole 사용
  # EC2 인스턴스가 EKS 워커 노드로 등록될 때 이 Role을 사용합니다.
  role: "KarpenterNodeRole-${CLUSTER_NAME}"
  # eksctl이 클러스터 VPC 서브넷에 자동으로 붙이는 태그로 서브넷 선택
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  # 클러스터 노드 보안 그룹을 태그로 선택
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  # Karpenter가 생성하는 노드에 붙일 태그 (서브넷/SG 셀렉터와 동일한 태그)
  tags:
    karpenter.sh/discovery: ${CLUSTER_NAME}
---
# NodePool: Karpenter가 자동으로 추가/제거할 노드의 제약 조건
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"] # 비용 절감을 위해 Spot 유지
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["t3"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["small"] # 프리티어: t3.small만 사용
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: 72h
  limits:
    cpu: 20 # KEDA 50개 워커를 수용하려면 최소 10~20으로 증설 필요
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
